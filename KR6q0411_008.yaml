body:
  text: 住雲門顯聖寺門人淨範編山陰嗣法弟子祁淨超較訂頌古世尊初生雲門太平韓侯開國已多謀豈憶邦寧將不留堪笑雲門誠厚面自添脂粉不知羞世尊拈華迦葉微笑杜鵑飛入春園裏穩踏華枝零碎語林間驚起昔愁人眼看華枝淚如許最難舉東土西天驟紅雨五通仙人問那一通那一通你問我猢猻上樹偷生果滿口嚼得不甘香眼裏耳裏都是火忽然撞著看園翁沒處躲女子出定玄石一醒醉三年妻兒抱首哭蒼天饒君題盡招魂賦落得安間自在眠文殊智罔明賢出入如何得話圓春光不改東風面惹得江南啼杜鵑金剛經以今世人輕賤三句抱璧投秦定國謀指瑕多為易城羞歸來不失荊山寶明月清風滿御樓楞嚴經見見之時四句九里松風天竺路十洲月上珊瑚枝此來山水連天碧正是吳江楓落時急著眼莫差池此事如何説與知玉鷺飛歸蘆荻渚芙蓉寂寞秋光遲聖女三般物髑髏遍野實堪嗟拈著無端變作蛇能是女郎機更捷解從石上插成華殃崛尊者救産難廚下嫂堂上姑不是家親誰敢相呼平心等視失卻宗圖咄莫謂六橋花爛熳須知春色滿皇都冰挾蝦蟆火飛蝴蝶柳絮愁霜荷花愛雪要得燕國寧太子入秦質去年今日此門中人面桃花相映紅人面不知何處去桃花依舊笑春風六祖風幡雪峰與棒一點私情奈得羞也曾漏泄在君侯病軀正值春三月華落華開總是愁一祖安心教子番成不克家無端清眼見空華當時若不來茲土連璧如何得有瑕國師無縫塔月照蘆華霜風凜冽漁歌一曲滄浪裏芙蓉秋老寒江側洞山寒暑畫閣鐘沈隔亮紗梧桐微映月痕邪海棠春暮成狼藉風打停舟起浪華經首字以字不成八字不就乍看是豈細讀如豆不若兩宜剜襟續袖德山托鉢巖頭末後榴花紅似火芙蕖飄暗香夜來風雨後零落滿池塘三年活甚參商令人錯憶修文郎洞山麻三斤龍鱗獨角碧麒麟火眼流光若電新金鎖玉欄留不住夜來飛上紫霄宸敲空有聲擊木無響喘月吳牛得珠象罔不必如之若何豈用心思意想直底直似彎弓曲底曲如稱幹棒打石人頭嚗嚗短幸底安能漏網興化擯維那蒼天蒼天長底搆不著短底探過肩漢王滴淚斬丁公東方朔割肉而傷廉王彥方德被鄉井感得盜牛人守劍之虔趙州勘婆子趙州勘破婆羲之好養鵝白毛浮緑水紅掌撥清波百丈野狐黃蘗赤鬚黃連性苦甘草性甜不落不昧窮漢賭錢贏得五百輸了一千嶽陽樓上春風暖為看桃花自卷簾不向驪龍求夜光野狐之説成商量可憐一段天機錦裂碎人間作小裳落不落昧不昧春風一曲薔薇醉溈山仰山摘茶體用只得用不得體沙裏無油卻有水只得體不得用龜毛拂子三斤重放子三十棒呵呵呵衣羅娘子自言俏三度下堂呼婢子國師三喚侍者端陽解粽中秋步月不是好事應箇時節彭祖奇壽八百歲有話不對妻兒説三呼侍者弄巧成拙侍者三應自失一橛天上月圜人間半月有恩難報朝提暮挈復云咄趙州鬥劣不鬥勝得便宜底常帶羞贏官司底常叫屈為甚如此小雪見雪囤米底折一橛黃龍三關我手何似佛手鼻頭底下是口若不是王老師機關險些兒證貓成狗我腳何似驢腳海龍王昨夜惡發連下了三日三夜石烏龜幾希曬殺人人有箇生緣不是花邊是柳邊呂洞賓嶽陽三醉張果老騎驢上天靈雲見桃花悟道一分春色一分華卻笑靈雲眼翳沙假若鄙夫無識見定知田服是僧家復斫額云㘞子湖狗子湖狗竹響風過便哮吼取人心取人首衲子望崖俱卻走縱使當時不渡江也被攔胸傷一口為甚如此駿獒原不受人驅司夜韓盧隨處有趙州佛性有無狗子有賣扇老婆日遮手狗子無種瓢先得喫胡盧天稟原來各不同盧同不飲劉伶酒乾峰舉一雲門出衆桃如是紅李如是白雖則各無言一一依時節鳥飛空而無蹤魚行水而不轍非因緣之他宗非自然之邪説問取露柱燈籠有口兩難分別疏山造塔羅山著語一文錢紛紛葉落正秋天兩文錢水光山色楚江邊三文錢杏花如雨柳拖煙不若南陽無縫塔官家親為發工錢至今獨鎮乾輿裏山海悠悠月自圜船子接夾山靈龜抴尾迹偏賒挂角羚羊事可嗟不若石人騎木馬臨宵解轡早歸家夾山接洛浦沈香亭下醉題詩寵辱相憐在一時雲月溪山同有異終身落魄夜郎西臨濟喫棒悟後還掌冶城鞴鐵沖牛斗黃檗偏遭霹靂手掀翻滄海蹴須彌陳衄修羅俱北走兒孫從此説家風羅剎江聲日夜吼金剛寶劍出鞘龍泉覿面揮臨機正令壯軍威徒勞擬思難回互腥血從茲濺衲衣踞地獅子鋒牙利爪踞崖前疊嶂春風華木鮮香象且無棲泊地野狐何事得躋緣探竿影草水滿平湖月滿川梢人難自定風煙要知入海堪行候且看雲飛出渡前咄請下一轉語一喝不作一喝用電捲星馳難側轉穿針石火休遲眼吹簫人在畫樓中華落鶯啼水清淺婆子轉藏轉全藏初三月挂梅枝上轉半藏春光深入蕉心放妹嬉尤物能亡國仙子修丹在蓬閬要得公案圜臭鶻臀揮三十棒香嚴擊竹仰山親勘悟在從緣得最親也勝紙墨遠求人從茲一擊清風起翠影蕭蕭抴四鄰雲門須彌山須彌山南州之北北州南腰躔日月天在頂李四不識問張三洞庭湖闊連天塹秋深水色湛如藍鼓山箭折奪路臨機自得宜寧知出馬被人嗤縱然箭折歸城去不受軍師暗裏欺凍儂老有鄉情黃河千載一時清果然豹有吞娘志兩箇黃鸝一樣聲瑞巖主人公瑞巖老翁喚主人公一聲霹靂打死雷公玄沙因我得禮汝因我你得禮對鏡勤梳洗一箇搽胭脂二人紅卻觜寰中大慈禪師云山僧不解畣話秖能識病時有僧出師便歸方丈霜摧秋葉滿秋山古路無人鳥自還出谷白雲飛不定數行征雁影斑斑趙州勘二菴主有口難言不共讎趙州陸地善行舟嚴陵豈肯從君命穩坐瀟湘明月樓趙州云佛之一字吾不喜聞佛之一字不喜聞長安爭看狀元新金花親賜金鑾殿不是當時窗下人恩可酬怨難申面南率土皆王土易姓良臣便不臣黃檗坐南泉位陷虎之機當仁不讓可惜王老師輸卻無頭狀鹽官犀牛扇子扇破之言卻好酬如何詰著便亡牛鹽官只為婆心切彼此都成第二頭東寺示衆曰心不是佛智不是道劍去遠矣爾方刻舟水村山郭自成家前後紅黃四序花漁舟傍晚不歸去深樹高棲亂乳鴉西園曇藏禪師一日自燒浴次僧問何不使沙彌園拊掌三下尋得桃源好避秦桃花又見一年春花飛已是隨流水引得漁郎來問津金牛舞飯龍得水時添意氣虎逢山勢長威獰黃河盡有通天路不是其人不敢行浮杯和尚凌行婆來參至為人即禍生覿面之機作家頗愛失之豪氂汞飛爐內後有僧傳至南泉至伎死禪和如麻似粟靈龜負圖兩彩一賽可悲可痛失錢遭罪一舉似趙州至幾喪目前機拈得黃金變成土塊碧琉璃瓶一錘擊碎雖然坦途好生險隘道吾雲巖一榮一枯雲巖春色滿皇都葉落根枯是道吾還有春秋俱不涉洞賓腰挂藥胡盧丹霞燒木佛院主墮眉鬚丹霞火浴三千佛院主眉藏五老峰莫道是非難辨別有錢何處不春風大顛擯首座一樣酬機動齒齗生緣難説共青春雷同若是登金榜誤殺英雄沒量人一釋迦二元和三佛陀自餘是甚麼碗躂丘釋迦元和與佛陀摩訶㗭達哩娑訶自餘甚麼碗躂丘六一居士歐陽修三山半落青天外二水中分白鷺洲百丈併卻咽喉脣吻卻請和尚道野火燒神離古廟折角泥牛飛過山風卷波濤雲渺渺和尚也須併卻大雪紛紛正飄攃藍關欲度馬難行雲裏仙人綰角和尚有也未泥塑天王打瞌睡寒山拾得笑歸來兩腳何曾踏著地人梅鼠聲即此物非他物杜鵑啼出猩猩血行人錯認柳梢頭春城幾箇知時節山有谷而藏雲水有淵而含月家家地上可栽松一任枝枝與葉葉南泉斬貓趙州頂鞋南泉有擎山之手趙州有掬海之能令嚴則佛祖攢眉法正則四海準繩分明白日昭昭也多少愁人暗裏行刀頭有物甜如蜜妙在善嘗不割舌趙老曾不動鋒芒爛嚼秋江一片月三世諸佛不知有黧奴白牯卻知有三世諸佛不知有自甘落魄沽清酒終日昏昏不舉頭猢猻海底翻筋斗黧奴白牯卻知有指揮日月朝東走端的難謾王老師癩豬生得子湖狗香嚴獨腳頌子啐母啄易子母兩亡難夜來霜重蘆枝折鷺鷥對對出沙灘鐘樓上唱贊床腳下種菜十字街頭石敢當離家日久卻思鄉鱸魚畢竟江南美蓴葉浮波橘正黃漸源覓靈骨敗子當時不做家卻來洪浪汰金沙犀因玩月紋生角象被雷驚華入牙針劄不入何處覓鐵鎚煮出黃金汁秦皇暴虐好焚書土壁泥牆幸收得大死卻活侯黑侯白此事誰言調不同原來到處有春風作家彼此皆堪賞竹杖投陂化作龍識藥忌正宗風可知版蕩出英雄興化打中間古廟裏堪避雨白日休言曾見鬼柳條芳草一時新池塘香透荷華蕊桐峰大蟲山裏大蟲山裏吼借你拳頭築你口丈夫氣寓信如王豈肯輸人甘落後賊賊賊喜底是風怨底是雪巖頭四藏鋒一就事藏鋒就事藏鋒理不詮秖於事上用綿綿黃鸝不為貪華住飛入橋西楊柳煙二就理就理藏鋒理最真晴空無地著纖塵鷺鷥夜宿蘆華裏秋水秋光一色新三入就入就藏鋒理事全白雲飛起正晴天青猿攀折香梨樹萬水歸江月滿川四出就出就藏鋒事理融一輪紅日正當空龍吟虎嘯宣何旨木馬泥牛調不同雪峰南山鱉鼻蛇好條蛇誰解弄動著驀然生罅縫長慶老不惜命出向人前誇口騁雲門拄杖似縣弧玄沙所貴言前定象骨山高草最深如何能得免蛇侵鋒牙吐毒氣熏天龍甲金精千百變學禪翁須子細十二時中切須避些些失照便遭傷鮮血淋漓腥滿地曹山井覷驢驢覷井尊中錯認弓蛇影井覷驢滾油鐺裏煮醯雞兩重公案一般參莊周蝴蝶二俱宜春回是處難藏隱瓊林華發珊瑚支禾山四打鼓嵇康精於鍛馮婦善搏虎紛紛衲子用心求爭似禾山解打鼓君不見有條攀處便攀條黃帝以蹴鞠而練軍武擬求禪道佛法高聲云苦苦苦雪峰火焰玄沙王令一番提起一番新續火傳薪用得親二老欲思重話會佛前銀燭笑頻頻阿呵呵荒田沒人耕耕動便來爭長慶二種語保福喫茶去如來語無二説稜公何苦霜加雪兒啼不止無奈何笑指精金即黃葉二種語喫茶去奪得錦袍稱及第稜公稜公休耳聾一輪月上海門東雲門對一説對一説較奇絶白額大蟲新出穴風行草偃吼如雷牛羊不見流鮮血韶陽老失一橛玉不雕而有文空已印而成訣寶軸盈海藏龍宮金章與法界齊説四十九年波翻海口三百餘會長空滿月只為逗教關機失卻從前一橛對一説萬里一條鐵雲門倒一説倒一説難語決鏤塵析縷重重説雲起南山雨又來大抵不是晴時節白白白梅花香冷霜天月雲門倒一説臨濟白拈賊虎養豹須防獅子解反擲月落潭有聲花飛侵草色柄殺活之威得權衡之訣倒一説躍倒繫驢橛雲門六不收金木水火土西天人打鼓驚動海龍王苦苦苦水晶宮裏日方午雲門日日好日日日是好日何勞魏闕頒春曆古今晷運送春秋虛空畫出龍蛇迹山蒼蒼水潝潝西江一口從容吸南高峰瞌睡了一生錯計小盡無三十雲門顧鑒咦已入吾門不再三祇於顧處越重關可憐擬議成塗路要轉靈機直下難法燈西來意版齒毛長白醭生嘮嘮猶説繼傳燈要知世代金輪子不受台銜俊髦稱倩女離魂那箇真離魂倩女忽還家堂上相逢不較些月下錯驚梅蕊落原來上下一枝華妙喜問僧五祖道趙州狗子無佛性也勝貓兒十萬倍如何僧云風行草偃喜云你也不亂道卻作麼生會僧無語喜云學語之流便打出狗子勝貓十萬倍金毛獅子草裏擂草偃風行不亂説妙喜大似白拈賊學語之流正好打囌嚕㗭唎吽泮吒竹篦子推位讓國有虞陶唐始制文字乃服衣裳此去三千里外切忌舉著為甚如此不見道雲騰致雨露結為霜鎮州蘿蔔鎮州蘿蔔青州棗萬物無過出處好爐裏煉底不是精金綈箱畜者還非至寶趙州本為定干戈惹得烽煙雲嫋嫋雲門乾屎橛雞冠華當當頂上胭脂搽秋初夏末紅滿園卻被杭州城大井巷裏張媽媽家滿頭插得向人誇高聲唱云好刷牙仰山明珠師子兒善哮吼明珠不惜當人剖匠石斫堊兮運斤成風良庖解牛兮曾未傷鋒犯手能明能暗兮黑月白月有擒有縱兮烏飛兔走超群還説石崇家顧指揮珍八百斗雪峰三相見相逢不在望州亭相見何曾在僧室杖頭果若有餘錢莫愁天下無相識烏石嶺上間雲濃淡太華山頂秋風蕭颯南嶽天台覿面逢高拱手兮低作揖馬祖一喝百丈耳聾霹靂一聲天地開銀山鐵壁已成灰誰言毒鼓無消息百丈魂褫當下薶有機用絶安排電光影裏雨華來江西從此宗風立法令嚴行遍九陔平常心是道古今天地乾坤來往星辰日月寒則寒殺闍黎熱則闍黎都熱山高翠嵷雲霄水遠滄茫不輟春回是物生光柳絮紛紛似雪雲門胡餅聞聲無道悟睹色無心見一箇鐵囫圇大地成一片細讀寒山詩飽喫青州麵觀音買胡餅青天飛閃電龍牙二鼠侵藤二鼠齧枯藤渠儂善隱身天寬覆不及華開不遇春胡僧無覓處佛眼覷難真龍牙機辨捷一語見君臣審卞畣僧問佛法大意貧兒抱子渡恩愛競隨波滔滔雲影共天流切骨恩情不忍投兩岸蘆華飛玉蝶半江秋色一腔愁玄沙三種病人閉門打睡草萋萋客到何妨三轉泥若肯同居分脫粟自家有病自家知鳥窠吹布毛長林幽鳥謾嘈嘈嫩柳臨風舞翠濤富貴春城誰不愛引人徐步上林皋高峰無夢想主人公青年負俠骨操鎚擊秦主臣事漢高王報韓心未死定鼎戮力非臣功挂冠辟榖歸赤松阿呵呵垂條春曉水西東十二樓臺路路通所愛風光只如此一溪流水落華紅高峰枕子墮地富春居士釣江磯得味無如茹蕨薇不意羊裘囊穎露動他星象宿宸圍枕子落夢初歸月照梅花淚溼衣丈夫心事誰相委白雁數行霜夜飛西院兩錯獅子反擲象王回踽孔夫子失了仁義禮智卻是他自家言語羿之妻竊得一丸靈藥倒做了月中之女琅琊覺法華舉匝匝清風遍寰宇錯錯錯不須提起深明二上座見捕魚漁歌一拍蘆華雨鷺鷥驚入秋煙裏向來羇宦長安遊此幸承間步清滸蘇公蘇公刎頸交如何草具酬知己香巖上樹月色遲遲舞鶴橋香嵒公案利吹毛當時祇道簪纓美誰識孫登一嘯高出其類在吾曹拈來瓦礫等瓊瑤莫從樹上尋消息聖主何曾一姓堯父母未生前父母未生前無星稱子兩頭縣莫從傀儡尋消息須知定有裏頭牽栽五柳憶陶家停車坐愛楓林晚霜葉紅於二月華五位偏正有序虛空著色畫出劫外真容白日挑燈照見當時面目如劫前未兆可以墨上加煤事落今時難辨雪中有粉故知言無其言鼓橐籥之宮商事無所事敲秋雯之髓骨惟證據者知之也正中偏秋光雪影楚江天寒鴻不到蘆華岸隱隱山河色未全偏中正嬰兒白髮羞窺鏡梅華雪裏最難分烏鴉點破寒光印正中來泥牛踏破石蒼苔鳥飛雖到華枝上啼盡春情不染埃兼中至露刃交鋒撤紅幟揮戈指日戰猶酣劍去刀來善周致兼中到庖丁善得屠牛道一般鋒刃用來殊不落庸情方得妙答即念法姪夢話二十二問并頌問如何是佛答猢猻喫苦瓜怨家生劫難回互卻遇雲門恨轉賒滿身有口難分説餓久猢猻喫苦瓜問如何是法答閫外將軍令朝中天子宣塞外將軍令最嚴朝中誰敢悖君宣如今海晏河清日處處謳歌樂舜年問如何是僧答錫杖撥開金世界袈裟斜搭晚來雲錫杖撥開金世界袈裟斜搭晚來雲異時展鉢吞銅汁帶角披毛共一群問如何是法身答瞎子不眼華瞎子從來眼不花騎牛終日不還家溪邊捉得烏龜子産下高飛赤老鴉問如何是透法身答騎驢上火牆騎驢上火牆蘇武牧羝羊昔時人已老歸家笑一場驚走新媳婦東山水上行問如何是向上事答今歲天多雨米價不如常問豫向上事老鼠喫生薑今歲天多雨米價不如常問如何是向下事答愁殺李將軍手拈黃葉笑殷殷為止兒啼喚作金烽煙未息邊多事一時愁殺李將軍問如何是最初句答嚼飯餧嬰兒少林面壁強安排多少英雄掘地薶識破英雄關捩子何須沈醉舞三台問如何是末後句答屋裏販揚州掣電之機亦強為只祈當下自知歸西施若不來吳國勾踐如何霸九畿問如何是道答猛虎挂金鈴石女秋深夜擊砧方知枯木裏龍吟原來祖道無他故只要檀郎認得聲問如何是禪答迷人不問路困人窗下憶鵬程豈道詩書不誤人相思何事關情急一樹桃華幾度春問如何是宗答教書不識字宗緒繇來立祖翁各隨門戶顯家風奈余邋遢居村里數樹春華幾樣紅問如是日用事答新婦下廚房紫芋新煨午膳香隨緣事事得尋常泥牛從是歸滄海展腳高眠折腳床問如何是衲僧巴鼻答湘江水倒流不因吸盡西江水那得中峰向下垂可惜至今無定迹依俙拈作雪峰蛇問如何是衲僧拄杖子答窮漢哭家親一條白棒專打龍象佛祖若來當仁不讓無根無枝難比難況有人問我是何宗秋高月照梧桐上咄又道難比難況復云參問如何是洞上五位答除夜舊門神君義臣忠父慈子孝要嫁竹夫人土地前討笤報道石幢子生來多不肖且道侍奉一句又作麼生若還借借終不妙問如何是三要答棺材屋裏挂鍾馗大蟲帶紙帽驚人又好笑老鼠打壁洞貓兒愛鑽灶為甚如此不見道不許夜行投明須到問如何是三玄答啞子看西廂第一玄月落不離天第二玄薑維一計害三賢第三玄繡針眼裏打鞦韆第四玄自笑云多了一玄了呵呵呵關主鬍須落半邊問三玄三要是同是別答閉眼食蝸牛一場酸澀苦若道同十箇駝子各有宗若道別紛紛大雪難分説癩子唱箇謊山歌碧眼胡僧都結舌我也似矮子看戲你若笑時我眼熱問如何是四料揀答西湖猶説林和靖奪人不奪境謝隱山華開似錦奪境不奪人汝州山畔楚王城人境俱不奪洪都江渚滕王閣人境兩俱奪塞外將軍無勳爵祖翁立此別邪宗等間漏網成虛謔問如何是四賓主答華子拜財神賓中賓抱璞投人不賞音多少夜明簾外過頑鐵如何點作金賓中主是誰能敢鋒前語二月寒風愁殺人宇宙橫行難伴侶主中賓秋風吹起海天雲當鋒寶劍吹毛利若箇龍門運斧斤主中主修羅躍倒須彌柱四海波翻怒不休此來失卻金師子滿腔心事語人難空向松窗耐歲寒主主是誰相續得賓賓錯認失邯鄲主賓倣佛門庭事賓主依俙悟後看豈是強猜心意識珠圜不撥自周盤問如何是九十七圜相答狗不咬家人圜相有六所謂相曰暗機曰義海曰意語曰默論曰回互咄住住住恁麼説話好似數他家寶祖師門下有甚交涉阿呵呵且道笑箇甚麼不見道將酒酬人意不差靈龜特地自生嗟暗機夜奔文君女義海難明鱉鼻蛇問答不搖三寸舌有言何必五乘車耽原遠授手繇茲各一家烏石因雪峰扣門石問誰峰云鳳凰兒石曰作麼生峰云來啖老觀石開門搊住曰道道峰擬議石托開掩卻門峰住後示衆云我當時入得老觀門你這一隊噇酒糟漢向甚處摸索鳳凰兒善錐啄烏石峰頭雲漠漠翻騰碧浪覓金鱗幾箇解尋師子躅悔悔悔恨不當時下一錯古德喫油餈日上扶桑遍界暉竹林新汲啓柴扉問津小艇偏多語逗得郎君笑眼微頭上花枝照酒卮酒卮中有好花枝身輕與世太平日眼見六朝全盛時
