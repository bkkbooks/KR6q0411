body:
  text: 住雲門顯聖寺門人淨範編山陰嗣法弟子祁淨超較訂住越州雲門顯聖禪寺語錄山門八萬四千門門門一切境白狗上樹烏驢落井大殿佛身充滿於法界普見一切群生前大眾覿面相呈又作麼生展坐具云蓋覆卻伽藍金湯佛法干城淨侶灶底要有柴鍋裏要有米禪道佛法不勞重舉祖堂來時無口去時無舌且喜諸公鼻孔依然拈香云以此為驗據室騎虎頭收虎尾第一句下明宗旨拾得師樺冠楮衣達磨老當門缺齒謁當山先湛老和尚像昔既非親今則成冤華開銕樹火裏紅蓮上堂拈檀越疏云大眾莫被者毛錐子將黑荳換卻眼睛鳥篆龍章紙墨文字秪可作世諦流布豈可作佛法商量且道如何是佛法度疏與維那云你試念看法座未有世界先有此座十方諸佛不敢正位歷代祖師秪可旁立山僧今日倒騎佛殿順跨山門且道卻為何事卓拄杖云若不登高望焉知滄海深陞座拈王臣檀護香訖復拈云此一瓣香根生靈鷲葉覆娑婆今日拈來卻為山僧二十年前在瓶窯燒得一擔破砂盆自謂奇奇特特誰道雲門路滑和身跌倒人天眾前不敢覆卻奉為顯聖堂上傳曹洞正宗三十二世先散木大和尚用酬法乳之恩白椎竟師云若論第一義華擘了也向山僧未屙已前薦取早已落七落八況在文字語言白雲萬里除此二途君子可八萬不得已借路經過聊塞一時之責驀豎拳云此是老和尚一生用不盡的餿殘盂上座貴買賤賣不妨奇特屈指云一二三四五南贍部洲普請北俱盧洲打鼓七金山下乾闥婆阿脩羅迦樓羅聳身起舞須彌山頂帝釋天主高聲唱道汝等佛子各各本有靈明玅智與剎等世界等諸佛等菩薩羅漢賢聖僧等眾生等神通等玅用等說法等壽量等相好等光明功德等拂一拂云這一絡索向甚麼處去也風從華裏過來香水向石邊流出冷度僧上堂甘霖彌八極起枯槁於田疇德澤被三根麗芬芳於原野法無定相是處可以圓融理絕自他隨方不妨建立是以道人行履迥異常情有時獨足立於萬仞峰頭把臂行於際天洪浪縱使一色邊也須盡情鏟卻果是無瑕玉也要一椎擊碎遂拍案云呵呵呵前無村兮後無坫雨過谿塘柳如線青簑綠笠舊家風吹落荷華三四片擿拂云鑑祈雨上堂拈拄杖云震法雷兮鳴法鼓山門頭彌勒開眉布慈雲兮灑甘露塔尖上商羊起舞四海龍王腦門裂三十三天叫冤苦雲鎖趙州關雨打雲門普拈起一豪端塵剎無焦土於此作佛法商量笑諸君從頭莽鹵所以此一著子大似龍王行雨不從龍王身出不從心出不自雲生亦非空有以不思議力時行雨事成熟穀稼繁長艸木大眾既不從身心空雲中出且道雨自何來卓拄杖云赫連皇甫爾密和尚入塔上堂白椎竟師云若論第一義適纔密兄道過了也山僧仰不得已赴眾賢姪之請只可依科順釋據理分章擊拂一下云二繇一有一亦莫守雨餘松徑苔錢滑水到石頭聲轉高若是白雲中坐任繡幃裏藏身堪作甚麼所以沒量大丈夫去住自繇非凡情之所測識播弄乾坤棋分嶽瀆黃金鑄就銕疾藜到口便吞白玉碾成金剛圈橫身直過鍼鋒上走馬錢眼裏鞦韆其住也虎踞嵒前其行也龍歸渤海回視以鷦鷯窩為玉殿瓊樓鼷鼠穴為廣宮大廈可謂崖州萬里山僧作恁麼語話密兄聞之不覺絕倒大眾你道笑箇甚麼寶鏡堂前萬竹圃雨一天雲一塢丈夫經濟平生肺腑以拂左擊云趙州關右擊云雲門普中間一擊云帶月擔泉和煙取火上堂舉僧問趙州云萬法歸一一歸何處州云我在青州做領布衫重七觔這老漢潦倒龍鍾齒不關風山僧即不然今日十月初一種麥刈禾俱畢知事行人收收拾拾不勝勞力堂中首領執事上單下單與你同休同戚獨有山僧隨例打鬨兩飯一粥坐方丈樓喚侍者開卻前窗後窗看他落霞孤鶩齊飛秋水長天一色從上來這些禁鬼神底符子我今為你分劈乃舞拂作噴水勢云太上老君急急如律令敕上堂最相應豎拂子云這句子不起於此座可以超生死眼裏著卻須彌山耳裏能藏四海水蹋翻四部洲身如葶藶子口中不斷玅伽陀頭戴華冠手持杵擊拂一下云我見燈明佛本光瑞如此上堂芭蕉碎剪難添線霜葉因風落似華最惜上林蕭索也不知華發在誰家謾咨嗟到得一番寒徹骨豎拂子云且看雪裏一支斜上堂時值雞唱師云叫一聲應一聲聲聲喚出本來人左右顧云情知汝等向四大裏作活計復云大眾窗外紅冠上座從曉至昏為你提綱挈領你總不會適來鼓聲帶我披帽鐘聲穿我艸鞋走入廚房裏得罪了普賢菩薩回到僧堂中觸忤了文殊大士只得向佛殿前高聲唱云若耶谿上雲門寺萬竹林中最深處我是觀音獨露身為君拔卻眼中刺大眾大眾頻呼小玉元無事上堂舉拂云向這裏見得徹去七穿八穴東涌西沒便向糞埽堆頭拈起一絲豪許可以塞破虛空平沈大地盡十方世界是箇眼睛你向何處顧盻盡十方世界是箇鼻孔你向那裏喘氣然後轉過身來七珍八寶填溝塞壑無有寸土不是金鋪玉甃瓊樓珠殿寶樹華臺隨身受用切忌向缽盂內經行裏著衣喫飯迎賓待客邊作窠臼立牆塹豈不知顯聖這裏滴水滴凍偶然咳嗽一聲也遭他簡點良久云如何得不遭他簡點豎拂子云玅法堅手天華鬘天四王天忉利天夜摩天他化自在天乃噓一聲下座上堂夜來月色溶溶今朝煙雨濛朧誰家華表柱水上賣東風一箇衣綠一箇穿紅衣綠者手撥琵琶穿紅者羯鼓鼕鼕高聲唱道應物見形如水中月豎拂子云佛真法身猶若虛空擿拂子呵呵笑云到頭辛苦到頭窮上堂今朝十月有十五兩箇孩童弄華鼓左邊打了右邊舞露柱與燈籠聲聲叫怨苦鳥啼兩岸蒼黃猿叫千山月午良久顧左右云大眾莫莽鹵上堂好休休去不休休白首登科戀墨裘黃菊謾誇霜後色白雲紅葉滿荒丘舍利弗沒來繇劍去徒勞更刻舟果然世系金輪子豈肯要功萬戶侯大眾且道舍利弗悟箇甚麼良久云兩段不同消歸上科上堂漪漪脩竹千竿清沁一谿流水有智不在多言好景何藉華卉笑他聚石譚經無事聽閒人說鬼可惜日居月諸底事如何不委若要委且看銕樹生枝華開碓嘴上堂疏雨打窗清夢裏好山深鎖白雲中有題最是難藏覆竹浪蕭蕭一夜風百艸頭識取祖師艸枯了也鬧市裏識取天子市散了也與諸兄甚處相見良久以手招云猩猩我與汝相見了也上堂尋常肝膽向人傾底事堪嗟葉滿庭好句不知誰領得寒鴻依舊宿沙汀釋迦老子說法四十九年譚經三百餘會撮東風達磨航海西來撮東風歷代祖師陞座說法撮東風眾中有箇師兄突出眾前高聲大叫盂上座你恁麼道也是撮東風可謂出乎其類拔乎其萃大眾你道他具箇甚麼眼便敢恁麼良久云撮東風上堂山頂月微微林外雲無跡不見渡頭人獨自谿邊立以手招云在者裏休相憶令佛放光明助發實相義當日山僧若在座下拄杖子決不放過秪如不放光明實相義那裏缺半邊何處失一角南北何曾長東西何曾潤紅日豈從西出明月豈從東落只是你諸人眼裏耳裏聞見熟了頭頭放過山僧作是說時主山案山一齊冷笑不禁且道笑箇甚麼主山道長老只見錐頭利不見鑿頭方你道頭頭放過病在于何有禪有道是病有佛可成有法可得有眾生可度是病案山道你只見鑿頭方不見錐頭利豈不聞病從心生心從業生業從妄想生妄性本空不在內不在外不在中間于病何有心無病故一身清淨一身清淨故多身清淨多身清淨故一切眾生清淨眾生清淨故世界清淨一世界清淨故盡十方世界一切清淨喝一喝云若不喝住直說到明日拍案一下云誰家蕭管梅花引惹得春風入戶來上堂曲不藏直真不容偽寒鴻至而霜滿林黃鳥啼而春光媚得之于心者一塵一佛國失之于旨者觸樹而迷昧擊拂子云碎上堂道吾舞笏小神通石鞏張弓失楚弓堪笑西河弄獅子一拳打殺岑大蟲豎拂云總不若山僧此拂子在眾生喚作現行無明在諸佛喚作根本性智在他分中無可不可無彼無此有時以根本智作現行無明有時以現行無明作根本智所以眾生淳如也諸佛淳如也世界淳如也虛空法界淳如也然後興大慧雲布大法雨使一切眾生從大夢覺具頂門眼方知道嵒頭鍼鋒上有無邊世界靈照菜籃裏有百億須彌禾山擊著塗毒鼓聞者喪身失命雲門胡餅騎聲蓋色超今越古然雖如是還我翠嵒眉毛多少長達磨鼻孔幾許大罷罷罷休休休山青水綠聽取雲門一曲以拂子置案上作撫琴勢連揮拂子云玅玅玅純如也皦如也繹如也擿拂子云以成上堂連宵好雨初晴遠山疊翠碧水生瀾正恁麼時有一句子蹋破艸鞋赤腳走金毛師子雲端吼海底波斯暗展眉八臂那吒難下手投老歸來事事空翻然一笑無何有擊拂子云三三成一九長至上堂今日一陽復始窮漢搖頭擺尾眨眼之間會見千紅萬紫諸禪德好箇時節諸佛出世祖師西來也不過為此箇時節歷代宗師激揚酬唱亦為此箇時節盡大地艸木叢林人天諸趣蠢動含靈一舉一動總是此箇時節不料汝等一隊懞懂漢見山僧上堂便延頸舉踵及乎一下座去松風竹韻犬吠雞鳴尋常放過就不關你事了也但只聞鐘響念功課也聞打鼓上殿也打梆普請也打木魚喫粥喫飯也山僧恁麼舉揚以袖掩面云羞殺我也復云東方朔平原厭次人值雪上堂一片兩片佛祖正眼覷不見五花六花八臂那吒不敢拏落地無聲混沌銀成世界太平有象天開玉砌樓臺最苦鷺鷥無處避飛上松梢有時白鶴共翱翔寒空清唳一色邊坐住元非本地風光潔白裏安身豈是到家消息文殊不出頭風來時滿林狼藉普賢呈醜拙日出後一場懡㦬今日檀信不在家中受用紅爐煖閣得得入山將珠塵玉屑輕輕攃向諸人面前更要山僧說些閒話向雪裏送炭好雪呀片片不落別處且道落在那裏豎拂子云求福者福臻祈壽者壽永求消災者災消禪德家又作麼生雪與梅共嚼不惟齒頰生香亦且清芬腸胃歸堂去試嚼看上堂描不成兮畫不就山光飄渺水連天髑髏有眼看霜葉枯木龍吟古路邊逢迎處吾無隱乎爾何必道象帝之先幽禽處處呼人夢莫待春風聽杜鵑上堂隔林殘月曉諸峰竹色霜華薦朔風山得我遊權有主雲過西嶺碧玲瓏若物屬他他所守護世間一事一物總屬于人惟谿上清風山間明月儘可以適性怡情取之不盡用之無窮是所謂造物之無盡藏也卻又被拄杖子管轄沒奈何只得行則偕往往則同居休戚相關性命連絡渠得我如虎靠山我得渠如龍遇水山僧偶然瞌睡他便作怪去也聳身上忉利天擊著帝釋天鼓爾時天鼓作如是言人天諸佛子還識拄杖子麼有句無句頂天立地上無片瓦盍頭下無卓錐之處遇富貴而不驕居貧賤而不媚能使蠛蠓醯雞浩然之氣塞乎天地螳螂蛣蜣淨智光明遍乎寰宇續佛祖之命脈作眾生之本智如我鼓聲不從內出非從外來亦非空有以不思議力出此音聲復鳴云鼕鼕鼕山僧此時驟然驚覺拄杖子依然在手驀舉手云呀原來是空手分明香在梅花上尋到梅花究竟無上堂耿耿寒燈勞睡眼其如所稟天資淺不若當時般若多羅老瞌椿常轉如是經百千萬億卷化城固虛設家鄉去不遠秪如寶處在近畢竟在甚麼處良久云險請寶壽和尚上堂引座澄江清淺時白鷺和煙島良哉觀世音全身入荒艸古人恁麼說話雖則如駭雞犀驪龍珠山僧則且不然松陰野寺遙堆積無人掃清風來故人竹暗啼幽鳥畏寒烘焙煖貪眠不覺曉歲月成蹉跎可惜衣中寶大眾如何是衣中寶以拂子連拂云曼陀羅華曼殊沙華栴檀香風悅可眾心喝一喝云下座同請寶壽和尚說法上堂霜重蘆花柳岸低一鉤新月釣寒谿金鱗已是無消息又聽前村報曉雞鍾樓上撞鐘牆腳下種菜猛虎山裏踞大眾且道與古人回互不回互以拂子左擊云回而更相涉右擊一下云不爾依位住送六如禪師入祖堂上堂頭枕須彌峰腳抵雲門麓芥孔裏遊戲大海中洗浴是葛天氏無懷氏混沌氏之流從來不受官家祿手持斷貫索神號而鬼哭今朝荊門上座送六如法兄木主入祖堂便抴條竹杖子要來顯聖這裏量香爐峰幾許高探耶谿水多少深山僧略施神通香爐峰已被雲遮了若耶谿被霧掩了無計可施別行一路拏了些砒霜巴豆飯裏菜裏水裏都放些些大眾切防喪身失命山僧抑不得已將六如兄留下底雲門餅供養大眾去也以拂子打圓相云一把柳絲收不得和煙搭在玉欄干上堂丈夫兒無等級所以人天不可測行藏著著異常流豈肯隨人畫模則廣南珠作麼色白月白兮黑月黑大眾如何是五百弟子衣下明珠師作咳嗽云失上堂豎拂子云大眾這句子與三乘十二分教是同是別同同同一聲羌笛白雲中別別別蘆華攪亂江天雪除卻同異兩重關露柱燈籠熾然說喝一喝云也是證龜成鱉解制上堂風吹上馬石雨打望僊橋聖僧前問訊山門外伸腰烏鴉飛過嶺白鶴立松梢顯聖這裏氣宇如王頂天立地艸鞋似虎拄杖如龍就是缽囊鞋袋鍼筒帽樣也會放光動地超佛越祖說甚麼雪山六年苦行冷啾啾地末梢頭又道睹明星悟道舉頭望琉璃云山僧今日睹見琉璃且道悟箇甚麼驀拈拄杖擿下云不是下座上堂脩多羅青天雲翳老瞿曇眼中一刺四十九年雲行雨施末後又道我未曾譚著一字盂上座也是抴尾靈龜無事生事不見道如虎之缺如馬之馵上堂穿靴赤腳走面南觀北斗我腳是驢腳我手是佛手用盡自己心笑破他人口更有一句子大眾還知否良久云曹山顛酒元旦上堂舊年今日新新年昨日舊新舊自遷訛梅花一枝秀俊哉拄杖子不肯隨人後是以衲僧家有格外提持別行一路釋迦老子不降生達磨祖師不西來堆山積嶽填溝塞壑若還向他語脈上躋攀舊路裏挨排何異矇人離拄杖寸步難移顯聖今日懸斗大之膽開謾眾之口灑灑落落自繇自在拈須彌山卓你眼裏掬四海水灌你耳中運阿脩羅手拊摩日月廣舜若多身塞破虛空然後隨分甚麼油煎馬杓酢浸擂槌新換桃符陳年爆竹一事一物氣宇如王向毘盧頂𩕳上大方潤步神歌社舞鼓響鐘鳴都可以振提矇聵起發將來三藏教詮顯不著歷代祖師拈提莫及且道如何得恁麼靈玅噓一聲云掀翻海岳求知己撥動乾坤見太平回院適誕日上堂自離真寂來歸顯聖在山僧分中所謂泥上偶然留指爪鴻飛那復計西東拈拄杖云總不如此木上座無去來今絕爾我想靈枝永秀智種常明齊無量壽為日暮總法報化為一身外絕遮攔內無藏覆你諸人舉足便蹋著他影子開眼便看見他光明屬耳便聞他音聲只恁麼尋常過了山僧不惜與你通箇消息卓拄杖云但願春風齊著力一時吹入此中來上堂大眾莫道檻外微陰正好搪風抵露直教蓋覆人天一箇箇不致風吹日暴所以道此事不在言詮秪貴心領神悟月照一簾秋水夜半正明雲藏幾處峰巒天曉不露類之不齊亂落樹頭紅葉混則知處淺水銀砂白鷺透得趙州關不重雲門顧且道以何為驗正是不欺之故上堂恁麼也不得不恁麼也不得恁麼不恁麼總不得潦水靜而寒潭清煙光凝而莫山赤我適曾供養豎拂子云今復還相識合掌云南無藥王菩薩摩訶薩摩訶般若波羅蜜上堂取次閒行看暮鴉白雲依樹便成霞首題最是難消釋錯恨瞿曇欠作家世尊拈華如蟲禦木迦葉微笑偶爾成文只如前谿一帶水不待拈而知其水也遠山數點青不待笑而知其山也卻來觀世間猶如夢中事恁麼告報猶欠徹在且道過在於何也是矢上加尖堆頭添土上堂是則穆王騎八駿馬非則紀信駕九龍車事事無礙霜橫籬落華猶在法法無差鷺鷥谿上啄睛沙直得是非不立理事兩忘鵬搏萬里鳳翀霄漢若是死守寒崖蚖窟蛙墟堪作甚麼大眾觀世音菩薩來也以拂子作吹簫勢云咿唔咿唔松間驚起鶴飛去數點殘霞接斷雲上堂火燄裏拈得眉毛大海中尋得繡鍼慣打漫天網子怕見清平世界向者裏挨身而入纔有你說話分若是山河大地煆煉得無有織毫過患如新磨鏡水洗一樣只是把纜放船抱橋洗澡更有箇漢將佛祖言教諸子百家束作箇枕頭長伸兩腳終日打眠佛來摩頂授記他也不采祖師送禪版拂子與他他也不要泰山崩於前疾雷震於後他也不動山僧且疑著這漢拈條紙撚悄悄向他鼻孔裏一通這漢也忍俊不禁打箇噴啑依舊將三藏十二部教諸子百家一時傾出何以如此夾路桃華風雨後馬蹄何處避殘紅上堂新豐一句當陽道破不涉唇吻已成露布細雨濛濛黃花滿路打失衲僧鼻孔忘卻邯鄲故步古鏡臺前幾多錯誤大眾一切眾生皆繇不知常住真心性淨明體用諸妄想此想不真故有輪轉且道既不用諸妄想畢竟用箇甚麼左右顧大眾云骼東山諸法姪過顯聖掃塔請上堂未老先驚鬢髮秋陸沉季子弊霜裘徒知年往無生計日操南音學楚囚蒼天蒼天先兄若在山僧必不致恁麼敗落此老漢一生來抖擻精神拳倒了舜若多神踢翻了須彌山王呼喝之間四大部洲縮入藕絲孔裏只差些性氣不馴至使艸枯蓬斷猶幸有麟趾振振鳳羽翩翩山僧所以不甚寂寥如今總無他說所慮諸兄弟向靛缸裏漂白酒甕裏籤油沒奈何只得將先兄遺下底破家破伙提掇一上遂豎拂子云此是他趕蚊蟲過底要他作麼乃擿下復拈拄杖云此是他打癩狗過底要他作麼亦擿下乃噓一聲云曾經三峽猿啼處不待三聲已斷腸上堂丰標太古雕繪今時月色共星河散彩梅華與雪浪爭妍澄江如練碧落無瑕正恁麼時尊而無比切忌向十字街頭遇著箇揚塵播土漢不免惜破甑於回頭驚蜂蠆於掉臂設使透過無厭足王底牢關覷破勝熱婆羅門底機械須信衲僧家更有向上事在今日檀信要與山僧相見於三千里外不妨奇特直得耶谿水逆流秦望山起舞盡大地艸木昆蟲一時間轉凡入聖何以見得過頭拄杖齊眉帽子獨自行喃喃語石傘峰前雲門路裏茫茫煙霧瀟瀟雨數點鷺鷥飛起喝一喝下座先湛老和尚諱辰上堂舉僧隔窗問石霜咫尺之間為甚麼不睹師顏霜云遍界不曾藏大眾不曾藏東風搖抴柳絲長紅肥綠瘦紛紛蛺蜨度危牆燕子雙雙遶畫梁遂作彈琵琶勢云漫剔銀紅夜深獨自理宮商喝一喝下座上堂天地與我同根萬物與我一體秦望山為頭大峰山作尾遊偏了四大部洲托生在三江城裏當初姓張如今姓李資積富稱敵國終日愁柴少米且道是甚麼人拈拂子擊左邊云露結為霜擊右邊云雲騰致雨上堂搖拂子云一聲雞唱夢初回雁帶新霜數字來好箇祖師親切句向人開口惹人猜昨日三今日四要得茅塞開拔去了眼中刺衣冠美丈夫豈可無此志大眾昨日釋迦老子從山門裏來被山僧一頓拄杖打出去爾等寒症未除喫一粒米也可成疾左右顧云險些反輸一帖謝兩序上堂大業不論功大悟不存師龍門躍鱗不墮漁人之手來儀彩鳳豈入庶子之家山僧與古人可謂同港不同舟不見道南山有竹不扶而直筈而羽之其入不愈深乎北溟魚化不假他緣風培雲擁其飛不愈疾乎拈拄杖云渡水穿雲全憑渠力且道是甚麼力摘楊華摘楊華解制上堂雲堆浪打竹枝邪不見梅華見雨華無限白雲渾似海不知何處有人家然雖如是山僧有時恁麼泥豬癩狗氣宇如王有時不恁麼三賢十聖飲氣吞聲看看逗到末梢頭就是釋迦老子也只得和盤托出況是諸兄臨行之際山僧如何忍俊得禁沒奈何今日缶瀉河傾去也乃咳嗽一聲下座大悲菩薩開光上堂知人法無我煩惱及爾燄常清淨無相而興大悲心一目二目八萬四千清淨寶目一臂二臂八萬四千母陀羅臂金色臂騰耀古今青蓮目橫亙十方初不因山僧未至少卻一目又不因山僧已至增卻一臂然雖如是今赴請至此又不可一往拖順風旂打太平鼓去也拈拂子云山僧拂子善別機宜巧於冥應有時東山水上行有時北斗裏藏身一莖艸見丈六金身一微塵見大千手眼縮四海水入一豪端納須彌山芥子孔內直得海龍王發惡阿脩羅動瞋帝釋天主再三勸勉道觀音玅智力能救世間苦十方諸國土無剎不見身且道見甚麼身喝一喝元旦上堂隔得一日添卻一歲長汀憨布袋無錢終日醉卻笑盧行者黃梅去舂碓辛苦幾多時依然道不會致使兒孫輩成群而打隊大眾千說萬說總在今日今日若清楚得去不必得橫挨豎拶便能懷揣日月袖納乾坤山青水綠萬紫千紅不著一些兒氣力都領略了也不管他缽盂大小淨缶闊狹總在裏許拍手大笑云獨有山僧不在裏許何以見得有名閒富貴無事小神僊上堂明月照華胥國土白雲籠金閣寶坊於斯也有人焉而不知誰之嗣柳生乎肘腹栽松樹我知之矣繇是之故我不敢輕於汝等汝等皆是是箇甚麼顧左右云賊薦亡僧上堂山色蒙茸春光明媚豎拂子云獨有這箇迥超物外復擊一下云一擊粉碎然雖如是佛界則可魔界未在須得向破沙盆裏陶鑄一番折腳鐺中煆煉一上一任落花飛絮風打成堆水流夾岸藻荇參差然後羚羊挂角也得獅子嚬吟也得佛界裏作班頭魔宮中為首領也無不得今日心蓮上座將四亡僧鼻孔一串穿卻向山僧這裏要發付箇下落還著在佛界耶魔界耶聞說鶯啼在楊柳如何尚有未開華喝一喝上堂楓無賸葉瓦有重霜寒鴻健翮夜過錢塘日居月諸一切尋常萬法歸一一歸何處謾說青州布衫朝日上團團有事不相謾芭蕉難補袈裟破山月重新窗外光送先湛老和尚入徑山祖堂覺浪和尚請上堂未有此山先有其人未有此位先有其道是其人則山道兩忘契乎道則人位雙泯然後可以坐斷十方陵鑠今古到這裏諸佛不敢正坐祖師秖可旁立若萬仞懸崖相似且不許你攀仰況遊歷乎萬不得已說有箇絕頂句子如凌霄峰只可從偏徑而入有般漢纔到得半山亭便恁麼去更不知有向上一路在審如是則何以見有空中寶閣幻化瓊臺翠遶松杉森圍古寺所幸有徑山法兄公天下無我之心定古今不易之論越阡度陌互為賓主左手提綱右手張目向高高山頂打箇漫天網子盡大地魚龍蝦蟹無地藏竄山僧恁麼道有箇漢出眾高聲云秖如龍門顯聖又作麼生大眾雲幕幕水滔滔但見樹老不覺天高就是顧虎頭吳道子有筆難描以手招云大眾大眾飯後閒行何處不凌宵復喝一喝下座上堂破曉春霜壓殘雪梅華弄景寒香冽多因為惜隴頭春折向人前歎奇絕豎拂子云釋迦老子秖得一橛要得完全聽吾重說遂下座上堂好生怕殺陞堂鼓侍者憨頭不知苦提衣催我上高臺枯腸無字從人吐孩提失讀上大人於今老大將何補最喜華亭船子風煙簑雨笠清江浦一切智智清淨無二無二分無別無斷故松顛早晚弄波濤寒窗帶月連風舞結制上堂指座云大眾看看須彌燈王如來玉齒嘮嘮咬文嚼字太無厭生山僧為你剿絕去也良久噓一聲乃陞白椎竟師高聲云龍象眾還聞麼木上座與磬長老互相激揚一槌之下敲出諸佛骨髓披瀝祖師肝膽汝等耳又不聾更何假於山僧設使山僧見出三頭六臂左手擎著須彌山右手掬著東海水你又道是山僧捏怪不得已脫珍御服著垢弊衣隨你顛倒一上大眾如何是顛倒良久云今日結制上堂夜深紙帳梅花冷嘗思羈客回鄉井今朝且喜得相逢不是相逢弔孤影豎拂子云如何是還鄉句子糞火煨香芋松子煮龍泉飽食香田脫粟飯放下拂子云日高三丈我猶眠到吼山請上堂攜笻獨自步睛沙風卷霜林似落花犬吠只疑門有客原來竹裏有人家大眾且道是甚麼人家還是彭澤五柳還是右丞輞川山僧只是不能忍事往往向人道破放年籤相似不管人要不要送上門來然一生止有者點熱腸別無長處倒弔起來要點墨水也無昨日受請勉強打點得幾句及乎陞座卻一字也忘了罷罷罷休休休四十餘年早白頭破衲勝重裘水邊林下得優游處且優游青目睹人少白眼笑王侯殘霞落盡前峰外又見飛鴻過渡頭雲門云六不收上堂鐘鳴鼓響下堂來鬱鬱慚惶撥不開若問舊時閒骨董風吹黃葉滿蒼苔大眾古往今來列聖相傳原秖得這些子間或倚門傍戶沾著纖毫氣息便好驟千里追風之馬展鵬搏六息之翼火不能焚水不能溺入軍不避甲兵入林不避兕虎所以道世界闊多少古鏡闊多少劫運長多少古鏡長多少山僧這裏雖是舊時文約無不是以一償十以十償百以百償千以千償萬而況今日受檀越之請陞此寶華王座豈可蓋覆卻耶拈拄杖擊香几三下上堂森羅萬象一法之所印龍門阬裏三條橋鸚鵡峰前九曲嶺猢猻慣上樹蝦蟆跳入井還知一法麼兩段不同收歸上科上堂山僧有生已來將銅銕鑄得一副心肝打得一副面皮陵鑠諸方氣吞佛祖正恁麼時咳唾之餘便好擿地作金聲彈指之下不妨珠回而玉轉三年前跨入顯聖寺門被箇絆腳索子跌上一交便恁麼軟挼挼地不知不覺闖入箇野狐精瞎禿丁夥隊裏挨到此一時提掇箇事何啻千鈞之重直至如今分疏不下諸兄弟幸自可憐生好箇時節且道是甚時節豎拂子云甲子乙丑上堂衲僧家高高山頂立深深海底行十二時中紅爐片雪百千三昧擿劍揮空列聖籠罩不住萬靈不可為儔天共白雲曉水和明月流咄上堂豎拂子云描不成畫不就添不得一絲減不得一豆三世諸佛趁伊不上歷代祖師參前落後盂上座只好做箇通事舍人所以不敢輕于左右學得神僊好方子自然點石黃金就上堂陰極則陽生臘盡春來早略見梅花報早春窗前適有呼春鳥殷勤報與白頭人怎奈白頭人不曉古人也慮頭角生佛法二字何曾表今日檀信一以薦先一以度生請山僧陞座說法可謂一椎兩當山僧如搭箭之弦勢不容己打開布袋頭將七珍八寶撒向山門佛殿廚庫廂廊填溝塞壑磕頭撞腦曾無一字覆藏好似向火焰裏添油冰盤裏潑水便饒恁麼尚且有不知冷煖底漢子以手拊胸云氣逼殺人大眾要且無他有箇關捩子兒若是撥得轉水鳶也會翀霄若撥不轉就是寶劍空埋泉下山僧今日為你撥轉去也乃拍案一下下座上堂昨日冬行春令會見千紅萬紫打開地網天羅放出無毛鷂子拈花微笑睹桃擊竹吹滅紙燈三頓痛棒立地成佛超生脫死巢知風穴知雨雞鳴丑鶴鳴子既不是神通玅用又不是法當如此為甚麼刺腦入膠盆鑽他故紙認奴作郎被渠驅使今日宗林上人設齋辦供山僧睡如小死設齋者是真法供養打眠者是真精進之旨三世諸佛趕入水牯牛隊裏何處更容得達磨這箇鬍子諸兄弟諸兄弟歸去好歸去好殘雪在山梅有月莫教冷落花無主上堂稟明於心不假外也薄批潭底月細切嶺頭雲喫則從君喫不喫也從君蜉蝣吞卻須彌山白牯蹋翻滄海水我在峰頭最高處細數飛鴻渡江滸
