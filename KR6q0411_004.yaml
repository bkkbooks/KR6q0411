我胸中流出擎妙喜世界於掌中納須彌山王於毛竅即真即俗無佛無生入剎那際三昧古今一貫升大菩提場百界同源法遍天下我本無心經傳後裔不落言詮婆伽梵涅槃一路祖師門空印同文於戲乎哲人已往猶冀仰山再來還向鬧市叢中設教好從蘇子堤邊閒玩舉拂子云葛嶺歲凋仙子柏園梅猶放允公花為先慈大椿壽師太對靈小參覆載慈恩六十三幸於法海共波瀾功歸有地臨行驗一朵蓮花火裏看哀哀我母折肉無補現身說法卻不是我驀豎拂云賊身已露卻無處躲大衆若將容易會便作等閒看即這一句子全主全賓偏正回互似虎之缺如馬之馵如荎草味似金剛杵所謂五彩描成白鳳皇黃金鑄就鐵金剛乾坤吞卻復吐卻震動東溟主藏王上出頂天下透風輪貫古該今陶鑄賢聖難信之法難解難入諸佛同證諸祖行履誠不可得而思議不得已而形諸言語我母大人嚴若秋霜和似春風吐氣猶虹霓雙睛若閃電一怒如雷霆泛愛如時雨這又是子稱父德識者所鄙即今頂相圓明神光萬里法爾如然元非修契更有一般杜禪和擔板漢畢竟向這裏要說箇本命元辰歸根之地分秦別楚指東劃西老僧這裏生也不道死也不道請益亦不道打老僧去亦不道則如沿街唱道情當門念寶號直得左不得右不得分別不得意想不得兩相鈍置分疏不下到這裏罷罷罷休休休龍飛鳳舞錢塘柳洲亭地湧金牛九里松風天竺路兩峰雲綻雷峰落照湖心亭新月如鉤十里荷花爛熳紅畫舫笙歌十二時別有采蓮舟得休休便且休休不風流處也風流唱箇駐雲飛恩重山丘五鼎三牲未足酬親得離塵垢子道方成就孝子賢孫好向真空究大衆且道如何是真空良久顧左右云你這一隊黃瓜茄子孫啓晟薦亡請小參彭殤修短類蜉蝣生死遷訛水面漚究竟總歸無住本一雙孤雁落沙洲於戲孫孺人芳蘭入夢紫翠初齊惜乎鸞鏡中分玉叉驚斷黨里惜其賢淑門庭傷其短算我母孺人素昧生平同日仙遊可謂雖不同條生卻與同條死今其孝眷人等特請老僧舉揚箇德山巖頭公案先母之長壽孺人之短算畢竟有箇末後句子正是紫薇風細水亭涼芙蕖水面香畫舠雖莫不歸去一曲在瀟湘以拂左拂云這是同條生復右拂云這是同條死豎拂云這是最初句放下拂云這是末後句復打圓相云總收歸在金剛圈裏孫孺人你聽著這是金剛王句子橫攝十方豎該三際生佛一致染淨同源正好向這裏放下閨閣中物脫卻鶻臭布衫友菩薩僧侶阿羅漢遊歷十方世界供養十方諸佛猶出谷之雲歸洋之水了無罣礙正是江干潮汐西湖月水色天光總是秋衆請為先慈大椿師太小參露濕豆花羊眼淚風搖衰柳斷腸詩人情佛事聊酬德難挽終天去後思於戲我母之及笄而字寒宗上有再娶之嚴姑下無攜瓶之弱婢短袂操作洗手調羹井臼躬勤所不能免而況鞠我伯仲十餘輩三十餘年有子之纍更無所委者自愚昆季稍可成立流離顛沛死亡相繼我母孀居訓育幼弟其於心境情緒總無善狀至老僧搆室湖濱少盡菽水之娛而我母之年已耄耋矣奈老僧辱有主法之名符牒相招奔走於東西南北是雖有養親之名而無定省之實今者示微恙不崇朝而逝追思曩昔五內俱裂深慚敬養寸腸幾斷正是曾經三峽猿啼處不是愁人也斷腸或有謂這老漢為禪者而不達生死乃生人之常分涅槃為諸聖之歸途衣麻哭泣儼然流俗是可怪也老僧今日承諸上座之請因行掉臂試一論之曾聞古德凌晨聞喪歌云紅輪畢竟沉西去未審亡靈往那方棺旁孝子應聲泣云哀哀哀古德於此曠劫無明一時放下便能橫衝直撞東湧西沒作大佛事況乎肉案頭片片皆精酒樓上聲聲演妙皆是古德放捨身命處這些卻又是三藏十二部所不能詮顯者老僧今日於我母之靈前炷香時舉哀上食時舉哀答禮時舉哀逢節忌舉哀喚一聲我母哭一聲我娘直得川竭泉枯赤地千里四海波騰須彌震動且道與昔孝子是同是別是僧是俗是事是理這是天共白雲曉水和明月流豈知老僧秪知有我母不知有衆生諸佛世界山河絶教大地衆生草木叢林一時痛哭云哀哀我母墻角榴花似火萬緑叢中露出這箇哀哀我娘水面白藕花香分明祖翁田地錯認西方哀哀師太法身無賴生死涅槃融成一塊哀哀我親孔子聖人樊遲問孝顏淵問仁道孝悌也者其為人之本歟義者尊賢為大仁者親親為大又道諸佛非我道父母非我親大衆你自有箇肉塊子已來總非伊尹生於空桑除卻生身父母那箇是你至親遂放聲大哭下座薦嚴請小參往復猶環舊主人辛荑初放柳條春當陽指出通霄路不必從人辨主賓靈光獨耀迥脫根塵但離妄緣即如是佛此雖古德一期酬應正是人人放身命處若向這裏了得三界羈縻醒卻積生幻夢逼塞虛空無藏隱處幾無藏隱豎拂云就在這裏顯出脫體神光此段光明諸佛謂之覺性衆生謂之靈性包羅萬有謂之法性審如是則華藏莊嚴世界海東方阿閦西方彌陀亦在許裏今日老僧受孝子鵬等為其妣陳孺人要說箇生前死後落處試問孺人你有生來事父母敬公姑謂之孝親愛宗族謂之仁戚睦黨里謂之義恩加庶類謂之慈見覺聞知靈明不昧此段光明上齊列聖下共含識決不是有漏敗壞之軀亦不是遷流幻妄業識脫或要問孺人即今畢竟落在甚麼處復豎拂云大衆看看山尖殘月江天曉露滴春風隔院花為靈悅善人請小參二由一有一亦莫守雲中獅子趙州狗移花兼蝶至買石得雲饒星羅碧落帝網光交須知我此法門廣大難量如琉璃瓶盛多芥子粒粒皆明似海中明月浪浪成金得之者如龍王施雨一掬之水便能傾湫倒嶽老僧今日借鄰壁之光續已燼之燈為靈悅善人重說偈言敢向一毛端上轉大法輪于微塵裏現寶王剎通貫十虛平吞三際靈悅善人汝還知麼皮袋一靈一靈皮袋生死涅槃涅槃生死菩提煩惱煩惱菩提虛空大地大地虛空衆生即佛佛即衆生類之勿齊混則知處推不出約不進清淨圓滿中不容他身含十方無盡虛空以故佛亦可生亦可既不擇乎淨穢之方更不定乎隨類之身花飛盡道春歸去會看新紅上海棠薦親請對靈小參迤𨓦香生雨後花送人亭子步晴沙亭邊有箇船兒渡彼岸先登即問家大道通長安潼關秪在半途須知有帝鄉極則處也得挨身進步努力向前方知本地風光豎拂云這是空王寶殿亦名毗盧遮那莊嚴藏大樓閣諸佛諸祖托宿之處或為常寂光土實報土方便有餘土凡聖同居土而況西方安養東震廣嚴而不在其中耶今日因孝女為先母張孺人遲老僧前趨之路拜申鷁首請說箇死此生彼之由夫孺人壽高大耋藻行堅貞其於世法立身成人又何足言至於離卻這殼漏子生前所為總屬華胥若論此去下落要出法界量去無可去來亦無蹤淨土亦可天宮亦可到處安閒隨心自在復豎拂云總不離此空王寶殿從茲處處聞天樂幽樹深林鳥亂啼為徐太夫人小參樓閣臺池盡寶莊池生間色妙蓮香花開露出金剛體天樂聲中禮法王又道來來來實不來古路生蒼苔去去去實不去月上珊瑚樹不來不去兩難言生鐵稱鎚被蟲蛀到這裏無法可當情火中飛鷂子所施皆妙用海底浴泥牛其來也春回大地其死也葉落秋林在處蓮邦隨心佛國日映江淮聲歸空谷約類現身五德五福具丈夫相二利二足生也不道死也不道握劍當軒念寶號了知生死不相關大蟲戴紙帽驚人又好笑如何寒山子忘卻來時道僧問涅槃門乾峰以柱杖一畫雲門云扇子𨁝跳上三十三天觸著帝釋鼻孔東海鯉魚打一棒雨似盆傾一人為人太儉一人為人太奢我則不然豎拂云太夫人還會麼梅花開近屋窗前帶月香為單門張孺人對靈小參曉泛明霞白葛涼扁舟迤𨓦藕花香得來為指通霄路不作人間兒女行天高地厚山深水長尋思罔極擬報無疆豎拂云這是白毫相光甘露瓊漿驪珠獨耀妙蓮華香得之在一毛頭許博地凡夫可稱法王舉足踏著開眼覷著甕中不怕走鱉取之一似探囊生死去來空花夢影世界淨穢法菩提場方便以為父智度以為母善心誠實果法性以為家一彈指頭遍參知識歷盡南方老僧今日作慈悲法施借水鳥樹林共演真常彈指一下云露零殘月江天曉古寺鐘聲出鳳皇
