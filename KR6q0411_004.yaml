body:
  text: 住雲門顯聖寺門人淨範編山陰嗣法弟子祁淨超較訂小參住顯聖當晚小參底事無端苦催逼柳絲煙惹梨華溼黃鸝聲裏鷓鴣天依俙曲調叫冤屈屈屈屈東山兄向南山隱化山主領雲門職舊者不往新不來前山後山春如織端師子巧翻筋斗岑大蟲所向辟易巧僞不如拙誠說得不如行得吾有一句要緊佛法仔細聽我分析早來春仲猶寒恰好二月草一普請砍柴小參毒日斫青柴昏燈打死坐恁麼住叢林大似挨鐵磨仔細一思量都為山僧故大衆莫蹉過左右顧云禍昔小壽禪師因墮薪有省說偈曰撲落非他物縱橫不是塵赤眼撞著火柴頭山河及大地全露法王身眼上不可栽眉大衆小壽擔柴諸兄斫柴是一是二且置只如道山河大地既是法王身恁麼則斫也斫卻法王燒也燒卻法王若不斫則常住又無柴燒且道如何折合以手作斫勢云是甚麼茅梗松丫下座中元普度小參拈拂子云今朝七月十五夏去秋來莽鹵腳跟未曾點地草鞋又沾泥土帶纍目連尊者鍚杖卓開地府無量劫來若冤若親霎時間停酸息苦有箇強項提婆達多他要做獄中高祖高聲道你一隊不唧溜漢東去西去聽我臨行之語若到人間天上切不可皈依佛法僧走諸方參這些老禿奴鳴鐘拷鼓豎狗尾巴搖脣鼓舌使汝填胸塞腑本來大丈夫英靈漢豈可將來賺誤大衆提婆達多可謂誣人之誣反自誣也何以見得喝一喝云芭蕉風雨袈裟破海棠露溼胭脂虎過天華菴請小參天華菴對賀家池月映寒空雁落遲千手大悲藏不住梅華香散向南枝僧問古德千眼大悲如何是正眼古德云如人夜半摸枕子恁麼則諸人有生已來有手執捉有足運奔在眼曰見在耳曰聞又何秪摸枕子而已尊而為諸佛菩薩卑而為鼠肝蟲臂不害其為染淨分岐亦不失其為無方妙用所以道靈光獨耀體露真常但離妄緣即如如佛佛如如菩薩如如衆生法界如如一如無二如或千世界見千界身或百世界見百界身其中天龍八部人王宰官命婦大家童男童女隨一一類說種種法此是古人建化門庭隨人顛倒忽若休歇得去那見有許多般事所謂見聞如幻翳三界若空華聞復翳根除塵消覺圓淨豎拂云還見麼復擊云還聞麼既是見聞了然作麼生說箇覺圓底道理收拂子云掬水月在手弄華香染衣小參風光匝地滿目韶華楊柳放圓通眼溪聲吼師子音山華似錦難為話會好鳥呼春不堪圖度得之者握土成金失之者刻舟求劍君不見金輪王御四天下到處稱尊又不見寒山子十年歸不得忘卻來時道擊拂子云坐著其中宗不妙過宗會菴請小參哉生明哉生魄箭急流陰榮枯存活唯有山僧拄杖子不隨四序推遷渡水穿雲良宵玩月一任你杜長老肆口批評那知我這裏龍象蹴踏宗會菴特地乾坤斬新日月山僧到來敢有甚麼指東畫西橫說豎說咦滿庭桂子泛清香遠山翠映秋雲薄世臣徐居士薦嚴請對靈小參生死乃含靈之大變涅槃為至聖之通津了變如幻明星不消一睹識妄歸真朗月已謝重輪擲世界如陶家輪納虛空於葶藶子分身異類不變精金往復隨緣無端環玉直其秕糠之餘耳況有進於此者乎恭惟漢文老居士知儒契釋綜博該通陽春與伊長老賡諧雪曲共本禪師酬唱性同薑桂老而愈辣身如松柏歲寒後凋疾革之初山僧隔江招手所圖神會治命之際居士入水求人有望同倫不居印土釋迦老徒然飲氣匪入蓮邦彌陀佛且尚吞聲但臨行倉卒失下箇護身符子此卻是假借不得底在居士豈有藉於他人梅華自有天成骨六月猶能傲雪香舉扇云居士會麼伏惟尚饗結制小參老將臨場當有作家戰將試出相見僧出禮拜師云不是鯨鼇客徒勞上我鉤進云欲聽鳳鳴反聞雞唱師云吉了舌頭三千里進云和尚先須縮卻乃云欲聽鳳鳴反聞雞唱此也是盲者不見聵者不聞卻爭怪得山僧豎拂子云豈不道法雨均霑二木三草雨霽後遠山濃淡卻又是杜鵑春曉殘紅滿地休教掃誰家亭院數聲啼鳥遊春人歷盡芬芳多少放下拂子云你看他賣盡風流自取間愁惱以手斫額云今宵月上梧桐早擲拂子下座六通堂頭伊姪木主入祖堂請小參天地有正氣物馮之則為瑞為祥人稟之則為直為方況進之以道德沃之以文章故人存則道固興隆人亡則道亦不熄今日是六通伊長老忌辰顧渠生氣勃然豎拂子云欲向山僧拂子頭上揚眉吐氣發泄胸中平昔所積擊拂子云天普蓋地普載四時各得其位二三子以我為隱乎吾無往而不在白雲幾片竹林東青山數點斜陽外大衆進祖堂觸禮三拜一軸丹青古之遺愛小參若論蓋天蓋地未出衆前早成話墮更得掀翻法座早已落七落八了也所以當家種草不用栽培宿學飽參從來本色握一段竹篦勘佛勘祖拽七尺藤條驅鬼驅魔風行草偃水到渠成今日檀越設齊也不過要諸人飲水知冷暖喫飯識饑飽大衆莫管他一七二七三四五七以至八萬四千劫總在今時三條椽下七尺單前大展愁眉鼓腹雍熙說甚麼寶華王座金色之軀那怕甕中走卻鱉籪裏失了魚以兩手左右撒云東撒些西撒些七珍八寶賤如泥高聲云大衆隨分納些些小參雲門鄉裏若耶溪上隱六寺之幽蹤矗三台之秀朗書藏玉笥路入花宮牧童歸去短笛橫吹樵子還家山華滿鬢泉涓涓以含珠山蒼蒼而蘊玉遊不足看不足帶以長流繞以修竹閒來無事杖笠逍遙樓閣重重寶樹簇簇豎拂子云青色光明雲因陀羅摩尼瓔珞雲帝青寶摩尼瓔珞雲金剛摩尼瓔珞雲拍案一下云大方廣佛華嚴經世主妙嚴品第一小參行到水窮山盡轉將過來自然有到家消息老鼠入牛角透得過去方見本地風光有般漢秖管向白雲堆裏坐住縱然於平地上也解弄些神槍鬼棒及到千丈巖前銀山鐵壁處卻又縮手無措所以古人有許多繫驢橛子喚作祖師關雲門關趙州關黃龍關向這裏一一清楚得來便好獨鎮寰區超今壓古山僧所以有時雷霆有時陽春忽爾狂風暴雨忽爾霽月光風也只要向無星稱上定得斤兩分明說甚麼無量百千三昧門無量百千神通門無量百千總持門無量百千辨才門好似夢裏渡黃河用盡多少方便及至醒來嗄窗前一夜芭蕉雨擲下拂子下座小參若立一塵色香溢目紫翠盈衢不立一塵萬籟悄然古路無蹤山僧數十年來小可立箇家計也只是煙霞肺腑泉石膏肓於今老矣和箇家計也無沒奈何秖好唱箇隨心曲子自來腔諸兄弟謾商量且聽山僧話短長東村人姓李西村人姓王清閒快樂住村莊門前一灣水屋後數株桑新草薦舊繩床一睡睡到大天光大衆請歸堂踴身下座覺如禪人祝母九十壽請小參豎拂子云大衆試看渠曹家之女左拂云現身如雲右拂云說法如雨一切地水是我身一切火風是我體虛空既與之同生世界亦隨之共起向往無終最初無始沙算之齡不多塵點之劫無已身心乃能度百千劫猶一彈指更說甚麼洞府仙班諸天淨侶釋迦如是彌勒如是拄杖如是拂子如是今日沈善人也如是大衆亦如是以八千歲為春秋卻又值清明在邇庭前柳引東風門外花堤映水擊拂一下云委吳居士薦室請晚參攝大地春來一枝頭引大海水歸一滴內殊非分外事若夫失其旨趣雲生湖面鴛鴦失偶迷其源委浪起海中比目難偕山僧此間拄杖點出西方捷徑人人可證拂子豁開華藏玄門箇箇堪登千里不妨對面隔世無異同時所以道生而天縱者靈死而不已者壽今日吳永言居士設伊蒲之供藉衆僧之力要與他尊夫人指出金剛正體弘開般若真乘更要山僧於晚參一席之中講涅槃經四十一卷這也不難但須是無心者領略無耳者聽聞拍案一下云如是我聞一時佛在便下座晚參簷前雨滴春歸花萎寒山拾得向國清寺裏發狂卻怪豐干多觜須菩提巖中晏坐不免白日裏見鬼恐怕路絶人荒西麗橋北麗橋馬臺石祇樹林相為料理左右顧云山僧這裏一向來拖泥帶水沈木公居士薦室請晚參山僧一向來有一曲高山流水知音若鍾子期者固亦鮮矣今日木公沈居士袖香入室更請山僧作孤鸞別鶴之操直得乾坤失色雲霧慘愁簷前紫燕不敢雙飛池上鴛鴦黯然獨立居士伉儷之情要問箇離色身外畢竟歸於何所山僧道譬如浮木不住此岸不住彼岸不為樵牧之所薪不為鬼神之所礙順流而入薩婆若海至此心眼開明虛空粉碎觀妙喜世界如在掌中以隨類身行無為事回視昔日脂粉綺羅恍如春夢即義重恩深亦若空花還知渠落處麼以拂子打圓相云行到水窮蘆荻暗碧天初湧一輪高鑄鐘開爐請小參月沈清籟五更鐘有者惺惺有夢中不是圓通起分別一般聲作兩般風古人恁麼告報也是為鈍漢而說若是不煩爐鞴不用鉗錘生鐵面孔純鋼肝膽豈肯從模則裏脫印出來所以有亙古聲名超方聲教著著提持在威音王那畔更那畔十二時中自然如大火聚無你趨向處若毗嵐風無你近傍得或者於建化門頭強教你從火焰中脫盡皮毛橐籥裏換轉筋骨也須要一火鑄成然後可以升之於殿堂之上懸之於簨虡之間大扣則大應小扣則小鳴聾者得聞夢者得醒雲集法會開拓弘基擊大法鼓吹大法螺演大法義以拂作扣鐘勢云鍠下座師至蜀阜鑑姪啓明和尚請小參祖翁田地父母鄉邦嫡骨兒孫掌握著真文舊契正好承家紹業點課收租若山僧者似馮歡之市義文券已焚既無立錐之地秖可沿村行乞覓得些殘羹餿飯便擬陶鑄聖賢不免取笑大方唯我東山兄所貽克家之子符印在手號令嚴明將三世諸佛歷代祖師一脈接下可謂妙協通玄正偏交互鷺鷥雪裏爭妍烏鴉炭中鬥色大衆正恁麼時如何話會以拂子向空一點云東方啓明結制小參問有時吟風嘯月有時補柳栽花還是調心還是垂手師云秦望山大有長處進云若非和尚未免遭人揀點師云君子避醉漢進云萬緑叢中紅一點動人春色不須多問大開爐韝點鐵成金是金到來作麼生師云敗鐵進云老老大大話頭也不識師便打僧無語師云果然敗鐵乃云放閒則萬緑叢中紅見把住則真金色裏無黃太平市上足醉人爐韝之門多鈍鐵豈知雲門這裏煨蘿蔔也好大展佛法炙茄子亦顯妙用通神又有箇淨寮裏茂實上人將三世諸佛道不盡底歷代祖師提不起的滿盤托出諸人面前有者似餓虎食羊總不知甚麼滋味有者眼睜睜地無下口處有者但知好喫不解吐核似此般邋遢窮酸堪作甚麼所以山僧尋常道你須有一層去一層直得淨裸裸赤灑灑更須向盆池裏刮垢磨痕香皂湯洗出一身白汗然後到山僧這裏來當頭點你一棒方才成得箇出格漢拍案一下云會麼雨催樵子還家風送漁舟到岸喝一喝下座小參僧問盤山道向上一路滑南院道壁立萬仞險臨濟道石火電光鈍未審和尚作麼生道師云只怕你不問問則山僧自有話說進云請和尚道師云可憐生可憐生進云和尚慣用此一機師云不但一機還有元木乃云向上一路千聖不傳石霜云向上一路千聖不然大慧云向上一路熱碗鳴聲驀顧左右云放你三十棒山僧今日裏不得已別行一路略通箇消息黃蘗三頓棒活埋卻一箇臨濟後生西園三拊掌斷送了一箇俱胝老漢魯祖無轉身句子且喜堂頭老漢果與尋常不同所以雲門有腦後箭巖頭有末後句此是古今透不過底重關從來割不斷底葛藤左拂一拂云罷罷罷右拂一拂云休休休這總之和尚門庭高峻何不向侍者邊覓箇入處卓拄杖復擲下云薦時元木為首座一機為西堂小參豎拂子云還委悉麼自地登空也須從空放下以其培風厚所以波瀾闊從一毛竅中繡針眼裏總不著意流出些珍珠瑪瑙珊瑚琥珀雖是世寶他卻也會拈弄些佛事或放光明或震世界或供養諸佛或成就衆生或莊