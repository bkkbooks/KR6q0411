body:
  text: 住雲門顯聖寺門人淨範編山陰嗣法弟子祁淨超較訂拈古世尊因長爪梵志索論義預約曰我義若墮當斬首以謝世尊曰汝義以何為宗志曰我以一切不受為宗世尊曰是見受否志拂袖而去行至中路有省乃歎曰我義兩處負墮是見若受負門處粗是見不受負門處細一切人天二乘不知我義墮處惟有世尊諸大菩薩知我義墮回至世尊前曰我義兩處負墮故當斬首以謝世尊曰我法中無如是事汝當回心向道於是同五百徒衆一時投佛出家證阿羅漢師云梵志拂袖而去不足以定粗細負處是弟子之所賀天人二乘又何得而知梵志回以赴斬首之約此政大丈夫所為不失為外道之魁如能拂袖於世尊問汝義以何為宗處雖世尊亦當讚善豈不俊哉老僧謂此處負墮更粗於請斬首以謝不聞未跨船舷已喫棒乎女子出定師云女子入定於世尊之前固非所宜文殊運智力神力可謂至矣女子必不能為其所移豈女子優於文殊抑世尊使之爾耶世有捨茲二力而能使乾坤易位日月退舍四時失度生佛倒置更不失其為山川時序十界所置之常請問罔明大士世尊因波斯匿王問勝義諦中有世俗諦否若言無智不應二若言有智不應一一二之義其義云何佛言大王汝於過去龍光佛時曾問此義我今無説汝今無聽無説無聽是為一義二義師云王之問真俗二諦互與否耶世尊用今之語答龍光佛時問不識匿王於彼時何如人哉世尊亦誰與使匿王即古佛之再興是不得為佛之子若世尊居龍光而王匿王之與龍光之席捨龍光而問王有是理乎吾於此思定人王法王久不可明是名一義二義乾闥婆王奏樂迦葉尊者起舞師云方樂王質尊者事是可疑也然以頭陀之藻行素有重望三作三舞此又非樂王之所知尊者忍為之此何説乎山河大地協宮商而鳴迦葉協宮商而舞樂王為然宮商為然尊者竟可例之於物類物類寧不可為尊者乎指萬物為阿羅漢可乎雲中之雨點疏密有度水邊之沙粒行次無移風之觸物而成籟抑亦乾闥婆王所為耶殃崛摩羅因持鉢至一長者門其家婦人正值産難長者曰瞿曇弟子汝為至聖當有何法能免産難殃崛語長者曰我乍入道未知此法待我回問世尊卻來相報及返具事白佛佛告殃崛汝速去報言我從賢聖法來未曾殺生殃崛奉佛語疾往告之其婦得聞當時分娩師云殃崛為傳語則不足以明彼妊婦又安得而知所傳之語與臨産之事毫不相關余初入道獨於此礙膺者久之既讀大慧語録請益湛堂後讀華嚴十地品始有入復以頌明之曰華陰山前百尺井中有寒泉徹骨冷誰家女子來照影不照其餘照斜領始知所謂金矢法耳今復請世尊以殃崛為千百億身傳語至閻浮提使矇者明聵者聰僂者舒跛足攣手顛癇痼癖者各得安其常即一語一人所愈者衆彼矇聵攣癖者不知也殃崛為傳語亦不知也馬祖因僧問離四句絶百非請師直指西來意祖曰我今日勞倦不能為汝説問取智藏去僧問西堂堂云何不問和尚僧云和尚教來問堂云我今日頭痛不能為汝説問取海兄去僧又問百丈丈云我到這裏卻不會僧卻回舉似祖祖曰藏頭白海頭黑師云僧問離四句絶百非請師直指西來意為祖者説法為任竟以勞倦辭西堂則頭痛百丈卻不會三大老被這一問四百四病一時拶出則西來意固亦難言耶這僧來往亦不易凡為人天師當知有藥頭之妙方能縱奪臨時不假擬議心性之學至馬大師為大變矣握一口劍橫揮豎削鮮有不受其傷者就入泥入水無不臻妙失之者摸索話頭斬新辭句則何有於藥頭之妙此其所以去古遠矣還知馬大師麼如今老大無筋力獨倚衡門數雁行南陽慧忠國師一日喚侍者者應諾如是三召三應國曰將謂我孤負汝卻是汝孤負我師云國師三喚侍者三應節拍分明下箇注腳道將謂吾孤負汝卻是汝孤負吾叢林古宿便有許多絡索有謂侍者卻會若不會爭解恁麼應好一碗羹卻被鼠粘汙卻有謂國師侍者總欠會在試問作恁麼話會桶底脫落也未天童淨禪師上堂云霜風號肅殺霜葉墮蕭颾舉拂子曰看惟有玲瓏石崔嵬望轉高所謂天童滯貨今朝短販一遭莫有酬價底麼下座師云端午後神符除夜舊曆日請自留取糊壁忠國師因丹霞來訪值睡次乃問侍者耽源云國師在否者曰在即在秪是不見客霞云太深遠生者云莫道上座佛眼也覷不見霞云龍生龍子鳳生鳳兒國睡起侍者舉似國國打二十棒趁出丹霞聞云不謬為南陽國師師云國師高枕丹霞得以乘間而入耽源道莫道上座佛眼也覷不見卻被丹霞從隙中送眼旁偷耽源喫棒出院此時和耽源也不相見了也雖然耽源兩處受棒還知丹霞受棒處麼若知得好與國師相見亦不謬為佛祖兒孫如或不知莫向秦庭誇好手荊卿事業竟何如青州辨云二邊純莫立中道不須安且道甚處相見得箇端的師云可憐無定河邊骨盡是春閨夢裏人又云回途轉位直須戴角披毛喚作畜生得麼師曰妓女不知亡國恨隔江猶唱後庭花百丈再參馬祖師云始而百丈語黃檗云老僧昔被馬大師一喝直得三日耳聾黃檗聞舉不覺吐舌此宗之妙自馬大師融冶乾坤指揮神策百丈握閫外之威權黃檗攙鎗奪鼓所向無敵故知機用為列祖之神髓乃萬類之鉗錘汾州謂悟去便休更説甚麼三日耳聾石門云若不三日耳聾爭得悟去恁麼批判古人還甘麼老僧不避腥羶試為斷看烽火漁陽樓上月曲中都是斷腸聲青州辨云念念釋迦出世步步彌勒下生為甚麼擬心即錯動念即乖師云富嫌千口少貧恨一身多青州辨云有口贊不盡無言心自明是則裂破虛空不是則鬼家活計上人端的處道將一句來師云骨銼又云背手抽金鏃百丈因溈山五峰雲巖侍立次問溈山併卻咽喉唇吻作麼生道山曰卻請和尚道丈曰不辭向汝道恐已後喪我兒孫又問五峰峰曰和尚也須併卻又曰無人處斫額望汝又問雲巖巖曰和尚有也未丈曰喪我兒孫師云百丈置箇問端溈山曰卻請和尚道五峰曰和尚也須併卻雲巖曰和尚有也未象王回顧挂角羚羊還他三老臨場試卷卻忘了題目明明道併卻咽喉唇吻亂開口作麼脫有問老僧曰和尚試道看老僧時以他事所移不及與渠分秦別楚前漢後唐一揖而別青州普照一辨禪師垂語曰聲前薦得落在今時句後承當迷頭認影作麼生是空劫已前自己師云道即不難恐落今時或曰試道看師打一摑曰羞也不識要稱禪客百丈野狐師云前百丈錯一轉語五百生為野狐利害在甚處大凡宗師家著著拈提向上先自有出身之路則不被目前所礙若儱侗將去則不堪也雲峰圓聞二僧舉野狐話一僧云不昧因果也未脫得野狐一云不落因果又何曾墮野狐來道圓過澗有省更以呈偈南公公見之為之助喜圓公悟去則不無之二僧披毛戴角有日在或曰謝師授記咄這野狐精復云不落因果兔子窠邊遭野火不昧因果粉蝶飛上梨花朵參大名雪巖滿禪師參普照寶寶垂示語曰兄弟年俊正宜參叩老僧當年念念常以佛法為事滿避席曰禴尚而今如何也寶曰如生冤家相似滿曰若不得此語幾何枉行千里寶下禪床握滿手曰作家那師云普照當初待他問和尚而今如何也分頂門一棒或再進語再與一棍且教這漢參三十年普照若行得此令吾宗不致寂寥也便軟拖拖地道作家那雖然爛泥裏有刺作者方知百丈普請钁地次忽有一僧聞鼓鳴舉钁頭大笑便歸丈曰俊哉此是觀音入理之門丈歸院乃喚其僧問適來見甚麼道理便恁麼曰適來肚飢聞鼓聲歸喫飯丈乃笑師云這僧聞鼓聲舉钁頭大笑便歸叢林喧傳趙州洗鉢盂話此則因緣寧不勝他十倍但在千百衆中奪錦而歸及乎詢其所以卻又將扇子掩面而避鏡清云溈山當時有此僧鼓山云溈山當時無此僧普請钁地次時實有此僧荷鋤歸去實無此僧則二師為僧擔板各有所見要識此僧也大難在分明只在秋江上明月蘆花何處尋鹿門覺禪師示衆曰盡大地是學人一卷經盡乾坤是學人一隻眼以者箇眼讀如是經千萬億劫無有間斷師云正恁麼時有經處無眼有眼處無經舉意讀時便成間斷報恩秀云看經不易師咄云寐語作麼百丈謂衆曰有一人長年不喫飯不道飢有一人終日喫飯不道飽一僧著語云一對鴛鴦池邊獨立一雙孤雁撲地高飛師云墮地獄如箭射一僧著語云渠今正是我我今不是渠師云銜鐵負鞍有日在且道過在甚麼處試檢點看報恩萬松行秀禪師示衆曰機輪轉處智眼猶迷寶鏡開時纖塵不度開拳不落地應物善知時兩刃相逢時如何回互師云遍身綺羅者不是養蠶人大名寶禪師示衆云若論此事如人作針線幸然針針相似忽見人來不覺失卻了針者邊尋也不見那邊尋也不見卻自曰近處尚不見遠處那裏得來多少時尋不得心煩不好昏悶打睡拽衣就枕方就枕時驀然一劄曰原來在這裏師云且道是針不是針復曰大名不能為後人抽釘拔楔作灑落了事人反引渠向針線上作活計就使摸索得來往往迷頭認影雖然三十年後一回飲水一回噎南泉問黃檗定慧等學明見佛性此理如何檗曰十二時中不依倚一物泉曰莫是長老見處麼檗曰不敢泉曰漿水錢且置草鞋錢教阿誰還妙喜曰路逢劍客須呈劍不是詩人莫獻詩師云老僧則不然南泉還漿水錢黃檗償草鞋錢不見道賊是小人智過君子鹽官謂衆曰虛空為鼓須彌為椎甚麼人打得衆無對有僧舉似南泉泉云王老師不打這破鼓黃龍云甚麼處是破處直饒揀點得破處分明我還要覓鼓在師云山僧有鼓便打有笛便弄無論渠破與不破若要問我覓鼓在自領出去王山體禪師發明洞上宗旨曰既有尊貴之位須明尊貴底人須知尊貴底人不處尊貴之位方明尊貴不落階級師云如何黑漆屏風上更畫盧同月蝕詩南泉因陸大夫道肇法師也甚奇怪解道天地與我同根萬物與我一體泉指庭前牡丹花曰大夫時人見此一株花如夢相似陸罔測雪竇頌云見聞覺知非一一山河不在鏡中觀霜天月落夜將半誰共澄潭照影寒師云夢中作夢法師語南泉夢中占夢也大奇怪雪竇善於原夢鏡裏山河影中聞見撲碎鏡拂卻影可惜一株花拈向霜天月下更來到澄潭摸索可不道月落夜闌不知何處相見知有者揀點看萬松示衆云去則留住住即遣去不住不去渠無國土何處逢渠在在處處且道是甚麼物得恁麼奇特師云枰錘蘸醋南泉問座主講甚經主云彌勒下生經泉曰彌勒幾時下生主云現在天宮未來泉曰天上無彌勒地下無彌勒師云南泉等間置箇問頭不特座主口啞洞山被問直得禪床振動火爐振動太陽玄地動彼此隨摟搜你也動我也動動到彌勒下生有甚了期忽有問天上無彌勒地下無彌勒誰與安名老僧直得八萬四千毛竅一時卓立打失了娘生鼻孔萬松示衆曰動則埋身千丈不動則當處生苗直須兩頭撒開中間放下更買草鞋行腳始得師云曾經三峽猿啼處不是愁人也斷腸南泉住菴一僧到泉向伊道我上山去作務待齋時作飯自喫了送一分上來少時其僧作飯自喫了卻打破家事就床臥泉待不見來便歸菴見僧臥泉亦至僧邊臥僧便起去師云可惜這僧泯然無聞當時風儀令人可愛南泉過後思君子見之晚矣彼時下山來何不掘箇坑將這僧埋卻豈不據款一結或云老漢聻老僧與一頓棒趁出山門萬松示衆云踢翻滄海大地塵飛喝散白雲虛空粉碎嚴從立令猶是半提大用現前如何施設師云琉璃殿上無知識南泉示衆云喚作如如早是變了也如今師僧須向異類中行歸宗云雖行畜生行不是畜生報泉云孟八郎漢又與麼去也師云似地擎山不知山之孤峻如石含玉不知玉之無瑕大通智勝遷座而成正覺善財童子別峰而見德雲僧云智不到處切忌道著道著即頭角生卻為甚麼作這般語話乃喝一喝云孟八郎漢又與麼去也萬松示衆曰向上一機鶴沖霄漢當陽一路鷂過新羅直饒眼似流星未免口如匾擔且道是何宗旨師云閉眼食蝸牛一場酸澀苦南泉問僧夜來好風僧云夜來好風泉云吹折門前一株松僧云吹折門前一株松次問一僧云夜來好風僧云是甚麼風泉云吹折門前一株松僧云是甚麼松泉云一得一失師云一僧云這公案與趙州驗二菴主法眼指簾一樣一僧云刁刀相似魚魯不同爭之不能已以質之老僧乃云一得一失西京雪庭福裕禪師因僧問如何是祖師西來意庭曰待乳峰點頭即向汝道師曰一字入公門九牛拔不出僧復問曰如何是尊貴一路庭曰漁歌驚起沙汀鷺飛出蘆花不見蹤師云乳峰點頭也道箇甚麼火裏鷦鷯吞大蟲南泉上堂云王老師自小養一頭水牯牛擬向溪東牧不免犯他國王水草擬向溪西牧不免犯他國王水草不如隨分納些些總不見得師云且道這些子還是溪西溪東除是這牛兒不齧一莖草不飲一滴水始得就使牽到他方世界外還出得他國王水土麼試請王老師定當看靈隱文泰禪師上堂云塵劫來事只在於今河沙妙德總在心源試教渠覿面相呈便不解當風拈出且道過在甚麼處卓拄杖曰秪為分明極翻令所得遲師云只如靈隱還拈得出麼若拈得出何不略借一觀若拈不出河沙妙德向何處去也隔牆恩怨如何説獨抱琵琶月下彈南泉上堂云王老師賣身去也還有人買麼一僧出曰某甲買師曰不作貴不作賤汝作麼生買僧無對師云雪竇拈云雪竇擬酬箇價直令南泉進且無路退亦無地不作貴不作賤作麼生買別處容和尚不得山僧獨愛此語然雖如是雪竇只可作南泉奴秪如進且無路退亦無地還容得雪竇麼寶應遇禪師因僧問如何是西來的的大意遇曰風送泉聲來枕畔月移花影到前師曰大小祖師引人向聲色裏作窠臼好與三十棒除卻聲色也與三十棒秪如老僧聻點石化為金玉易勸人除卻是非難南泉云三世諸佛不知有狸奴白牯卻知有師云試問如何是狸奴白牯知有的事或曰黃金國土琉璃地師子巖前水草香作恁麼語話銜鐵負鞍有日在香嚴文才禪師依縫州福嚴普公出家嘗讀證道歌至幻化空身即法身之句豁然契悟乃入還源之室師云若向這裏悟去披毛戴角有日在鹽官安國師一日喚侍者曰將犀牛扇子來者曰破也安曰扇子既破還我犀牛兒來者無對師云犀牛兒隨扇子破了就將得來也是無用之物投子云不辭將出恐頭角不全資福作一圓相心中書牛字師云當時鹽官原向侍者根討箇活潑潑的牛兒諸方拈頌總是死牛良久云老僧恁麼告報還得麼俱空契斌禪師因僧問如何是空劫已前底事斌曰烏龜向火師云料掉沒交涉且道過在主家賓家這裏明得方許你會空劫已前事如或不明且看烏龜向火魯祖寶雲禪師尋常見僧來便面壁南泉聞乃云我尋常向僧道佛未出世時會取尚不得一箇半箇他漝麼驢年去師云也奇怪古人拈弄箇事費卻許多威神露風規於百草頭上總不放過釋迦掩室淨名杜口須菩提晏坐巖中諸天散花謝法又何常絶無會取領意者南泉作箇語話學人須知巖頭道雪峰我當時不與伊道箇末後句若識得末後句天下人沒奈伊何吁番令力耕者半作賣花人大覺方念禪師遊初祖面壁處忽然契悟乃曰五乳峰前好箇消息大小石頭塊塊著地師云祖師恁麼悟去且教面壁僧曰和尚不肯古人耶師打一下曰你還夢見麼盤山寶積禪師云諸禪德譬如擲劍揮空莫論及之不及斯乃空輪無迹劍刃無虧若能心心無知妙喜云咄咄咄我王庫內無如是刀師云若論本色衲子實無是刀若論本色衲子實有是刀一僧哂曰不見盤山道學者勞形如猿捉影喝一喝曰情知你坐在鬼窟裏雲門澄和尚至雲棲蓮大師舉高峰海底泥牛話問門門推出傍僧曰大衆證明蓮頷之師云彼時此語傳之海內直得須彌震動大海波騰阿修羅手擎日月高聲唱曰邪正不分過由傍僧澧州茗溪道行禪師嘗曰吾有大病非世所醫師云吾有大病一物可醫不識是甚麼物若拈得出可與茗溪同病雲門澄和尚一日送亡僧回雲棲問亡僧遷化後向甚麼處去門出衆曰謝和尚挂念棲休去師云雲門老漢雖善機宜還得替這僧入涅槃堂始得西園曇藏禪師一日燒浴次僧問何不使沙彌師撫掌三下曹山云一等是拍手撫掌就中西園奇怪俱胝一指頭禪蓋為承當處不諦當師云俱胝一指諸方古宿拈頌揄揚不翅稻麻竹葦曹山引西園一相形比和俱胝承當時便差了大衆為復是一期壓捺為復別有道理有者道古人提唱總不可作實法會理固如此也須要頭腦清楚西園撫掌是甚時節俱胝豎指是何節目這裏緇素得出許你親見西園否則在人家屋簷下住著驢年去在雲門澄和尚上堂説法竟問衆曰還有問者麼若有出來祗要打草驚蛇一僧才出門曰真是一場業地卓拄杖下座師云這老漢圖得一時俊快不顧後日風波這片地從古至今何曾清淨得來偶然一時打草卻被這僧靠倒烏臼和尚玄紹二上座參臼問云二禪客發足何處玄曰江西臼便打玄曰久知和尚有此一機臼曰汝既不會後面箇師僧祗對看紹擬近前臼便打曰信知同坑無異土參堂去師云烏臼只管據令而行彌勒釋迦立在下風試問二禪客還甘麼若甘則瞎卻天下人眼若不甘瞎卻烏臼眼或曰甘與不甘一併收下也是瞎驢趁大隊烏臼問僧近離甚處曰定州臼曰定州法道何似這裏曰不別臼曰若不別更轉彼中去便打僧曰棒頭有眼不得草草打人臼曰今日打著一箇又打三下僧便出臼曰屈棒元來有人喫在曰爭奈杓柄在和尚手裏臼曰汝若要山僧回與你僧近前奪棒打臼三下臼曰屈棒屈棒曰有人喫在臼曰草草打著箇漢僧禮拜臼曰卻與麼去也僧大笑而出臼曰消得恁麼消得恁麼師云要做濟下兒孫須知有這般機用我坐你立收放自由主賓互換血脈貫通自然風雲凜冽所以謂之得大自在若一棒差排到底了無殺合不識曾一覽烏臼語否今之所謂風斯下矣則川和尚摘茶次龐蘊曰法界不容身師還見我否川曰不是老僧泊答公話士曰有問有答蓋是尋常川乃摘茶不聽士曰莫怪適來容易借問川亦不顧士喝曰這無禮儀老漢待我一一舉似明眼人川拋卻籃便歸方丈師云龐公向雪中覓粉墨上尋煤則川把定牢關不通水泄可謂頭正尾正龐公用盡自己心笑破他人口幸而免者不為則川所逐淨杯和尚凌行婆來禮拜杯與坐喫茶婆乃問盡力道不得底句分付阿誰杯曰浮杯無剩語婆曰未到浮杯不妨疑著杯曰別有長處不妨拈出婆斂手哭曰蒼天中更添冤苦杯無語婆曰語不知偏正理不識倒邪為人即禍生後有僧舉似南泉泉曰苦哉浮杯被這老婆摧折一上婆後聞笑曰王老師猶少機關在澄一禪客逢見行婆便問怎生是南泉猶少機關在婆乃哭曰可悲可痛一罔措婆曰會麼一合掌而立婆曰伎死禪和如麻如粟一舉似趙州州曰我若見這臭老婆問教口啞一曰未審和尚怎生問他州便打一曰為甚麼卻打某甲州曰似這伎死漢不打更待幾時連打數棒婆聞卻曰趙州合喫婆手裏棒後僧舉似趙州州哭曰可悲可痛婆聞此語合掌歎曰趙州眼光爍破四天下州令僧問如何是趙州眼婆乃豎起拳頭僧回舉似趙州州作偈曰當機覿面提覿面當機疾報汝凌行婆哭聲何得失婆以偈答曰哭聲師已曉已曉復誰知當時摩竭國幾喪目前機師云可惜浮杯帶纍著王老師趙州不打澄禪客這婆子視秦無人矣毗耶離城摩竭提國多少奇特我此一宗盡底掀翻是所以光明烜赫照映千古設有問老僧乃曰試舉看僧才舉老僧揶揄曰話也不會舉更問甚麼浮杯僧曰不識和尚如何舉老僧打曰可悲可痛遵布衲浴佛時藥山曰這箇從你浴還浴得那箇麼遵曰把將那箇來藥山休去師云好箇休去藥山豈不能似今時粗浮暗短之流宗旨不分血脈不貫滿腔是生滅心勝負見問箇把將那箇來便打便喝掀翻浴盆亂統一上好不知羞我道藥山若不休去提將來撇向東洋大海裏絶教他浴箇像心像意待彌勒下生我還要他把將那箇來藥山因僧問平田淺草麈鹿成群如何射得麈中主山曰看箭僧放身便倒山曰侍者拖出這死漢僧便走山曰弄泥團漢有甚麼限師云這僧置箇問頭也不易及乎發箭原來是箇死鹿或幸而他處飲甘露而再生不失其為威音王如來始祖復望空作彎弓式藥山因僧問學人有疑請師決山曰待上堂時來與汝決至晚上堂衆集山曰今日決疑上座在甚麼處其僧出衆而立山下禪床把住曰大衆這僧有疑便與一推卻歸方丈師云是醍醐是毒藥殺人劍活人刀藥山久不升座一日院主白云大衆久思和尚示誨曰打鐘著時大衆才集定便下座歸方丈院主隨後問云和尚許為大衆説法為甚麼一言不措山曰經有經師論有論師爭怪得老僧師云經師論師不失其為藥山於一彈指頃成就靈山百萬龍神人非人等有箇漢斷斷不受老漢顢頇可以為千佛師藥山雖用盡伎倆爭怪得這僧丹霞燒木佛院主墮眉須師云時天實寒大地人凍死幾半獨丹霞有出身之路不致為害院主為常住惜責任當言這是常理祗如寮舍僧徒爐煨榾柮熾炭間談院主為客計則吝為主計則奢還知丹霞眉鬚被火燎卻賴得院主救取一半麼是則龍女頓成佛非則善星生陷墜丹霞訪龐居士見女子靈照洗菜次霞曰居士在否女子放下菜籃叉手而立霞又問居士在否女子提籃便行霞遂回須臾居士歸女子乃舉前話士曰丹霞在麼女曰去也士曰赤土塗牛妳師云維摩會上散花天女與舍利弗用盡神力顯箇不思議解脫法門不如靈照一箇菜籃十八代先靈同受供養丹霞只見菜籃惜乎不見居士靈照若不是箇菜籃何處覓他父親居士曰赤土塗牛妳非此一端黃檗希運禪師一日捧鉢向南泉位上坐泉入堂見乃問長老甚年行道檗曰威音王已前泉曰猶是王老師兒孫下去檗便過第二位泉休去師云王老師年尊何不退位致使後代兒孫向頭上屙是何道理黃檗示衆云還知大唐國裏無禪師麼時有僧問諸方尊宿盡聚衆開法為甚麼事卻道無禪師檗曰不道無禪秪是無師師云黃檗一時將箇正法眼擉瞎要津坐斷卻被箇噇酒糟漢一拶粉碎大慈寰中禪師上堂山僧不解答話秪能識病時有僧出寰便歸方丈師云不是這僧爭見國手且道這僧是甚麼病我道這問便是還甘麼趙州到一菴主處問有麼有麼主豎起拳頭州曰水淺不是泊船處便行又到一庵主處問有麼有麼主亦豎起拳頭州曰能縱能奪能殺能活便作禮師云一樣拳頭兩箇菴主兩樣判斷一箇拳頭生鐵鑄就純鋼打成一任挨排還曾動著他絲髮許麼然不可不知趙州擇法眼亦不可失二菴主又要知趙州落處不可顢頇不可儱侗豎起拳頭云試定當看趙州因僧問學人乍入叢林乞師指示州云喫粥了也未云喫粥了也州云洗鉢盂去其僧因此大悟後雪竇云我不似雲門為蛇畫足直言向你道問者如蟲禦木答者偶爾成文雖然與麼瞎卻衲僧眼作麼生免得此過諸仁者要會麼還爾趙州喫粥也未拈卻這僧喫粥了也雪竇與你拄杖子歸堂師云這僧千餘年下又得雪竇一拄杖子老僧道且緩緩地要過趙州橋則易要闖雪竇關則難無風荷葉動決定有魚行復云瞎趙州因僧問如何是祖師西來意州曰庭前柏樹子曰和尚莫將境示人州曰我不將境示人曰如何是祖師西來意州曰庭前柏樹子後法眼以此話問光孝覺覺曰無眼曰往來皆謂趙州有此話上座何得言無覺曰先師實無此語莫謗先師好師云衲子競頭紛紜柏樹子話則所尚者豈非話柄縱你識得趙州意還須知有覺鐵嘴這一門限在卓拄杖一下云今日要與光孝相見者試道看一僧才出師便打僧掀翻香案師直打趁出趙州因僧問狗子還有佛性也無州云無師云妙喜將僧問一節至趙州答無處止令學者參但透得無字一切皆明又五祖演和尚示衆云狗子勝貓十萬倍要須摟破南泉窠窟掀翻趙老家私再看五祖為甚麼平白地上分箇勝負為復抑揚之語耶為復故意扭捏耶為復一期方便耶若作如此見解不惟不識五祖要見南泉趙州遠之遠矣亦且嘔血有日在古德一般提箇事利害在甚麼處法性不寬波瀾不廣不到七通八達難以評量古今卻不是一味蓋抹得去的道理不見道當時摩竭國幾喪目前機趙州因侍者報大王來也州云萬福大王者云未到在州云又道來也師云侍者虛報軍情趙州望敵輕進直得雙鳳雲中扶輦下六鰲海上駕山來趙州因二僧相推不肯作第一座主事白州州曰總教他作第二座事曰第一座教誰作州曰裝香著事曰裝香了也州曰戒香定香慧香解脫香師云趙州著箇座元於佛祖位上使天下叢林無敢正坐規繩自此一跌直至于今整理不起還有人為法社正紀綱者麼不必相推請來相見如無則山僧擯卻聖僧去也趙州因僧問至道無難惟嫌揀擇是時人窠臼否州曰曾有人問老僧直得五年分疏不下師云趙州古佛尚且經年道不得何況其餘你們只管亂開大口旁僧哂之師打三下曰舉似明眼人看趙州勘臺山婆子師云趙州婆子這僧以諸方判斷互有勘破處臺山一條路直得七灣八曲無所適從不若這一隊漢總被臺山路勘破合喫臺山路手中棒這也免不得依樣畫貓兒還知麼這婆子是箇老滑頭佛來也恁麼道祖來也恁麼道趙州久經行陳的老將豈是尋常行腳之流這僧踏毗盧之頂超佛祖之上若論趙州勘破婆子蘇盧悉利娑婆訶婆子勘破趙州悉利蘇盧娑婆訶這僧勘破婆子蘇盧蘇盧娑婆訶臺山勘破諸方悉利悉利娑婆訶僧云和尚聻師云老僧罪過趙州因有一婆子令人送錢請轉藏經州受施利了卻下禪床轉一匝乃曰傳語婆轉藏經已竟其人回舉似婆婆曰比來請轉全藏如何秪為轉半藏師云趙州既受施利許為轉藏以不全轉大失所望歷來禪林諸大老拈頌批判總為那半藏欲補趙老之不足細算大藏之數卻也爭不多了其餘只待星宿劫千佛出世以補之或不能待老僧不惜腕頭氣力代為一二卻也懶下禪床更不能繞經周匝極是省便分明記取數目更不可謂老僧負汝也趙州因僧問承聞和尚親見南泉是否州云鎮州出大蘿葡頭師云要見南泉則易要見趙州則難要見趙州則易要見蘿葡則難還有要見蘿葡者麼請來與老僧相見老僧賣身供養他不見道拾薪設食乃至以身而為床座金川操禪師請米和尚齋不排座位米一到便展坐具禮拜操下禪床米乃坐操位操卻席地而坐齋畢米便去侍者曰和尚受一切人供養今日坐位被人奪卻操曰三日後來即受敕在三日後米果來曰前日遭賊師云當時米和尚一到便席地而坐絶教金川上天無路入地無門直坐到樓至如來出世我那時再來與渠相見以手斫額曰貓湖南上林戒靈禪師初參溈山山曰大德作甚麼來林曰甲胄全具山曰卸卻了來與上座相見林曰卸了也山咄曰賊尚未打卸作甚麼林無對仰山代曰請和尚屏卻左右溈山以手指曰喏喏林後參永泰方諭其旨師云且道上林悟溈山旨耶悟仰山旨耶若從溈山上悟來甲胄何在若從仰山上悟來試問仰山還曾屏卻也未若總不恁麼從自己領得卸卻箇甚麼或曰和尚何得以己方人以手指曰喏喏溈山上堂僧出曰請和尚説法溈曰我為你得徹困也僧禮拜師曰須知溈山未上堂早已徹困也溈山一日喚院主主便來溈曰我喚院主汝來作甚麼主無對又令侍者喚第一座來座便至溈曰我喚第一座汝來作甚麼座亦無對師云若是不來有違師命隨喚而至又觸師嫌已後第一座師自下堂見他便了溈山一日見劉鐵磨來溈曰老牸牛汝來也磨曰來日臺山大會齋師還去麼溈放身作臥勢磨便出師云溈山被鐵磨一問直得倒街臥路牛馬踐踏總不顧也且道大會齋還去不去到來日再看溈山與仰山行次指前枯樹問仰山云前頭是甚麼仰云只是枯樹子溈卻問耘田翁翁亦云枯樹子溈云這耘田翁向後亦有五百衆師云溈山作恁麼語話耘田翁未肯點頭在雲巖掃地次道吾曰太區區生巖曰須知有不區區者吾曰恁麼則第二月也巖豎起掃帚曰是第幾月吾便休去玄沙曰正是第二月師云雲巖果是第二月玄沙只見第二月爭者不是辨者不真所以道吾休去靈雲志勤禪師見桃花悟道有偈呈溈山云三十年來尋劍客幾回落葉又抽枝自從一見桃花後直至如今更不疑溈覽偈詰其所悟乃符契囑曰從緣悟得永無退失善自護持玄沙聞云諦當甚諦當敢保老兄未徹在師云靈雲若不是玄沙幾被桃花誤了一生溈山也是憐兒不覺醜或有問老僧靈雲未徹在甚麼處曰不妨疑著仰山在溈山為直歲作務歸溈問甚處來仰曰田中來溈曰田中多少人仰插鍬叉手而立溈曰今日南山大有人刈茅仰拔鍬便行師云作務歸來父子酬唱直得填溝塞壑無處出頭雪竇道仰山被溈山一問直得無繩自縛死去十分還知仰山麼偶行花下路驚起樹頭鶯臨濟見僧來舉起拂子僧禮拜濟便打又有僧來濟亦舉起拂子僧不顧濟亦打又僧來參濟舉拂子僧曰謝和尚指示濟亦打師云有賓有主有照有用其中一棒超諸佛之先一棒為列祖頂門一棒撑天拄地試揀點看旁僧云這老漢向這裏分先分後論佛論祖師便打臨濟問僧甚處來曰定州濟拈棒僧擬議濟便打僧不肯濟曰已後遇明眼人去在僧後參三聖才舉前話三聖便打僧擬議聖又打師云竹上泉通竹下水澗東花發澗西紅三聖慧然禪師至仰山山問汝名甚麼聖曰慧寂山曰慧寂是我名聖曰我名慧然山大笑師云仰山向虛空裏穵縫三聖煉石補天陳希夷一覺睡千年至今不知直是好笑三聖上堂云我逢人即出出則不為人便下座興化云我逢人則不出出則便為人師云三聖不為人不知誤卻多少人興化便為人不知誤卻多少人還有不誤者麼相看兩不厭惟有敬亭山桐峰庵主僧問和尚這裏忽遇大蟲來時如何主便作大蟲吼僧作怖勢主大笑僧曰這老賊主曰爭奈老僧何師云桐峰不用棒所以妙這僧不用喝所以妙桐峰大笑這僧亦大笑梁山泊裏稱豪傑看來都是不良人夾山將示滅垂語洛浦曰石頭一枝看看即滅矣浦曰不然山曰何也浦曰他家自有青山在山曰苟如是即吾宗不墜矣師云石頭一枝有賴洛浦此語墜吾宗者惜夾山後語減價賣絲帛兒孫盡布衣白頭因參韶山山問莫是多口白頭因麼因曰不敢山曰多少口曰通身是山曰尋常向甚麼處屙曰向韶山口裏屙山曰有韶山口即得無韶山口向甚麼處屙因無語山便打師云撥草蛇傷惹火燒身恁麼人在在有之因禪多口直得閉殺韶山無口直得屙殺巖頭一日參德山方跨門便問是凡是聖山便喝巖便禮拜有人舉似洞山山曰若不是奯公大難承當巖曰洞山老人不識好惡錯下名言我當時一手抬一手搦師云還是洞山錯巖頭錯復云德山有定乾坤的句巖頭握閫外之威權雖二大老猶不免千秋之下遭人揀點且看他罅漏必竟在甚麼處雪峰普請次路逢一獼猴峰曰人人有一面古鏡這箇獼猴亦有一面古鏡三聖曰曠劫無明何以彰為古鏡峰曰毛生也聖曰這老漢著甚麼死急話頭也不識峰曰老僧住持事繁師云好一面古鏡被二大老椎得粉碎直至如今要箇完全也難得一僧曰老漢又恁麼去也師云老僧罪過雪峰因僧問聲聞見性如夜見月菩薩見性如晝見日未審和尚見性如何峰打三下後問巖頭頭打三掌師云雪峰打巖頭打若論見性如隔羅縠在雪峰上堂云南山有一條鱉鼻蛇汝等諸人切須好看長慶出曰今日堂中大有人喪身失命雲門以拄杖攛向峰前作怕勢有僧舉似玄沙沙曰須是稜兄始得雖然如是我即不然曰和尚作麼生沙曰用南山作麼師云雪峰毒氣薰蒸長慶拚命挨拶雲門矢上加尖堪作甚麼話玄沙用南山作麼巧不如直然雖如是即今還有不被其所薰者麼不妨出來與老僧相見罷罷救得來已是不堪了也雪峰上堂云盡大地撮來如粟米粒大拋向面前漆桶不會打鼓普請看師云會得則埋身千丈不會則遍地塵埃雪峰上堂云諸上座望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也師云請和尚下涅槃堂裏去北院通禪師問夾山曰目前無法意在目前不是目前法非耳目之所到豈不是和尚語山曰是院乃掀倒禪床叉手而立山起打一拄杖院乃下去師云夾山好拄杖秪是分付遲了待北院問到豈不是和尚語處便打此時北院縱有神用也措手不及雖然如是北院待夾山打一下始行是何意思弄玉已隨蕭史去丹青留與後人狂芭蕉慧清禪師上堂拈拄杖云你有拄杖子我與你拄杖子你無拄杖子我奪卻你拄杖子靠拄杖下座師云老僧即不然你有拄杖子不是我與的你無拄杖子不是人奪你的與不得奪不得善用則敲骨打髓不善用則當面著賊芭蕉滯貨只好靠壁玄沙師備禪師問鏡清教中道不見一法為大過惡且道不見甚麼法清指露柱云莫是不見這箇法沙曰浙中清水白米從汝喫佛法未夢見在師云玄沙幸遇鏡清若是箇返躑的漢那裏容得我常見欺敵者亡雲門到洞巖巖問作甚麼來門云親近和尚來巖曰亂走作麼門曰暫時不在巖曰知過即得門曰亂走作麼師云得便宜處失便宜雲門問臥龍明己底人還見有己麼龍曰不見有己始明得已又問長連床上學得底是第幾機龍曰是第二機曰如何是第一機龍曰緊峭草鞋師云錦包特石鐵裏綿團雲門聞齋鼓曰鼓聲咬破七條乃指僧曰抱取貓兒來良久曰且道鼓因甚置得衆無對乃曰因皮置得我尋常道一切聲是佛聲一切色是佛色盡大地是箇法身枉作佛法知見如今柱杖但喚作拄杖見屋但喚作屋師云鼓因皮置得拄杖喚拄杖屋喚屋瞎卻雲門一衆眼即得如何瞎卻天下人眼雲門云光不透脫有兩般病一切處不明面前有物是一又透得一切法空隱隱地似有箇物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存坐在法身邊是一直饒透得法身去放過即不可子細點檢將來有甚麼氣息亦是病師云世尊三昧迦葉不知迦葉三昧阿難不知阿難三昧商那和修不知佛祖三昧衆生不知衆生三昧山河大地不知燈籠三昧露柱不知打破情識窠臼掀翻從前鬼窟柏樹子開花虛空粉碎且道是三昧是病若撿點得出好參雲門禪撿點不出不免髑髏前見鬼試商量看雲門垂語云人人盡有光明在看時不見暗昏昏作麼生是諸人光明自代云廚庫三門又云好事不如無師云雲門代兩語一語水裏拈星一語山頭張網大唐國裏打鼓新羅國裏鳴鐘料掉沒交涉請歸堂喫茶雲門拈杖云凡夫實謂之有二乘析謂之無圓覺謂之幻有菩薩當體即空衲僧家見拄杖便喚作拄杖行但行坐但坐不得動著師拈拄杖云凡夫二乘緣覺菩薩總向這裏著倒直得行不得坐不得動不得靜不得擲下云如今拋向東洋大海裏免教向這枯木上生枝生葉雲門因僧問樹凋葉落時如何門云體露金風師云釋迦老子無事向水中撈月達磨祖師有手只可擎空挨得黃檗痛棒再到睦州折腳三箇毬子一時輥來四下藤條好稱禪佛豎拂子云雲門大師來也你若向體露金風上見崖州萬里雲門問嶺中順維那古人豎起拂子放下拂子意旨如何順曰拂前見拂後見門曰如是如是師後舉問僧你道當初諾伊不諾伊僧無對門曰可知禮也師云和尚也須防護口業好雲門上堂拈起拂子云這裏得箇入處去捏怪也日本國裏説禪三十三天有箇人出來喚云特舍兒擔枷過狀師云是時諸天子雨曼陀羅花摩訶曼陀羅花曼殊沙華摩訶曼殊沙華旃檀香風悅可衆心漆桶不快請過一邊雲門上堂衆集門以拄杖指面前曰乾坤大地微塵諸佛總在裏許爭佛法覓勝負還有人諫得麼若無人諫得老漢為你諫看僧曰請和尚諫門曰這野狐精師云這老漢挾勢陵人取面鏡來請老漢試照看且道面皮厚多少雲門上堂眼睫橫亙十方眉毛上透乾坤下透黃泉須彌塞卻汝咽喉還有人會得麼若有人會得拽取占波國共新羅鬥額師云上南京船往福建去北京人來為甚麼不得江西信試道看風穴延沼禪師上堂云若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老安帖於此明得闍黎無分全是老僧於此不明老僧即是闍黎闍黎與老僧亦能悟卻天下人亦能瞎卻天下人欲識闍黎麼右邊一拍曰這裏是欲識老僧麼左邊一拍曰這裏是師云喫官酒臥官街當處死當處埋妙手何須誇板拍三台須是大家推明招德謙禪師在疾一日國泰深和尚來問疾侍者通報云深師叔來明乃令請入方丈明曰阿㖿阿㖿深師叔救取老僧深云和尚有什麼救處明舉頭一覷云咦眼子烏㖀㖀地依前是舊時深上座乃回身面壁便不相見師云高聲喚侍者拏湯來復云苦哉屈哉明招與僧擁罏僧問目前無法意在目前不是目前法非耳目所到那句是主那句是賓明指火罏曰與我向此中拈一莖眉毛得麼僧曰非但學人盡大地人喪身失命明曰汝因甚麼自把髻投衙師云前不搆村後不搆店且幸留得箇火罏子招慶道匡禪師於中路按拄杖問僧云上窟泥下窟泥僧云上窟泥招打一棒又問一僧僧云下窟泥招亦打又問明招招放下泥擔叉手云請師鑑招便休師云上窟也打下窟也打放下泥擔便休去好不了事且道是賞伊是罰伊若撿點不出也與你一拄杖大龍智洪禪師僧問色身敗壞如何是堅固法身龍曰山花開似錦澗水碧如藍師云試問大龍還曾夢見堅固法身麼廣德周禪師因僧問教中道阿逸多不斷煩惱不修禪定佛記此人成佛無疑此理如何廣曰鹽又盡炭又無曰鹽盡炭無時如何廣曰愁人莫向愁人説説向愁人愁殺人師云不是問津來洞口安能遊遍武陵春洞山守初禪師參雲門門問近離甚處初云查渡門云夏在甚麼處初云湖南報慈門云幾時離彼初曰八月二十五門曰放汝三頓棒初明日卻上問訊昨日蒙和尚放三頓棒不知過在甚麼處門曰飯袋子江西湖南便恁麼去初於言下大悟師云雲門到這裏也把不住使人上頭上臉會見老胡一枝掃土而盡洞山初示衆云言無展事語不投機乘言者喪滯句者迷於此四句語中見得分明也作箇脫灑衲僧根椽片瓦粥飯因緣堪與人天為善知識於此不明終成莽鹵師云夜夢不吉題破在壁君子讀過化為大吉洞山因都監大保問眼處入正受諸塵三昧起此意如何洞山云洞山茶碗裏有太保太保茶碗裏有洞山太保無語卻將此語問谷隱隱云不落無言説問延慶慶云喚甚麼作三昧師云一箇老婆禪一箇新婦禪一箇女兒禪總被太保折倒了也奉先深禪師同明和尚到淮河見人牽網有魚從網透出深曰明兄俊哉一似箇衲僧相似明曰雖然如此爭如當時不撞入網羅好深曰明兄你欠悟在明至中夜方省師云一年被蛇咬三度怕爛草首山省念禪師因僧問如何是佛山曰新婦騎驢阿家牽曰未審此語甚麼句中收山曰三玄收不得四句豈能該曰此意如何曰天長地久日月齊明師云欽深淵默漆雞頭大將軍除壁虱龍濟紹修禪師示衆云具足凡夫法凡夫不知具足聖人法聖人不會聖人若會即是凡夫凡夫若知即是聖人此語具一理二義若人辨得不妨於佛法中有箇入處若辨不得莫道不疑師云辨得來也是草裏漢辨不來也是草裏漢龍濟不敢批評請自領去法眼禪師因僧問聲色兩字甚麼人透得眼即謂衆曰諸上座且道這僧還透聲色也未若會此僧問處透聲色也不難師云平地上死人無數石霜諸禪師問英首座近離甚處英曰金鑾霜曰去夏在甚處英曰金鑾霜曰前夏在甚處英曰金鑾霜曰先前夏在甚處英曰和尚何不領話霜曰我不能勘得汝教庫下供過奴子來勘且點一碗茶來與汝濕口師云石霜不奈這擔板漢何只得打箇懸空斤斗何不與渠本分草料趕出山門絶教渠一世向金鑾坐著大愚芝禪師示衆云三世諸佛不知有狸奴白牯卻知有乃拈拂子云狸奴白牯總在這裏放光動地何為如此兩段不同師云大愚拈箇狸奴白牯還曾夢見麼大愚因僧問通身是眼口在甚麼處愚曰三跳僧曰不會愚曰章底詞秋罷歌韻向春生師云大愚果有懸河之辨爭奈這僧無眼舒州法華全舉禪師到琅琊覺和尚處琊問近離甚處華曰兩浙曰船來陸來華曰船來曰船在甚處華曰步下曰不涉程途一句作麼生道華以坐具摵一摵曰杜撰長老如麻似粟拂袖而出琊問侍者此是甚麼人者曰舉上座琊曰莫是舉師叔麼先師教我尋見伊遂下旦過問上座莫是舉師叔麼莫怪適來相觸忤華便喝復問長老何時到汾陽耶曰某時到華曰我在浙江早聞你名元來見解秪如此何得名播寰宇琊遂作禮曰某甲罪過師云妙喜曰賓則始終賓主則始終主二大士驀劄相逢主賓互換直下發明臨濟心髓苟非徹證向上巴鼻具出常情正眼未免作得失論量復引雲門問洞山近離甚處曰查渡夏在甚處曰湖南報慈幾時離彼曰八月二十五門云放你三頓棒為證大慧法眼精明鑑徹千古使法華琅琊輝騰末後石霜克賓亦得之以發揚不合為蛇添足具眼者試揀點看法華示衆云釋迦不出世達磨不西來佛法遍天下談玄口不開師云法華龍頭蛇尾天衣義懷禪師示衆云古人云五蘊山頭一段空同門出入不相逢無量劫來賃屋住到頭不識主人翁有老宿拈云既不識他當初問甚麼人賃屋恁麼拈也太遠在何故須知死人路上有活人出身處活人路上死人無數那箇是活人路上死人無數那箇是死人路上活人出身處若撿點得分明拈卻炙脂帽子脫卻鶻臭布衫師云辨金鋀分玉石還他天衣古佛不解出身者不免向鬼窟裏作活計這裏甄別得出正好戴卻炙脂帽子穿卻鶻臭布衫且道與古人是同是別
