body:
  text: 住雲門顯聖寺門人淨範編山陰嗣法弟子祁淨超較訂住姑蘇古朱明寺語録乙未歲十二月初十日合郡檀護請入院山門東西十萬南北八千森羅一印出入聖賢春回臘後梅花玉襯步香生貼地蓮佛殿星宿劫賢劫莊嚴劫法身佛報身佛應身佛天籟地籟人籟橫說豎說倒說以手指上云你秖知背手彎弓卻不慮當面著賊遂大展三拜伽藍金爐內騰法界之香蠟炬上分四照之光自非夙乘悲願我與你咫尺參商燒香云閏餘成歲律呂調陽祖師摩騰竺法蘭破東震之荒菩提達磨老鑿混沌之穴百丈規繩頂門著楔今日撞著箇無情漢子燒香云燒卻這一橛據室踏翻滄海坐嘯乾坤太行千里墨黃河一度清瀾翻舌捲寂若無聲卓拄杖云碧賓斑豹剝當滴帝都丁即日上堂拈疏云龍章鳳彩雲篆星文珠明照乘玉潤連城若是雕琢將來堪作甚麼但成文彩即屬染汙其或畫前有易刪後無詩山僧到此口挂壁上乃度疏云通事舍人試道看師指法座云獅子吼黃金遍地象王行匝野花紅霜鳥上枝棲一聲啼破隴頭春色遂升座拈香畢乃云諸佛出身處蘇臺水上行朔風自北來殿角生微冷清除荊棘林幻出祗園境日射風窗鸞鳳鳴月高霜瓦鴛鴦影彌勒道場鬧市叢中梵王宮殿福城煙井側布金磚前朱公後朱公當空寶劍人王令法王令鐘磬笙歌黃粱喚醒將陳年滯貨提向十字街頭出賣雲門胡餅良久云領元旦上堂寶炬香生玉鼎煙和風淑景賀新年春光一到花枝上笑破沈空自了禪年新與月新晴霞轉緑蘋夢回蝴蝶梅花圃緩步黃鸝楊柳濱且喜官清民樂舜德堯仁道人高枕豎拂子云寶筏度迷津立春值雪青龍斯長老至上堂今日朱明寺裏玉砌樓臺銀粧世界略無縫罅入我門來撲頭撲面無處回避絶教通身是遍身是更喜青龍歲首春回萬井遍界瓊瑤滿城簫鼓只是溪深雪厚難覓芹芽客來無秖待如之奈何拈拂子一縷云幸得這裏還有些些下座合郡護法紳襟等請上堂古聖前賢主世界聲教化或有言或無言其有也靈文寶藏玉軸琅函其無也心心相印脈脈相連即以此正人倫立綱紀定出處建功名利己利人啓後承先朱明這裏不住兩岸不住中間春風芳草萬卉爭妍桃花人面楊柳拖煙上林雨過沸笙絃不是黃鸝是杜鵑正是姑蘇二月天上堂朝朝日出朝朝雨細草沈沈杏花如許反舌新鶯啼在深林裏好一似織錦天孫絲絲縷縷遍乾坤總屬朱明春曉慚愧殺達磨鬍子長水古資聖寺大殿落成臘八日請上堂此一具地尋方琢圓不惟契約分明亦且代有令主千聖萬賢各各居神通大光明藏興大佛事顯大神力現等法界身莊嚴雲歷等法界梵行莊嚴雲證等法界定慧莊嚴雲聲等法界音教莊嚴雲至於人天七趣亦不失三昧正受塵須彌吸滄海如佛身如法界出百萬億寶手獻百萬億寶供豎百萬億寶幢懸百萬億寶幡覆百萬億寶蓋山僧既作飄蓬之客隨例闖入毗盧遮那莊嚴藏大樓閣中一時遍歷無邊剎海何止移武林來嘉禾將秀水入姑蘇而已哉適當解維之際聊以一偈為別雲靄靄風凄凄殿角凌雲接爽溪梅花新月野雲低一色香光照水西大衆葫蘆提又葫蘆提歸院請上堂旅雁書空隊不孤盤旋猶憶洞庭湖好將南國花堤月殘雪連山夜入吳拄杖捎空往復無際芒鞋海闊動靜歸源豎拂云雖然如是也須識得這箇方可毛吞巨海芥納須彌拽取占波國與新羅鬥額東湧西沒南湧北沒雲行雨施草木蒙潤大衆會麼一陽復始春將至遍界奇香發滿枝上堂長門永巷寂寞秋清古寺荒園蕭條風景法堂前草長廚灶下斷煙法昌遇撾鼓還他一力泉大道應門秖用小童倩人看院始是全提破屋楊岐才能半展所以黃茆白屋之下有蓋世英雄清泉幽石之邊住超塵逸格之士運日月于掌中正乾坤于跬步與諸佛以齊肩同聖賢而一躅就使一劫二劫直逗到八萬四千劫總不出今時上方下方東南西北方仍在這裏瀟瀟灑灑勤勤渠渠楊柳日高浪激太湖之碧桂花雨後風搖月下之香任意徜徉洞府瀟湘大衆恕我老狂至崇先寺請上堂師云大衆十五日以前有箇截流句子須是向威音那畔父母未生時會取始得你若眨上眉毛便不是也豈不知崇先有箇沒人情漢若向門前抽起橋板截斷往來你等從何處躋攀山僧今日忽撩起衣云此是借來衫子假道于虞不妨為你花擘一上展兩手云呀到這裏又忘卻了也復以手招云來來事無一向拍案一下云一任船來陸來黃鶴峰前闢通天大路龍到水到師子窟內有踞地之威也只為祖父田園兒孫受用開甘露門列君臣位小可作箇去就直得黃金遍地朱紫滿林十月應小春花開一塢三冬臨大有月映千江水足草足家豐民樂有不唧溜漢漆桶不快往往于虛空穵縫離水求波是以山僧向未屙以前先步先趨若逗到十五日堪作甚麼然雖如是不直我浪兄一笑且道笑箇甚麼他道是鈍鳥先飛直其後也珍重師集諸山知識為西遁超道者慶六秩壽上堂寶鏡堂前風月石傘峰下家聲沒量漢手眼通方出處無礙陶靖節松菊猶存程明道花柳隨步維摩詰儒冠說法龐鹿門兒女團圞戒禪師何妨乘願再來嚴頭陀且於夢中顯現大衆知麼超道者一向足不越戶藥不離唇誰知他斗室中藏無邊佛土葫蘆內有大路通天擊拂三下云老僧今日借一節漁鼓三尺板簡唱箇道情引起白雲用之花發四時紅深緑淺隔簾櫳清香一線移時添海屋籌那知門兒外滄桑幾變此是他自受用的履踐如夢中人上兜率宮受無量樂雖同寢者不聞亦不見老僧到此有口難宣下座去請諸上座助顯第一義說箇異方便顧左右云切莫刻舟求劍請天界和尚上堂引座君視臣恭道統源長子孝父慈法繩綿遠得之者月上照梅花失之者古鏡添黑漆思大鼻孔撩天雪峰眼睛遍地拍案一下云這箇所在爭容得妖狐首領魔種元凶薄我籓籬穿豫墻塹所以洞山老祖橫抽寶劍斬諸見之稠林妙協弘通截萬端之穿鑿古道寥寥玄音絶唱幸有我天界法兄節拍相諧嘉猷並諦其奈門庭高峻波瀾浩大豎拂子云大衆會麼殷勤為解丁香結放出枝頭自在春上堂稻子秋登蟹正肥果然一飽便忘饑堪嗟清白傳家客身入西山自采薇雲冉冉水依依主人何事不來歸大衆要識主人麼以手斫額云貓上堂雁唳秋聲到客窗寒風獨坐剔銀缸籌輸白手成家子博得藍田玉一雙些箇事惱人腸從前事業費商量夜月一鉤清漢碧漁歌嘹亮在滄浪還我雲門一句子前三三與後三三上堂不應住色生心不應住聲香味觸法生心應無所住而生其心師望空打一掌云者老漢老老大大牙黃口臭作恁麼說話大衆諦聽良久云若也不會山僧打之繞去也左顧云大衆應如是住右顧云大衆應如是降伏其心復喝一喝云參果園淨器淨辨舍法衣請上堂黃梅親手付將來大庾嶺頭爭不去提起也乾坤失色放下也草木騰輝少林初祖衣法雙傳衣在者裏如何是法唵摩訶迦婆波吒悉帝娑訶上堂日出皇皇那事如嘗邪橋連野店新米菜羹香因尋酒浪子小艇泛溪光大衆今日有佳客來也且道是甚麼人搖拂子云賀家池上天華寺日午三更到客航上堂言無展事語不投機承言者喪滯句者迷祖師道非風幡動仁者心動十月二十九上高樓飲好酒你彈琵琶我拍手以拂子擊三下云甲申乙酉上堂歲登事事收成足正好窗前含苦讀冠天履地丈夫兒豈可因循類流俗異時馬上錦衣歸法雨均沾於草木阿呵呵且唱雲門一曲良久云六六三十六上堂觸處逢源識得渠石傘峰前一帶溪落花無限春山暮就路還家聽鳥啼老僧四十年前于先顯聖處狹路相逢納盡許多敗缺一回想起滿面羞慚今日春山不遠啼鳥依然惻惻關心也要大家委悉上堂霜重蘆華柳岸低一鉤新月釣寒溪金鱗已是無消息又聽前村報曉雞鐘樓上撞鐘牆腳下種菜猛虎山裏踞大衆且道與古人回互不回互以拂子左擊云回而更相涉右擊一下云不爾依位住上堂殘月如鉤柳青溪堰把住則霜風凜冽放行則桃華人面若究到露柱鐙籠釋迦老子猶隔一線上堂丈夫格調原超脫豈肯從人覓繡針十里繁紅原舊物冰華二月本無心豎起拂子云若向者裏結搆得去頭正尾正者裏若結搆不去君歸東魯我歸秦武林古報恩寺入院上堂師云本是瀟湘一釣客自西自東自南北端獅子解翻筋斗老僧秖知拍手潦倒龍鍾甲子乙丑學得箇象王回顧拈得鼻頭失卻口更說甚麼江水逆流日月倒走茲者辱承衆護法之招聊塞一時之醜桑梓不敘生緣展驢腳而為佛手用處貓頭當藥撾塗毒以開樞鈕驀拈拄杖云也只可將蝦釣鱉掉棒打狗結制上堂問陶鑄聖凡即不問如何是無生一曲師云老僧向你道不難不可作野狐精見解進云因甚又道三賢未達十聖難知師云三賢十聖且置達磨在你腳跟下還知麼僧便喝師屈指云老僧被你一喝僧禮拜云是何言歟問經有經師論有論師今日伐鐘捶鼓和尚升堂為些甚麼師云兩肩挑不起僧擬議師一喝問昔日瞿曇說法四十九年無一字可說今日和尚升座將何法與人師云才過萬松關便見浙江潮進云踢破分明師乃豎拂子云向這裏搆得撩起便行顧左右良久笑云恁麼則老僧誑謔你去也新羅國裏談禪濟濟英賢車馬駢填拄杖子飛上三十三天癩蝦蟆做了月裏嬋娟碧海清光萬古懸一似水銀潑地大也圓圓小也圓圓鳳皇山下好因緣步步襯青蓮拍案一下云入我門來全福全壽全更向凌煙閣上題名到處流傳山僧又將七珍八寶撒向鬧市街前阿呵呵說向人前不直錢請崇先和尚上堂引座世界未分先有此一坐具地千佛出世無敢正坐不意普通年間達磨老臊胡窺我藩籬掩我畿甸山僧自墮下母胎便帶得有一條雲門拄杖不但使其餵狗飼狼直欲勦其窠窟滅其種族使一箇箇作頂天立地大丈夫光齊二耀物不能礙奈有其志而不逮逗到今日方知道捉刀翁真英雄也他一雙眼耀古騰今數莖眉撐天拄地胸羅星斗寥廓太虛掌握乾坤氣吞佛祖扭轉達磨鼻孔抽換野狐肝膽鑽仰者徒然攀仰者莫及今日以慈悲故為不請賓此番佛事大非小可汝等當斂其鋒韜其耀避其爪牙設或犯手傷鋒莫謂老僧不為汝等說破下座上堂僧問萬卉俱狼藉寒風逐月波如何是境師云杖黎不為前村酒乘霽登高看遠山進云如何是境中人師云到江吳地盡隔岸越山多進云如何是人境俱不奪師云愁過萬松關山路滑如油進云如何是人境俱奪師云塞外絶烽煙將軍數雁行僧禮謝師乃云好棚傀儡線索何繁五車書不消一瞬三藏教貴在離言授衣鉢於黃梅行者領袈裟乃樹下頭陀至人不踰乎常情大聖心如赤子有般漢秖知道到江地盡猶不識隔岸山多以情見而望勝果幾多蹊徑惟晏坐而散天花尚屬嶒巖況乃潮生汐落伍相國吞吐錢塘地轉天回維摩詰掌擎佛剎鳳皇山下鳳皇兒獅子窟中獅子子大丈夫不受囊藏好男子肯投虀甕寶鏡懸如杲日吹毛利似嚴霜地藏這裏竹搖拭翠三更雨松捲寒濤一塢風知之者吾無隱耳不知者人可玩乎所謂恁麼也不得不恁麼也不得恁麼不恁麼總不得審如是則老僧不奈諸君何諸君又何奈老僧何雲飛嶺北雁度前津我歸東魯君向西秦大家丟得不猩猩擊拂子三下鼓山永和尚訃音至上堂今日有一句子山頽石裂川竭泉枯萬里無寸草遍界絶遮攔虛空突出面孔月下寫得真容舉訃音云大衆此是南閩鼓山尊宿永覺老和尚末後一著有煩專使三千里外持來箇消息頂相圓光更無回互大衆還知此老漢麼儒釋兼備金翅騰空宗教兩優驪龍出海數十年來壁立千仞雖侍者邊了無箇入處有時節澤沛為霖雖嬰兒亦受獎提喝水逆