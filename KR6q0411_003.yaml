銖於未兆奪師曠之聰識宮商於匪形寶劍出匣寒光射斗牛驪珠泛海絢赫爭日月兩堂爭底是貓兒南泉斬底不是貓兒趙州頂底不是草鞋南泉斬底卻是草鞋既不是貓兒又不是草鞋且道是甚麼摘下竹篦云山僧有一語相誑甘墮拔舌地獄示衆箭穿石虎囓指心痛唐王揮劍閬守墮頭李善報主男身湧乳古德云五臺山上雲蒸飯佛殿階前狗尿天剎竿頭上煎䭔子三箇猢猻夜簸錢恁麼說話聞見豈不駭異若是頭腦清楚如觀掌物有般漢只管向稱錘上呷汁沙石裏打油堪作甚麼且道如何是頭腦良久云東大衆且道是那箇東字還是東西底東字冬夏底冬字衆無語師乃云蒼天蒼天示衆五九四十五多不須增少不須補孔夫子千古聖人禁不得子路馮河暴虎新春至今才一七長不必添短不必析釋迦老子三界大師免不得提婆達多流言下石所以道高處高平低處低平在僧而僧在俗而俗在天而天在人而人厲與西施恢詭譎怪道通為一起身立云大衆好去看殘雪未消滿庭月色四弘攝真寂院事請示衆此院為佛法之叢林執事為佛法之輔弼乃至一茶一飯一舉一動無往而非為佛法也同住大衆即此推廣更愁甚麼道業不辦叢林不興雖然不知喚甚麼作佛法若道山僧舉拄杖子是佛法則山林樹木竹搖草動皆是若以山僧舉拂子為佛法則牛狗尾巴東搖西拽也是若謂弄兩片皮鼓粥飯氣為佛法則鵲噪鴉鳴亦皆是則新監院請豫說法已自錯了也又雖然若論佛法固有道亦不難只是說破不值半文錢大衆還會麼典座切菜失手割破指頭這裏打入一生參學事畢飯頭下米偶然濺起一點沸湯這裏領得何等直截行堂的掇著一桶粥忽被門檻絆倒桶箍爆斷何等慶快圊頭浴鍋裏柴頭柴擔上園頭钁頭邊盡有親切句子何待山僧口吧吧地然後為佛法邪若恁麼則先老人在也是佛法不在也是佛法山僧開口也是佛法不開口也是佛法住也是佛法去也是佛法以手摑兩摑云早間道牙痛胡說箇甚麼便歸方丈水月菴示衆衣下有珠藍田有玉分明此道通長安多少人龜鑽瓦卜釋迦老子八字不著人達磨西來一字重添畫所以箇中人能轉得十二時錯亂了東西南北山僧以初度將臨賢主人致申萬福設齊筵羅品核盡道是華封三祝是以山僧不惜為君刳心剖腹屈指云正月一二月二三月三四月四五月五六月六七月七八月未圓桂華發羅睺羅命犯生殺喫了好茶好飯終日裏咳咳連咳數聲云會麼衆無語復云唐明王會打羯鼓惹得猿啼三峽示衆昔有僧問青林曰如何是學人自己林曰丙丁童子來求火後有僧問雲門先師如何是學人自己先師云汝無自己僧云因甚學人無自己先師云汝若有自己則不來問老僧舉竹篦云青林不合將一杓惡水驀頭潑使後來人錯認驢鞍橋作阿爺下頷先師恁麼道不獨有殺人劍且有活人刀忽有人問山僧如何是學人自己以竹篦指左右云你這一隊瞌睡漢怎麼看得下座便行示衆云乾坤之內宇宙之交中有一寶隨處逍遙華嶽山崩壓斷了天台石橋寒山拾得有命難逃普化木鐸志公剪刀示衆古德云知而無知不是無知而說無知露凝殘月梨花瘦丁香紐纈鴛鴦扣垂楊堤上馬嘶風煙濃緑厚黃鸝鬥畫樓人眉峰雙皺琴調管協落在人兒後俯瞰花影穿魚金針難繡參示衆舉龍牙問翠微如何是祖師意微曰與我將禪板來牙遂過禪板微接得便打牙曰打即任打要且無祖師意又問臨濟如何是祖師意濟曰與我將蒲團來牙乃過蒲團濟接得便打牙曰打即任打要且無祖師意後有僧問和尚行腳時問二尊宿祖師意未審二尊宿明也未牙曰明即明也要且無祖師意師云龍牙問祖意於翠微臨濟俱喚度禪板蒲團二師接得便打牙皆答曰打即任打要且無祖師西來意雪竇頌云龍牙山裏龍無眼死水何曾振古風禪板蒲團不能用只應分付與盧公盧公付了亦何憑坐倚休將繼祖燈堪對暮雲歸未合遠山無限碧層層覺範見瞎龍死水之句意謂雪竇罪龍牙洪公具如此眼目敢復輕重古德然不知罪雪竇者自罪之矣圜悟勤有拈語試一辨看示衆舉圜悟勤云古有定乾坤底眼方有定乾坤底劍正令當行十方坐斷此事知如此分明不在情塵意見上討若向情塵意見上討則孤負南泉大慧云歸宗斬蛇南泉斬貓學語之流多謂之當機妙用亦謂之大用現前不存軌則殊不知總不是這般道理具超方眼舉起便知落處若大法不明打瓦鑽龜何時是了誠哉言也何不看他題目東西兩堂爭貓兒南泉提起道道得即不斬當時合下何語縱有人下語難道南泉便恁麼休去惟趙州戴草鞋出去泉云子若在救得貓兒即趙州在試為趙州卜度看趙州下甚麼語始得不斬貓兒除卻情塵向頂門大開正眼看他千聖萬靈間世同揆的道理如指諸掌卻又極現成的事即千聖亦移易不得一絲毫許雪峰問德山南泉斬貓意旨如何德山以柱杖便打趁出又真淨舉拂子云今日歸宗舉拂子與當日歸宗斬蛇是同是別又云南泉斬貓歸宗斬蛇叢林中商量還有優劣也無只如趙州頂草鞋出去又作麼生於此明得德山呵佛罵祖於此不明丹霞燒木佛院主墮眉須只如世尊拈花迦葉微笑節目在甚麼處便以涅盤妙心流傳將來又道這等樣事極易明者偏淆訛處又為極難明者雪峰道望州亭與汝相見了也作麼生見香巖上樹如何下語玄沙三種病人如何接取山僧不惜口業為汝花擘一上還知麼老僧話墮也明眼者試辨看示衆臨濟住黃檗三年為睦州激勸且授問端始知參請則胸中曾未有箇佛法知見後築拳於大愚肋下反掌於黃檗面門則賓主玄要料揀諸事畢露於此鳳有九苞麟有五彩胎殼中皆天成者也洎住鎮州垂法立宗辨魔揀異克符普化互相酬唱所有建立亦不過發揚所得然居黃檗時師資之間已是層見而疊出祗如鉏地一則黃檗見之師拄钁而立檗曰這漢困那濟曰钁也未舉困箇甚麼檗便打濟接住棒一送送倒檗呼維那扶起我來維那扶起曰和尚爭容得這風顛漢無禮檗才起便打維那濟钁地曰諸方火葬我這裏活埋其次栽松話代飯頭下語等黃檗以先知其他日為人鉗錘爐鍛之妙故云吾宗到汝大興於世用棒用喝豈師授耶磁石吸鐵有不知其然而然會下參徒多效之此所謂學我者拙上堂次兩堂首座齊下一喝僧問只如兩堂相見同時一喝還有賓主也無師曰賓主歷然復謂衆日要會臨濟賓主句問取堂中二首座試揀點看那家是賓那家是主何處是賓主互換若道無賓主現道賓主歷然若道有賓主同時一喝向何處分賓分主卓拄杖一下復喝一喝云我這裏也有賓有主有照有用若揀點得出可與二首座同參若揀點不出與拄杖子同參有麼否則山僧自道去也復喝一喝曳杖竟行又有僧問臨濟如何是佛法大意師便喝僧作禮師云你道好喝也無僧曰草賊大敗師云過在甚麼處僧曰再犯不容師復謂衆日要會臨濟賓主句問取堂中二禪客師會下有同學二人相問一云離卻中下二機請兄道一句子一云擬問則失一云與麼則禮拜老兄去也一云這賊師聞乃升座云要會臨濟賓主句問取堂中二禪客下座異日復示衆云參學之人大須子細如賓主相見便有言論往來或應物現形或全體作用或把機權喜怒或現半身或乘師子或乘象王如有真正學人便喝先拈出一箇膠盆子善知識不辨是境便上他境上作模作樣便被學人又喝前人不肯放下此是膏肓之病不堪醫治喚作賓看主或是善知識不拈出物秪隨學人問處即奪學人被奪抵死不肯放此是主看賓或有學人應一箇清淨境出善知識前知識辨得是境把得來拋向坑裏學人言大好知識知識即云咄哉不識好惡學人便禮拜此喚作主看主或有學人披枷帶鎖出善知識前知識更安一重枷鎖學人歡喜彼此不辨喚作賓看賓古德貽型範之先且以身試之注釋亦甚明顯後之不惟溟滓其語閫幄嘉猷略而不問是可危也方其令之所屬師資易位彼此相忘觀者劈易不知所裁兩鏡相懸於賓主大法之中垂之於千百世之下將有以繼斯化者耳皆以門庭相尚鮮有以此話及稍有拂意大相喧譟更敢復前所謂草賊大敗之語以進之耶德山示衆云道得也三十棒道不得也三十棒臨濟聞得謂洛浦曰汝去問他道得為甚麼也三十棒待他打汝接住棒送一送看伊作麼生浦如教而問師便打浦接住送一送德山便歸方丈浦回舉似臨濟濟曰我從來疑著這漢雖然你還識德山麼浦擬議濟便打又僧參南院問僧近離甚處僧曰襄州院曰來作甚麼曰特來禮拜和尚院曰恰遇寶應不在僧便喝院曰向汝道不在又喝作麼僧又喝院便打僧禮拜院曰這棒本是汝打我我且打汝要此話大行瞎漢參堂去至如守廓侍者揀點鹿門鹿門納款摧辱華嚴聲滿天下鹿門華嚴是皆出世有衆少不相當降階下禮古德藉重於宗旨無彼我威勢也如此所以鹿門為侍者煎茶晚參云夫參學龍象直須子細入室決擇不得容易逴得箇語便以為極則道我靈利只如山僧當初見興化時認得箇動轉底人道一喝兩喝便休以為佛法今日被明眼人覷破卻成一場笑具圖箇甚麼只為我慢無明不能回轉親近上流賴得明眼人不惜身命對衆證據此恩難報何故興化云饒你喝得興化老人上三十三天卻撲下來一點氣也無款款地蘇息起來向你道未在何故如此興化未曾向紫羅帳裏撒真珠與你在胡喝亂喝作麼真謂藥石之言道流難信如今直須明辨取豈不慶快平生參學事畢鹿門明明道動轉施為的一喝兩喝認作自己既是無明我謾下針砭於膏肓可不一惺耶此非興化侍者鹿門未必誠服然非鹿門返醍醐為毒藥早見一場人我是非也又興化謂克賓維那曰汝不久為唱道之師賓曰不入這保社化曰會了不入不會不入曰總不與麼化便打曰克賓維那法戰不勝罰錢五貫設鑽飯一堂次日師自白椎曰克賓維那法戰不勝不得喫飯即便出院雲居舜云大冶精金應無變色其奈興化令行太嚴不是克賓大難承當若如今泛泛之徒翻轉面皮多少時也又從漪上座到西院旬日常自曰莫道會佛法人要覓箇舉話底人也無西院聞之而默然漪異日上法堂次院召從漪漪舉首院曰錯漪進前三兩步院又曰錯漪近前院曰適來兩錯是上座錯是思明錯曰是從漪錯院曰錯錯乃曰上座且在這裏過夏共汝商量這兩錯漪不肯便去後住相州天平山每舉前話曰我行腳時被惡風吹到汝州有箇西院長老勘我連下兩錯更留我過夏待共我商量我不道恁麼時錯我發足向南方去時早知錯了也老僧每舉此話問學人來十餘年無有愜意者都道天平後語正與未跨船舷未過新羅早已喫三十棒了也一模脫出有何二致苦哉屈哉天平以我謾偷心不肯度夏商量致使終身不知西院落處至後開法猶作箇語話可謂迷而不返我輩更食他唾餘不肯虛心體究鹿門所謂認得箇動轉底便以道極則極靈利此之謂佛法也天平別西院不知多少時了將語録成一則是有待後人揀點必有大義存焉何不細心體究看便恁麼容易開口若未跨船舷之語有何難會不見首山拈云據天平作恁麼解會未夢見西院在何故話在圜悟勤云如今人聞他道未發足向南方去時早知道錯了也便去卜度道未行腳時自無許多佛法禪道及至行腳被諸方熱顢不可未行腳時喚地作天喚山作水幸無一星子事若總恁麼作流俗見解何不買一片帽大家戴有甚麼用處佛法不是這箇道理老僧要與二老把臂共行西院要做他家嫡骨兒孫觀風知變不昧其源七事隨身師子威獰有照有用將道天平是箇人臨濟爪牙實有望焉那知是箇抱橋柱洗澡漢有欲與天平雪屈者試來與老僧商量這兩錯看
