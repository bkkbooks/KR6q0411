body:
  text: 住雲門顯聖寺門人淨範編山陰嗣法弟子祁淨超較訂佛祖歷傳像讚毘婆尸佛世種剎帝利受身了無相母槃頭婆提以幻出諸幻不動遍塵剎至尊以化王復以一微塵含攝蓮華藏華藏復有塵海會亦無量是處寶莊嚴幻出諸形像世界與眾生幻師心所創試覓幻師心漚華起洪浪漚滅惟虛空明月來青嶂尸棄佛明相與光耀表世彝倫道一坐分陀利始唱通別號七眾如雲驤初會即申誥聚業如聚沫隨心妄顛倒禍福緣善惡顛倒心所造心如風過枝風息但虛竅七浪依境風智海成浩浩智不得有無悲願隨所好說法終三會晴空起雷瀑毘舍浮佛居城無以喻況復慈尊也命世須有繇坐娑羅樹下訓爾身心空猶吾假四大汝固執有身散壞亦可詫更執心不滅離境胡為者心境與罪福空花一開卸何須問開落一悟出長夜吾父名善燈吾母稱戒奼世幻出世幻鬱多摩侍者拘留孫佛一會一彈指一悟人四萬同證金色身一濟菩提岸佛身無實身佛幻是人幻生佛身心空吾道以一貫我無授汝記汝亦不須讚是汝本有之一鑑森羅判我坐尸沙樹花開正爛熳法法本天然何物為羈絆說是法要時天女持花散拘那含牟尼佛煩惱及菩提一智無二智說法清淨城惟此無二事垂髮與火輪翳眼心之使了妄不從心當下偷心死文殊試仗劍如來豈能弒如彼夢中人殺盜與婬肆既已違條律怕怖有追吏忽焉從睡覺業性了無恃雲綻見青天虛空無姓字迦葉佛種姓婆羅門亦住波羅國眾生性清淨誰為汝桎梏神珠原不染併復離罪福試取道中泥梵相金莊簇像壞復為泥成毀在倏忽成既不為淨毀亦不為濁猒喧而取靜所以為獨覺常御白牛車寶所可托宿尼拘律陀樹永劫為覆育釋迦牟尼佛現生迦維羅以手指天地受請淨居天龍馬逾城去一睹長庚星超然登寶位且著垢弊衣鹿苑談四諦迦葉現傳衣彌勒當來記娑羅雙樹間去住作遊戲一自拈花來虛空用繩繫此土沐弘恩起自漢明帝東震古聖賢是誰傳舍利一祖摩訶迦葉尊者西天初祖可令法久住篤行第一義身衣糞埽服隨身十八事全體閻浮金衣罅黃金悴金棺示雙足如來意已至瓦缽金襴衣大法之所寄解行鳥二翼法眼愈精睟阿難漏未除不得入眾位一激而果成安非師所厲雞足有龍眠脈脈啟靈瑞二祖阿難尊者如相擬如來為佛之從弟寶缾貯甘露曠劫備明慧以弟而事兄佛裔飲光裔剎竿既倒卻春風起棠棣如何水潦鶴取與正法戾摧邪即告寂國主為零涕地震吼江海聞見輒悲殪金色殑伽河分身竟長逝聞聞非反聞虛空始落地三祖商那和修尊者師生應奇讖岩麓生瑤艸服餌衣雲霞清虛住蓬島顧命受恒河頓契如來道梵室據龍宮化風正浩浩鞠多小侍僧一老一不老授法即深隱隨身一缾藻鞠多鳥集樹徒眾多潦倒復現龍奮迅斷彼諸煩惱火化入三昧舍利為世寶四祖優波鞠多尊者十七證十力道震魔軍怖三尸酬瓔珞群魔罷牴牾石室籌化機奚不怕沙數香眾長者子不與羊皮伍數語代懸金即為授剃度汝父夢金日大法之園圃心法本諸法我悟契汝悟踴身虛空中竟趨涅槃路闍維用室籌雲散陰風暮五祖提多迦尊者巍峨大寶山鳴泉湧香玉山生照乘珠泉明落清旭法源與靈嶽何期出常俗於時遵導師吾師住身毒法緣將有待仙子來焦沃同師大梵天彌遮備陳告曾憶阿私仙記我受師最八千艸衣人一時敘齒錄法藏得斯人前後光明續六祖彌遮迦尊者大法係一身所關亦以大深山友麋鹿豈慮不測禍兢兢履先訓所念在良佐雉堞有祥雲不惜風塵播闤闠有人焉提樽欲前過逆問自何來邂逅為倡和我名婆須密世係頗羅墮師資俱秉記是以相克荷試觀末法流青蠅溺於唾七祖婆須密尊者我初未入道或吟或狂嘯壺中別有天誰識壺中妙無羈赤梢鯉亦上彌遮釣竟爾改前轍遵奉如來詔聲化摩羅國慧光爍微爝須知鸞鳳鳴豈是尋常調平居常在定屹然若山嶠諸天復哀請定中現微笑更作最後談從茲歸寂照八祖佛陀難提尊者頂有肉髻相復姓瞿曇氏辯才可萬敵轉折了無匱師事密多尊庶幾可無愧領徒以行化所到即豎義偶睹白光下當有大乘器伏馱年五十與世迥相異親既非我親道復何所事汝智汝心親悟此無二致繩繩甘蔗種永永為標幟九祖伏馱密多尊者昔者不能言說法遍天下避穢不他適道行已無價自誇者不行多言轉多詐斯宗貴默證三藏可以謝肘後懸靈符印度為設化嗟彼香蓋子處胎六十夏此兒非常兒與吾可並駕試與授毘尼戒珠光照夜一箭中一群從此不須射十祖脅尊者師生周一甲精進無倫匹定慧為園苑脅亦不至席龍頭屬老成何須問文質寧有躋祖階唐喪此白日茲地當有異指處變金色少頃長者子合掌於前立我住如無往我與佛相秩說斯法要時金光相矞矞如以印印空豈是從門入十一祖富那夜奢尊者生緣華氏國與佛同世譜脅師針芥投遂爾繩幹蠱尋詣波羅奈一發千鈞弩正值馬鳴師相與展旗鼓問佛惟一體佛豈有行伍木義鋸義解聞之便蹈舞乘先而啟後轉轉相跨釜記來六百年若子即若祖願海既無涯相為濟群苦十二祖馬鳴尊者尊為毘舍王復化為微類彼馬亦何知長鳴若嫵媚玅論建高幢用以摧邪魅果有魔幻興少以神力被魔悸已難支復形求懺悔懺已盡歸命得與旃林位乘戒兩俱優幸聞無上義付受居大定龍奮迅三昧定中現紅輪金鵬一展翅十三祖迦毘摩羅尊者術精異論師力能攪滄海就正三千人悉被慈悲鎧一聞心海法方知有真宰印度遇檀越太子雲自在請供於青宮佛戒不敢怠北山有禪窟竟爾登隗嵬毒蟒氣如煙殊不撓神彩蟒復作人形深悔先世罪師枉欲棲鍚龍樹最爽塏十四祖龍樹尊者山北大樹王垂蔭覆原野龍神被其化豈曰竊名者大蟒亦有靈俛首受罏冶岩曠集異類到者亦以寡身雲而法雨隨機若缾瀉聿來大導師負圖藉龍馬遂作月輪形無言譚般若月下惜花人提婆尊者也造論熄左道月上秋風灑十五祖迦那提婆尊者瓦缽貯新泉金針刺輕縠水月幸冥契瑤光映寒綠春風長者園池上花如簇芝菌生幽香比丘亦報木宿緣殊可徵捨子供簡牘隨至巴連城異教為窘蹙手持金錯旛立論數反覆邪不能干正望風盡欸服尋復放身光竟趨寂光域十六祖羅𥈑羅多尊者宿符為教主世尊有親記聞法捨塵鞅受授始染薙雖生迦毘羅應緣室羅際奇哉金水河五佛舒光麗依光溯其流果有賢者憩論空奚身心復以金井說既爾定師資亦復了夙慧擎缽至梵天香飯開明叡我師南天竺吾子娑羅帝十七祖僧伽難提尊者儲位宜青宮七歲而猒世說偈懇后王請遂多生志王命就宮居禪寂而不寐一夕乘異光竟爾飄然避巖下惟禪那身與土木類頂巢而膝蘆星霜十餘祀羅𥈑遠方來定起兩相視於斯有人焉請為如來嗣攀樹而立化就樹為塔寺十八祖伽耶舍多尊者童子之所之常有紫雲蓋手提大圓鏡晶光無內外問年言百齡不識何三昧出自鬱頭藍難提亦叵奈殿角戛鈴聲出語有兼帶傳持繼上乘青絲質方艾穎囊既披露便乃吹螺貝教被月氏國月鏡此幸會定裏騰紅光竟爾焚其蛻十九祖鳩摩羅多尊者閉門以拒客開門續祖燈紹隆應嘉運月邦一箇僧復示闍夜多善惡繇業興我昔自在天遇物起愛憎緣是謫忉利復聞最上乘惟爾常縈疾可以我為憑業識心為依心淨業不勝吾心如皎月雲散而水澄告寂自剺面分光照遠嶒二十祖闍夜多尊者幾微古聖師啟我淵弘智照業繁霜日破癰為利刺敢以獨善身怠忽行法施隨至羅閱城其中有金翅一食復不臥精勵頭陀事勤苦不明道難免狂心熾不慢不須禮不坐亦不肆是名平等心與佛無二致遍行心頓降一洗成良器二十一祖婆修盤頭尊者禮塔求良嗣雙珠出聖姥樹此精進幢末世所依怙手內有神弓辯論摧陵侮寧碎我頭目無毀我佛祖我師阿羅漢出世年十五得戒大菩薩礪行良亦苦後遇闍夜多一僂復三俯少生輕慢心學語之鸚鵡誠勗摩拏羅競競法前古二十二祖摩拏羅尊者生為國王裔出世法王子復化印度王不愧如來使吾徒鶴勒那寶印王所止欲化且遲往焚香作符璽鶴眾禮香光師亦隨香起為說龍子因再示鶴原始鶴翔而龍潛報緣固如此隨流識取性此是吾心髓鳴鶴之在陰吾子和之矣二十三祖鶴勒那尊者吾母金色光夢環喜嘉肇生而有異徵無敢忽少小閈里昧淫祀童子叱為沼鄉民呼神童神亦無敢擾國王無畏海迎師以旌旐日月二天子謝法騰縹緲上足師子尊博識何皛皛南北貫白虹請師諭先兆知難但密示憂心徒悄悄二十四祖師子尊者聖子婆舍斯來化罽賓國復有五禪眾亦隸緣將熟聰辨達摩達於心未膺服憤悱若不平迭難何漉漉耽定為勝乘安知惟樸樕於茲雖可裁祖亦未之錄童子舒拳珠豈非有昔夙外道善嫁禍師已諳先囑白乳飛長虹清風度林木二十五祖婆舍斯多尊者夢劍而師生師生屈其指九鼎懸一絲微師則已矣有劍但誅魔有珠尊道紀師難不能援弘法足可恥遂爾避深岩衣艸掬寒沚於時弘法者誰不悲隄螘尋思法有屬不如蜜多子飲毒試焚衣邪暴抑至此蒙難幾兩葉吾子須自砥二十六祖不如蜜多尊者我是國王子寧復要外護所為瓔珞子是以至印度長爪老梵志奴顏以自固白氣臨休徵反以妖氛訢慮王或遷善移山雪其怒師指反制之魔黨不勝怖王出師同車瓔珞丐於路相看敘夙因還復來相度勢至即瓔珞慈雲與甘露二十七祖般若多羅尊者韜耀居塵寰摧辱不與諍人字以閒名問姓則同姓誰知般若師所履如來行玉未出荊山難與石相兢一遇豐城宰愕然而起敬南印香至王奉珠以尊聘擎珠驗三子菩提道光映知是寧馨兒授以先宗命金河作二流兩土分真聖二十八祖菩提達磨大師東土初祖法雨自東來楞伽與貽讖長夜天將旦大夢始一震祖道普通年梁王爭一瞬飄然泛一葦面壁俟神駿首接可禪師引臂而迎刃重法而輕身果有大乘信得髓付袈裟此行不為吝受毒為傳心於此我心盡塔於熊耳山宋雲嶺頭覲二十九祖慧可大師閒闢首庶物東土一輪紅為道而致命大雪滿長空日上而雪消大地瑤光同少林春始花誰不藉和風危哉病居士傳衣繼祖翁攘攘義學流奚不愧斯宗猜忌挾豪勢所以外頭凶晦跡而韜明屠門酒肆中辨和翟仲侃竟作師子蟲三十祖僧燦大師得法且受具千載而一遇計功則白衣論修則病痼操刀作屠戶釋刀便開悟若非頓教師幾為繩趨誤來隱皖公山師年竟以暮沙彌始十四伯樂賜一顧病老與童子我不知其故法眼何精明曾不失晷度信心既銘矣秘傳略披露三十一祖道信大師克荷方幼沖寧不為警惕擇居以自安脅亦不至席珍愛六十年總以法道惜吉州興戈矛弭兵般若力黃梅梅子熟小兒獨戲劇偶與談大道一悟顯奇跡斯時應化師愍物將大奭太宗政寶御鳳詔促傳驛師三以疾辭赫赫見標格三十二祖弘忍大師破頭山上雲重重時有道者來種松青松方毓秀黃梅產異童母棄之濁港肢體花融融里人相聚歎相與古聖同受法而領眾比師還幼沖法道此一震靡不知宗風神秀七百首行者勞夜春法不先文學竟爾授盧公三更潛入碓房裏曹溪又種破山松三十三祖慧能大師新州困蓬廬采薪而奉母客偶誦金經明星正當午辭親走黃梅一似出林虎問字不識字問義卻能詁弘師大無情領執下廊廡任春始八月一旦受圖譜守綱混流俗荷法良亦苦法性開性法始獲落僧數理楫歸新州一撾退堂鼓三十四青原弘濟行思禪師曹溪分一脈得髓居首席我道既坦彝何處存階級師弟來尋思巍然一片石贈君鈯斧子西來此舟冊六世衣不傳惟道相追繹神會亦同師但解振身立猶各分門庭真金與瓦礫請食廬陵米自然見端的下世徒窺藩一津自相隔三十五南嶽石頭無際希遷禪師衡山石可居便爾寄幻跡奇哉肇法師亦解惟心式乘龜共游泳我祖道同域向云石路滑行者多匍匐誡爾參同契光陰莫虛擲先佛傳此宗初不論禪寂或問曹溪旨不會者能得問禪是碌磚問道是木杙石路雲門裏萬古所憑軾三十六澧州藥山弘道惟儼禪師始石頭終石頭馬祖山前好放牛向說三乘十二分如今繩斷一時休三條篾住山去某甲何人如此住雲巖道吾高沙彌枯榮兩是兩不是聲鐘集眾將法說經師論師兩俱歇洞庭雨驟水滔天此僧可惜不能瞥化主納疏岳陽回兩鋌白金是贓物嫌他逐句弄泥團看經遮眼眼何別長嘯一聲天下秋千山萬山一輪月三十七潭州雲巖無住曇晟禪師百丈二十年雖僧尚俗氣只是一味禪如何不能契且喜沒交涉三句外六句拄杖趁眾散海兄亦精細廣南一片石方知移不去翻身弄師子或弄或時置大悲千手眼取枕夜展臂掃地非區區豎帚第幾義要見第一月看取涅槃際十六月上時雲散山光霽三十八瑞州洞山悟本良价禪師三十走諸方和璞待敏手臨溪一睹影一笑無何有始解邈師真誰為辨妍醜泐潭初座元難為師子吼新豐抽寶劍通古歸樞鈕諸方尊洞宗嘉猷傳不朽寶鏡受親印五位為組綬既爾愍穿鑿更剪邪見藪山穨梁木摧徒然望霄斗三十九洪州雲居弘覺道膺禪師幽州王氏園產得藍田玉丱歲便離塵不習小乘牘初參企洞山應對轉轆轆思大不作佛住山占一國累日不下堂天人供香餗推挽住雲居四眾雲簇簇最爾衣線下不悟可悲哭衣錦琉璃殿上行也須擊碎珍綈瑑鍾王尊禮世世師那知世世尊吾屬四十洪州鳳山同安丕禪師鳳山山上鳥無巢無縫塔裏天涯路日出鳴金雞月明昇玉兔青猿偷果客投空鳥銜花去遊人誤木童善鄉語石女易生怒不若孤峰挂薜蘿試看白雲逐飛鷺短販樵人徒自誇劍甲未施賊身露這是同安一隻箭佛來也不敢當面箭過問如何月落後相見四十一洪州同安志禪師驢馬不同鞍這驢差可轡踏斷昇仙橋張果老不會大雪滿長安我卻有三昧多子塔前風凜凜五老山頭蹄對對捲起夜明簾簪纓搖玉珮萬里和歌謠塵面得一沬覓渠遍處不逢渠款段走入師子隊目前不現句不迷嫦娥嫁取月中妹四十二鼎州梁山緣觀禪師和尚家風益陽春水白鹿松高鳥棲花橤水急魚行澀松高白雲徒賊據無生國久之謀不軌飛龍居九五風雲周帝里炯炯正法眼燁燁南華裏祖印豈從蔥嶺來達磨不過老鬍子紅罏焰上絛絲縷靉靆雲中勞屈指後人邈我真看取紅罏裏四十三郢州大陽警玄禪師一語上豐碑頻伽方出殼名無翼而飛道無蹤而嶽履劍刃輕冰景行惟卓犖語路確難陳淨名居帷幄師子一嚬呻五位麟三角大海飛紅塵須彌波濯濯長年不越閫日中惟一食耄耋無惰容危坐崒骨律法寄遠禪師不欲授無實連理棲青鸞皮履偈親筆四十四舒州投子義青禪師展翅南圖入華嚴海夢兆高宗曇華蓓蕾浮山分玉玨師善連環解秘府出直裰大陽顏不改曹溪鉤洞簾金鳳飛絢彩高臥圓通席逢場戲傀儡威音王一箭直透千層鎧借得秦淮月郢陽光靉靉彌勒樓中百億日奪耀輝騰及千載四十五東京天寧芙蓉道楷禪師庭訓遵父規我是列祖命再之受師模我是千佛印髑髏乾教徹革囊不足信表謝紫方袍孤風亦清勁違旨下庭尉敢妄辭以病受刑戍遠州衲子復奔兢一啜與一匙拳拳法先聖肅肅而凜凜一堂風月淨猶謂慚古人念之淚珠迸四十六鄧州丹霞德淳禪師擘開宇宙打破形山運日月以西行攝江海而歸一微塵間千山雪似鷺鷥衣一輪月上白蘆灣我宗有語句金刀剪不開我宗有玄妙玉女夜懷胎我與德山別還共德山來梅花樹下梅花影輕盈香色繞莓苔十成事請颺卻擲地金聲總戲謔四十七真州長蘆悟空清了禪師襁褓何所知見佛動眉睫靈鷲一枝花禪源一滴血才上缽盂峰解卻丁香結四海一閒人所以號真歇通身已紅爛從此口門拙借火焰而轉法輪共江山而齊說妙在一漚前竟越三祗劫幻化身過橋村酒美虛空身隔岸梅花雪窮玄微而失宗體靈妙而道絕良久曰紅葉嶺頭風青松潭底月四十八明州天童宗玨禪師峨峨太白峰玲瓏巖上月一過小白嶺知君已落節況復入我門眼裏著金屑承君問我道十字街頭有豪傑進曰如何法隔籬野菜飛蝴蝶虛靜斂氛白雲被寒嵒而齧靈光破暗明月隨夜船而折斫額望前山前山煙似雪四十九雪竇足菴智鑑禪師圖畫自天開山僧獨怡悅瀑布落千尋仙音廣長舌象骨山深百怪興老僧不采徒輕褻夜來獨自上崚嶒海濤一捲驚三淛果是明星也誘人誰道世尊證寂滅憶我孩提時曾解吞熱銕世尊有密語迦葉不覆藏一夜落花雨滿城流水香山高不宜久立且歸方丈房五十天童長翁如淨禪師松蘿亮格笑枯枝落地解𨁝跳奉黃麻住雲隩短販開箱走國賓滯貨彌天略粗糙飯飽便弄箸滿床盡屎尿天童銕臭老拳頭打殺參徒稱有道靈雲見花開天童見花落花開一杯茗花落初登廣嚴閣春風勾引鷓鴣啼蘿葡芋艿糝香藿文殊智普賢行隋珠秦鏡陶淵明陸修靜酒政茶政五十一襄州鹿門覺禪師接人弄笻竹汲水用長瓢路遠艸鞋穿雲重袈裟潮蜘蛛吸盡滄海水蜻蜓翼負泰山高蜘蛛腸飽蜻蜓重天網恢恢兩相弄卻被狂風兩拆開盧生一覺黃粱夢始知大地一卷經孃生大地兩眼睛經長眼捷日方午經了睡來枕其股玉盤金井秋寥寥後山跳出斑斕虎五十二青州普照一辨禪師主化當青徐衲子走秦晉嗟彼乾慧徒垂茲二百問關吏一何嚴假雞且莫近聲前薦得落今時不落今時是何韻中邊有著不須安何處與君接雅訓裂破虛空絕擬議請君為我通底蘊衲子既望崖縮肭無敢酬且藏三尺匣中劍荒徑客來芳艸幽五十三磁州大名寶禪師深宮月鎖主高眠一片虛明照碧天手握驪龍珠從今不說禪攜手相將賀太年熙熙風物暮春前金針穿玉線寒罏繼斷煙線斷失金針鴛鴦譜未圓木童俛首覓石女痛加鞭須彌峰下七金山杼盡湘江及九淵呀鼻尖頭上觜唇邊五十四太原王山體禪師巾缾十載大名寶牧牛不犯官家艸牛馴騎到家衣上惹山花花香蜂蝶隨山巔日已斜衣中有寶不他求一旦飄然十二州侍者會禪否豈似春風輥絮毬如其終不會堤邊芳艸綠茵柔於此兩堪疑吾師親送渡扁舟果至王山建梵剎瓣香法乳為師酬師子有三種細看還是牧來牛五十五磁州雪巖蒲禪師尋師撞著生冤家千里茲行苦路賒師握手不勝嗟少露大蟲一爪牙凡有誨必跪受多見操戈類禽獸吾道無諍古聖銘余今肯落他人後王山山頭有法王領得王山大明咒諸兄弟莫艸艸打疊靈苗異時秀秋初夏末東西行蔓也難圖且易茂及盡今時絕覆藏會見龍驤而虎驟五十六燕京萬松行秀禪師道者曾栽萬樹松如今僧老松如龍轉卻山河為自己松化龍兮龍化松獨有玄沙不肯在玄沙水際一枯樁騎驢不下亦何妨猴子偏能入道場禁庭親賜紫伽黎此會人王與法王大功無所宰至化卻無方機輪轉處智猶迷寶鏡開時月滿廊向上一路鶴翀霄當陽一著鷂兒翔五十七少室雪庭福裕禪師太原張氏小兒聖五齡頭角便清勁佛乎豈在一卷經知其不可與之競仙巖古佛識龍象一見肅然為起敬後造萬松炙清芬十年為掃松花徑宿碩倚為甘露門松茂少林允冊命受知世祖在潛邸憲宗嘉號師辨正誘掖後學無倦容遊戲翰墨行祖令有問西來祖師意五乳峰巒點頭竟五十八西京靈隱文泰禪師祖讖吾宗藉嫩桂昌昌條茂今猶在不是斯源繫祖庭振起江南何所賴雪庭消雪產奇英濟濟當時稱二泰中興晉祀皆天功誰道文公難克配嵩山山高洛水長文師撾鼓陞高堂塵劫前事河沙德嵩山雲繞山花香殷勤為君拈出看於茲不會誠荒唐花落悲黃鳥堤柳鳴蜩螿五十九寶應還源福遇禪師落䰂首師兜率院遍歷藝園肆弘辯義虎雖獰猶畫虎天花曾雨神光祖寧使口邊生白醭丈夫可是耽糟粕一遇文翁罷坐馳桃花開上梅花枝悔悔當年從外覓迢迢與我遙相隔風送泉聲來枕畔月移花影紗亂六十鄧州香嚴淳拙文才禪師問法身云枯椿幻化身虛空骨枯椿析細為鄰虛又向虛空長眉目法身果若是枯樁腐艸流螢不應育法身幻化誠如然紅爛真常鴟犬福我以此解呈還源源老當膺只一擉自此尋隱香巖山不欲庭除伐筠綠留取清風伴明月差勝三冬倚枯木六十一南陽萬安松庭子嚴禪師緱氏山頭吹鳳簫霓裳羽衣風蕭蕭樊家有兒幼敏捷耳聆筆繪歌虞韶一曲唱出斷腸韻寶鏡堂前有新證自爾傳衣五老峰耀後光前提法印驅牛耕種祖翁田活潑生涯百丈令荒田脫粟款諸方金牛作舞因齋慶宸帷頒賜紫田衣誰道老農無善政六十二嵩山凝然了改禪師鼻祖初來嵩山麓泰室少室松風謖寥寥不但鳥難棲祖翁所食皆鴆毒神光雪裏和陽春春回二室花如簇自爾花香大地春一隆一殺幾顛覆且幸梁山入少林繩繩嘉裔存西竺離微僅得凝然師一言迥脫續昭穆言中取則句外明徹古徹今方郁郁六十三嵩山俱空契斌禪師樅然溢目無與結又道色前而不物空色相持兩不降是與白馬較白雪即物而推肇論師南泉指花警夢說俱空政為兩不空一睹秦槐愕然瞥凝然一見不待辭從上機關都漏泄向來紙上覓禪心那知離指方見月打破虛空月更明松風響芭蕉葉六十四西京定國寺無方可從禪師始入龍潭問蟄龍未獲龍珠竟他徙底事不明安肯休勞勞杖笠參煙水五乳峰前有一燈吞刀刮腸去瑕玼一造庭帷已茫然再叩籌室覺自鄙退歸客次細追尋天衣取像差可矣一位才分五位彰此時一似離弦矢百丈狐窩獅子巖九峰首座徒然死六十五嵩山月舟文載禪師提刀肘佩將軍印拍馬膺鋒西渡河驀然釋鎧投弓矢喬松得以依青蘿坐參古宿竹下執柯取則而伐柯幅然一衲走關外就正禪翁鳴玉珂盤旋回互繼宗猷織錦天孫暗裏梭五宗九鼎繫單絲宇宙於今安奈何三十六峰煙浪闊投老歸菴花滿坡六十六燕京宗鏡小山宗書禪師業儒循聖紀所謂盡倫理聖脈有道衍豈書史而已登山而覓符符在空門裏欲了此平生一勇代可取若一法不明君子之所恥釜破不須顧棄家如棄屣白業貴履踐八載無敢弛受請領大剎不失吾師委日居而月諸勤劬尊簠簋假我而偷安法道何所倚六十七西京幻休常潤禪師孤鶴之在群自與群禽異一飛而驚人遙空一清唳水上按毬子夙興不成寐忽爾身心空頑空非正慧偶閱迦葉圓通章方識阿難有真契初心必不欲碎鏡及乎鏡破了無倚呈偈伸所得乾坤納蚊蚋彩鳳一騰霄銕牛沒繩繫表表人天師芳名一何麗六十八燕京大覺慈舟方念禪師何幸普通年法雨澍南粵神廟辛卯秋慈雲覆於越始祖破天荒吾祖中興傑於茲一甲周海內繩瓜瓞長夜而再旦洪波砥嵲玉殿真珠簾綱宗起閥閱寶鏡白澤圖亭毒在明哲閱人亦廣矣法眼何精晰危哉無鏃箭未發先濺血六十九越州雲門顯聖散木圓澄禪師呼吸毘嵐風手握追魂藥石路雲門寬卻無處著腳和藹惟姁嫗近之則焦灼森森萬竹林峨峨一峰削耶溪逆洞流櫟樹居廣莫日上海東潮三浙為禹鑿法脈所注地宇宙盡磅礡獅絃振天音狐獸歸陰壑曜靈既西垂萬山盡寥廓
