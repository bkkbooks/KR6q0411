front:
  text: 顯聖三宜禪師語錄序世尊有密語迦葉不覆藏夫一華拈出覿體全彰果世尊有密語乎然而百萬人天咸皆罔措者何也昔者趙簡子因姑布子卿以翟妃子毋恤為賢欲試之乃告諸子曰吾藏寶符於常山上先得者賞諸子馳之常山上求無所得毋恤還曰已得符矣簡子曰奏之毋恤曰從常山上臨代代可取也簡子於是知毋恤果賢則世尊拈華之旨盍可心知而百萬人天且碌碌如諸子直以常山有符在焉耳故四十九年從佛口生皆如諸子而末後始以正法眼藏付囑摩訶迦葉者所謂廢太子伯魯而以毋恤為太子者也西天無論已東國自有宗門以來師師授手皆命世亞聖大人雖機用羅張於李唐語言絢爛乎皇宋一如青天霹靂旱地雷鳴南山起雲北山下雨苟非毋恤之雄略罕窺其意旨之所在者沿襲至於元明之季尊其師說而已無復神而明之之道遂使從上真規死於繩墨千秋堂搆墜之非人彼步趨尤難況奔逸絕塵得遊戲如風大自在三昧者耶三宜禪師天岸祥麟雲中逸翮茂齡悟道石筍抽洞上之條早歲分鐙空華結雲門之果尤復涉南北於數千里外困風霜於二十年間始歸而遯跡化鹿山之陽會爾密澓公遷化顯聖席虛四眾輓之出世於是果熟之香風飄偏界盈科之水決而滔天遂有陞堂示眾等語皆脫略窠臼鏟去塵封直欲與五祖共唱巴歌瞎堂同呼哨指乃過踐偃師之跡不許流傳一字侍者隨聞記集僅若干篇余過吼山始得讀於尼淨琦家不覺掩卷拊几長太息曰此龍光射斗者也曷為薶藏於此因持入天台為之參詳校訂復捐貲壽梓公諸同好於乎師絃絕響野干亂鳴彼黃頭乳口尚往往以禪語衒保社況牙似劍口如盆反深自弢藏有如師者往余與師同參黃檗繼今乙亥盍廿有餘禪始獲對譚五雲山下然皆法門細大無他及逮過顯聖觀所為布置叢林締修堂舍亦可謂二嚴無憾者矣當丙戌之秋因事徑拂衣去不顧則視蚖蛇戀堀掩先業為己有者何如而增上慢之徒且以風流瀟散短之龍象蹴蹋抑豈跛驢所堪哉歲在著雍困敦月維林鍾同參弟廣潤道忞謹題三宜禪師語錄目次第一卷住雲門顯聖禪寺語錄第二卷住雲門顯聖禪寺語錄第三卷住姑蘇古朱明寺語錄第四卷小參晚參第五卷普說第六卷普說問答機緣第七卷拈古第八卷頌古第九卷佛祖歷傳像贊第十卷佛祖像贊自贊第十一卷佛事塔銘附
