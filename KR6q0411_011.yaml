目儼然不直雲門一顧電光影裏現全身只合還歸炭裏坐性林靜主起龕信有桃源路無人得再遊偶來逢漁父援引上秦樓古人道有佛處不得住無佛處急走過除卻兩重機鼻孔下頭大然雖未有常行而不住未有常住而不行即使到五百由旬已進寶所須知向上還有事在性林師隨我來卓拄杖云春花已放嶺頭看取幽香一塢舉火識得目前廓徹無礙掀翻大地不遺粒土智周三世而無來往生死涅槃空花水月煩惱菩提乾城陽燄腰纏上市來百事成現一點光明亙古今開眼也見閉眼也見博地凡夫彈指頓超衲僧家橫抽寶劍阿羅漢結習未除十地菩薩見性尚隔一線性公你知不知薦不薦我者裏有箇巧方便以火炬打相云萬姓笙歌徹夜明火樹銀花廣寒殿通共三百三十頁總共板壹伯陸拾八塊該板價銀拾兩貳錢計字十二萬二千餘連寫刻銀共該捌拾伍兩二錢膳銀貳拾伍兩通共銀壹伯貳拾兩二錢零尼淨名助銀拾兩助綿紬四疋商文凈濬助銀壹兩雲門顯聖愚菴盂禪師塔銘敕賜太白山天童弘法禪寺弘覺禪師道忞譔飛行皇帝身膺七寶王有四天苟無聖后所生太子則寶馬金輪次第隱沒七日之內王祚隨終況復正法眼藏賴以傳持者乎粵自靈山囑累飲光以來相與繼繼承承者非大德天生即應真降跡所以僧伽本樹王再世般若亦勢至重來他若靈彰秀艸瑞應金環圓鑑呈祥明珠協吉殆有不可殫紀焉者故得大法東流千燈照耀於乎羽嘉與鳳凰日遠彼翾飛維鳥者且為鵬為梟式貪式戾當世稱為天外鴻雲中鶴如我愚菴禪師復不憖遺一老俾守我圉予奈何不夷考其生平表章其行事以龜鑑一世哉請得而論次之按師錢唐丁氏子諱明盂字三宜晚築室西湖自以為愚復號愚菴本四明望族五世祖遷杭為武林人幼聞梵唄則心悅睹象設即膜拜往往於夜寐中起坐念佛過公府疑為寺宇亦胡跪作禮年十四矢志離塵入雲棲從蓮大師受五戒直中元建會為命今名歸而念佛益切時覺心想不停詢一高道居士士亢聲曰即今念佛者是誰邪師為芒負坐臥不安疑情頓發年十六閱真淨語有省矢口成偈曰紅日當空抬頭便見掇落大門便好開店身心自此寧怗恒加趺累日不起後因禪侶激勸教看高峰主人公話歷三載觸發龐居士語忽成偈曰鐵牛解吼木人善走心境如如打箇筋斗時武林禪講之師剎竿相望師靡不叩關請益深臻其奧獨於真寂聞大師尤服膺焉年二十投真寂脫白為童行職槽廠日勞眾務常蓬頭垢面為諸同學援經引論剖析疑義有詰以離心意識參話師答曰離心意識作麼參空缽無聊直到菴沿路拾來皂角子可當蓬閬大還丹聞者咋舌師亦點胸自喜但於托缽產難諸大禪頭擺撲不破未能釋然二十三歲薙髮墮僧數益遠大自期禪悅法喜日注身心尤復旁及百氏家言一時法社尊宿如憨山雪嶠南明輩與師語未嘗不擊節稱善聞大師直以為佩觿長傲屢挫抑之一夕遶佛經行暗觸香桌豁如雲披月現自況鰲山今日成道趨聞就質聞反覆徵驗不容申說然師至此機辯縱橫不可遏矣有僧以高峰四句問師未審那一句能縱能奪能殺能活師曰是第五句曰如何是第五句師曰小鬼捱磨金剛解鋸既而聞顯聖宗風大四海雲從忽動再參之想會聞亦遠出金陵乃截江過雲門參湛然澄和尚於顯聖蓋師未披緇時澄遊省會曾一參禮蒙誨諄切內銘於心至是益發堅勇之志且曰大慧以再夏為期今我以再七為期禪若不異我亦作無禪論去也於時坐立經行方著意提撕忽澄入堂高聲曰放下著不覺掀眉一笑簡點從前礙膺直如大慧撒手天寧時種種差別淆訛迎刃而解遂披衣入室求證澄問懷州牛喫禾為甚益州馬腹脹師曰問取露柱去祗如樹倒藤枯畢竟句歸何處師曰長江翻白浪如何是一口道不盡句師曰小月落孤峰復命作偈師口占曰石傘峰前玉一溪逢源那說動舟迷落花無限春山暮得路還家聽鳥啼澄曰好聻師曰且莫塗污人好復索狗子無佛性頌師曰佛性如何道有無秤鎚落井卻能浮曾經捉敗趙州後拍手終朝唱鷓鴣澄遂以洞上法印屬累師焉時飽參宿學鱗集座下師年方二十有五未久之間遽蒙印可一眾崖柴度不可留乃辭雲門別真寂由吳入楚一衲孤笻探竿獨挈凡循山傍澗一人半人之所罔不披榛叩激闡發大猷一日道旁見草舍有僧近百歲師入索茶僧目視茶鐺師指棚上瓜曰可喫得麼僧曰留種師曰此種何來僧西指曰那畔師曰那畔即不無爭奈種雜何僧曰請佳種看師拱手謝茶僧曰效顰魔子回身入內不復見抵黃麻參無念有禪師有見師來詬罵不已師遽問南泉斬貓意旨如何有憑陵曰我殺不得汝邪師曰殺即任殺南泉意旨畢竟如何有曰待趙州來與汝道師拂袖便出從此嵩山禮祖燕市求人晨餐暮宿則野廟孤村肝膽形骸則冰霜土木見者莫能測也及乎洪音一唱雲蒸霞蔚又莫不海沸波騰時師痁病連年衣惟骨見自號白骨道人遠近趨參即傳為白骨會云居燕凡五年聞顯聖歸真天童旺化即日賦詩南邁有雲辭雙鳳闕麥秀五陵秋之句豈甲申之兆師固前知者邪既歸哭臨顯聖圓聚天童返省真寂復掩關于語溪之攝心菴猶以愚癡沒生死廣化在多聞故雖祁寒冱凍溽暑流金而師嗜學之志如海吞流無厭怠時也未幾應屺瞻葛太常之請出住龍門龍門嶺紆市遠寺無恒產仰給山君師芒鞋短褐日負薪而鬻於諸學子不廢提持居一載因事去為季超祁仲子迎還會稽奉師化鹿山中師久懷深隱樂與勞侶驅犢飯牛來者既不辨師適有問者師則策牛飲澗多惝怳而返久之顯聖席虛輿論歸師一時賢士大夫與當山耆宿同申勸請師亦以先師公案未了故不峻拒直裝包赴焉視篆之後整飾規繩肅張法令陞堂入室無虛日學者至不能容乃外集檀施內竭衣貲凡堂廡寮舍前人所未備者畢舉時戎馬生郊四野寒色獨師得悉心締搆增其式廓非天龍擁衛道德之靈曷以致之住五年因僧犯諍止之不可乃拽杖入化山不復出禪流失怗法社中衰山陰道上若邪溪頭鞠為漁汀樵徑越都人士殆不能一日忘師也往來敦請迄無虛歲者三年不得已再還顯聖以三載為瓜期三載後于諸法姪中舉唯岑嶾公代主其席師則撾鼓退即還西湖舊隱所謂愚菴者是也初師建此菴為修孤山舍利塔後度母為尼以此菴近市便甘旨故師終身奉母長居此菴至若住越州蜀阜秀州梵受蘇州朱明或應彌陀應宗會應福臻或過天華過佛日過真寂因而或講華嚴法華楞嚴楞伽金剛圓覺梵網惟識在處布慈雲隨緣施法雨不吝情於去來亦無心於彼此殆如鴈過長空霞生碧落而已所有襯施或贖生命或惠孤貧或濟人之有急難者餘則悉以養母故得甘毳不絕於饔餐利養不分乎清眾所以不別搆周母之堂不更織陳蒲之屨或晴嵐撥棹或雪港攜舟放意湖山市城絕跡良有以也至年六十有三母始順世師哭踊悲號日夕孺子慕睛為之枯焉自此不訓徒不赴請閉門斂跡又四年而師亦遷化矣蓋康熙乙巳孟冬之十一日也寢食談笑如常時忽語侍僧曰三日後吾行矣集諸弟子規訓法門細大不可濫名苟位取玷先宗言皆切至諸弟子為流涕請偈師瞋目曰癡眾生不說偈便死不得邪如期眾集相與語曰師今尊候如宜安得撒手便行師曰看老僧登場一笑泊然遂逝世壽六十七僧臘四十六遺言水葬莫慰群心屬門人範為則主顯聖乃即前岡建塔歸窆全身焉師生知夙稟妙慧天成宗通則橫穿四七二三說通則綜括千經萬論奯公偃老言前契旨悟後周參忠國大珠禪備眾體法匯多門東山演大慧杲口似懸河機如劈箭拈來即是流出無垠師殆兼而有之若夫乾坤寄傲山水怡情風流倜儻豪放不羈則端師子政黃牛之英匹也住則隨緣去則無矣恥作呈身之客羞為戀窟之蚖則高菴悟山堂震或菴體之俊流也緬懷高尚靖退是居厭薄十字街頭架大屋養閒漢至於梵受朱明由師顧鑑蔚為寶坊一皆撥置不問其草芥名場霜雹利養為若此也有恩必報無怨不忘不以好惡偏心不以親疏異視至於我宗我塹我法我圉焚我郊葆穴我藩垣則不難背城借一鞭橐是從其臨危不慴見義勇為又若此也師少時恒夢遊葛嶺往來甚頻當世學者多稱師為孤山後身質之曹溪八十生為善知識益知師為再來人信不誣矣嗣法弟子自淨範以下三十人傳講弟子二十人傳法居士三人剃度親依得戒與士大夫之問道獲益者不可悉數焉師沒之明年弟子範為則挺俍亭各以師狀謁銘乃取二公之狀與予生平所見知於師者論次為銘曰佛正法眼千聖攸宗西東分布世擅人龍道行有待至德乃凝昌期五百運會師興生知特異邁往獨前鼇山此日大慧當年汲造幽深探窮經論宗通說通嵒瀑飛潠貫花新偈日演千行牙橫劍樹舌奮蘇張妙語霞繅神機電疾捷狖魂亡天孫巧失進非坎滿決若江河風行吳越草偃支那千里裹糧百舍重趼從者如雲師心無選落魄乾坤聊以寄傲凡百有為風煙一掃顯聖拮据朱明締搆屢典名坊云胡不逗愛道佛歸章母師養德報劬勞道寧有上呼山邀月築室湖濱六十孺慕大孝終身敦崇罔極培植彝倫誰敢予侮動厥譏脣高并秦山清同鑑水百世師仰曷其有已罏峰巀嵲天柱嵯峨銘詩我作終古載歌
