body:
  text: 住雲門顯聖寺門人淨範編山陰嗣法弟子祁淨超較訂佛事宗會菴縣鐘板鴻雁知秋商羊識雨畫隨灰而月暈缺簫吹寒谷而華開一塢黃初平叱石成羊李將軍箭穿石虎謾道感應靈通其然法如是故舉椎云若向這裏會得自然翕闢古今縱橫佛祖其閉也乾坤失色其開也萬象起舞且道不開不閉時又作麼生擊鐘板一下云還有箇末後句子度椎與座元云若到諸方不得莽鹵蜀山集善寺縣鐘板前佛後佛其道一揆千聖萬聖其理一貫多少人向此中挨身不入插足不下舉椎云幸流傳得這一句子提綱挈領模範後昆師子哮吼象王回覷今日晴昨日雨孤村紅樹寺門清滸擊鐘板云我見鐙明佛本光瑞如此嘉禾萬壽院縣鐘板舉椎云大眾此是列聖之頂𩕳先宗之弘範匿跡豪端光被九有以其履操明白所以出處洞然闢幽墟而為叢社起頑懦而為玅靈異目超宗原在聲前耀古騰今還居句外其順行也人天瞻仰古佛齊肩其逆行也群魔拱手外道喪膽困魚止濼可惜許一向逐響尋音鈍鳥棲蘆悲乎哉往往沈空滯寂良久復舉椎云大眾所作皆辦具諸佛法遂擊鐘板一下朱明寺縣鐘板玅湛圓明裁為規矩換斗移星拈頭作尾黃鍾與大呂聲價滿寰宇憍陳那綱紀叢林觀世音圓通會裏挾帶挾路敲唱雙舉晴空霹靂乾坤一軌乃擊天華菴大悲像開光遠山橫八字纖眉野水湛百千寶目既以虛空為體復將法界為身道有也文殊喪其智體道無也普賢失其行門正恁麼時如何說箇應物見形底道理舉筆云如來眼有大人相名自在普照雲以種種玅寶而為莊嚴摩尼寶光清淨瑩徹普見一切皆無障礙既然如此還著得一纖豪麼你纔動念卻不是了也所以道金屑雖貴落眼成翳蓋不知有向土一竅在如群盲摸象異端競起大眾如何是向上一竅以筆點睛云珊瑚枝上日杲杲觀音勢至二大士開光三十二相紫摩金色身總之是脩來面孔有一人不習佛行徑不歷賢聖階梯眼同世界闊身等虛空齊一毛孔裏藏卻百億須彌澤利九法界眾生雲行而雨施卻與大眾眉毛撕結眼眼相覷獨來獨往處處逢渠秖為太近所以逢渠而失渠山僧權作丹青手寫出龐兒耀古今遂點睛古報恩寺掛鐘板天目為群山之祖龍蟠鳳翥結脈開陽落在這裏東海乃百谷之王天旋地轉洪波浩渺直抵錢唐今古人才到萬松關便道已見山海大略總不知其源委所以昧卻本來人了不識有函蓋乾坤的句子也只是無人點破若知其源識其委便可以權衡佛祖號令人天聲色堆裏坐臥魔佛界中出沒山僧今日為你點破去也乃擊鐘板一下普明寺大佛開光大眾世尊今日重整靈山故事拈起一枝花解笑者豈止頭陀直得春回大地遍界生香現前緇素人等即凡成聖隨處解脫自一枝以至於百千萬枝今一時至於百千萬世燈聯焰續繼往開來派列洞源尊而無比貴不可言兒孫遍地法化無窮舉筆云山僧今日信手拈來要與和璧爭輝隋珠並價奪山川之秀麗朗日月之光華且道山僧手中拈底與世尊手中底是同是別以筆畫相云今宵月上珊瑚樹海岳同時放寶光埽光湛老和尚塔玉鷺雲邊沒烏雞火裏飛物類既繁植蒙莊不可齊山僧二十年前被我老人煮陽燄止渴炙畫餅充饑轉南為北移東作西既不能倒斷於當初直得在潔白地上屙屎攃尿去也以拄杖劃地云春夏秋冬爾密和尚起龕囊缽走諸方天下尋知己蹋斷艸鞋跟以手畫相云原來在這裏恭惟寶龕中爾密法兄大和尚氣吞佛祖天然有不肅之威嚴仁育四來法爾具無緣之慈愛泥牛銜月覆盆下無不照之方木馬嘶春不萌枝有新開之萼珠穿帝網正偏互互鏡對菱華賓主重重臨機應敵任器施權遶指柔擬之即喪神臂弓誰敢當鋒今也虛空粉碎大地銀裝化山弟是箇無情漢子若是把住關津不通水渫有腳銕牛行不動插翅大蟲飛不回在我法兄固當別論大眾且道放開一線作麼生道磨盤空裏走銕鋸舞三台入塔不挂本來衣姓字無人識手提華藥籃東山水上立五帝三王是甚麼天上天下無彌勒珊瑚林裏水晶宮琉璃殿上黃金色斑毛師子白如霜藏身之處沒蹤跡松窗獨坐兩和諧夜半吹燈讀周易鐵新樣子南陽來大明國裏藏不得一自春回物阜時艸木瓦礫通消息大眾既是大明國裏藏不得此後向甚麼處相見卓拄杖云雪深埋卻鷺鷥烏龜飛上兜率恒蔭榆監收火才參蘿蔔禪便作生薑漢三十年來惜嘗住如保護眼珠調大眾若司空見慣毀不加撓善不須贊饒君百煉精金也著紅爐再煆萬山火燒赤虛空流白汗清淨法身無處避淮陰侯棄楚而歸漢大眾秖如亡僧遷化後向甚麼處去顧左右乃擿火炬云老僧只管看入塔卓拄杖云識得拄杖子立地超生死三山海島六鼇擎一毛頭上金師子長生方子涅槃禪廓落無遮離彼此看他榆上座急水灘頭打毬子解放不解收至今無安處指塔戶云不若這裏萬物一指瑞彰禪人入塔指塔戶云這一竅是千佛之堂奧諸祖之歸源東西十萬南北八千雲漠漠雨漣漣鳶飛戾天魚躍於淵舉骨云瑞彰瑞彰你今日落在化山手裏縱使是火裏煉過底精金荊山新剖底美玉也須更進一步始得大眾且道從那裏入擿骨云一從遊冶江山遍始信壺中別有天埽弁山瑞和尚塔霅水汪洋弁峰突兀水自耶谿發源山從爐峰起麓蜿蜒起伏三百餘里卓拄杖一下云誰知結脈開陽落在這裏若是靈利衲子這裏那裏總不著問人其奈這老漢一似山僧鼻孔雖知決在面上卻二十餘年摸索渠不著何以見得這老漢斬荊棘而成叢林植豪末而為梁棟啟三會於龍華振五宗於崆峒撫英育俊惜麟哀鳳慨法道於陵夷念下流之可慟瞎宗師杜長老心懷嫉忌百端吹索在這老漢分中殊不足為輕重可謂遍地雲門一時曹洞為甚麼卻又留下箇未了底公案以拄杖畫圜相進前立云大眾珍重六如和尚起龕識得一萬事畢若耶谿上打毬子秦望山頭獨足立萬古徽猷祇這是展開坐具乾坤窄恭惟雲門堂上法兄六如和尚踞涅槃城生法王家以六度為叢林以智光為家室引三昧水灌智慧苗植菩提樹長功德花雖然如是在這老漢則得若是初心後學向這裏一坐坐住則何以竿頭進步懸崖攃手大眾山僧為你轉卻去也向前舉龕云金爐香冷玉殿苔生封塔荊山韞無瑕之璧白髮歸來人未老紅爐有百鍊精金浪子惜華春起早手執夜明符全身入荒艸石女夜登機密室無人埽所貴野老謳歌不喜亂紅啼鳥一喝堂中風悄然五雲山下音書杳糞掃裏明珠灰堆中至寶坐斷報化舌頭蹋破毘盧頂腦這老漢一生來瀾翻藏教火急宗乘如象王任重若師子遊行今日若是緘默不言則何見得提綱挈領振末扶顛山僧不妨為渠道破去也若耶谿上浪滔天秦望山頭日皎皎孤山法慧圓法師遷塔戊子年十一月十二日啟塔得一瓦缶中有銕塔一座高七寸餘小瓦罐一中貯尊者頂骨舍利一齒八骨舍利四枚恭惟法慧法師真中性具惟善惟惡玅協圓六不縱不橫整足三千該事理以無遺天成六即貫生佛而一致惜吾完器濟衍門之三術歎彼破瓶導觀法之十乘境觀雙融金神七煞無敢誰何智悲兼利天龍八部為之呵護闢通衢於九達臨法化於三根言何足貴契證法身常住道烏可憑仰瞻舍利重光開門人閉門人因緣不偶古塔主今塔主均顯鴻慈湖山舊日音容霜月今時儀範三角麒麟何處覓獨有梅華傲晚香野航禪德火三十九年江國春風一度千七百則葛藤掀翻幾多滯貨隨身寶劍誰敢當鋒出匣菱華等閒撲破皮袋一靈一靈皮袋且道一箇兩箇葉落歸根破灶已墮肘後縣符豈肯挨門傍戶自從舞折柳腰枝至今不入桃源路能仁寺無量敬耆舊起龕萬里不挂寸雲虛空七片八片切莫問是凡是聖亦不坐佛見法見龍女須臾成佛善財百城參遍攝海會而為一塵通古今而為一貫不壞法界性而行法界事百千方便是以僧俗男女聖凡魔佛不隔一線而況被如來衣行如來行慈非一種行非一願起荊棘而為叢林拈莖艸而作瓊樓玉殿即此是渠生平梗概又何須問薦與不薦山僧今日把住要津要討箇本道公驗良久云大眾此是他親口出親言何其成見汝若不會到塔上來且看他神通顯見掩塔夫非常之人有非常之用具超師之作方解報師之恩若以功行而窺量兄祇見一斑不以功行而目量兄則何以起迪後昆惟吾兄雙徑發源雲門結脈銕羅漢戒珠圜淨石如來普照難窮彌陀佛福基兩造阿育王舍利維新起數百年已廢之能仁開百萬億難行之保社雖垂老而益堅乃扶病而締搆今則秦山慘澹鏡水煙愁雖路人而為之感動是同儕豈不興嗟豈知寂光真應無縫塔卻教有縫真人得位有量身竟成無量大眾向後去且道何處相見藏閣鐘樓山門佛殿報國院養源耆舊入塔以義為身以道為宅言出無聲色前不物見居士相可稱一席之師作比丘僧不入他家途轍法緣知契迥出常情龐家父子門風自別但得頭正尾正一任橫說豎說如今老唱還鄉曲看取桃紅李白玄旨監收入塔露溼層苔華飛柳陌祖師心印幾多漏泄既是玄旨安用言說一大藏教藏山於澤不若藏天下於天下指骨云這些骨董楊柳岸頭曉風殘月蜀尼明珠火披衣來有德有齒蹋遍了蜀山楚水飄然耳老到還鄉總不燒錢化紙我為汝指出明珠只恁麼五熱炙身四山交逼便可見千紅萬紫畢竟向甚麼處安身立命擿火苣云庭前柏子三亡僧入塔臨入時失敬文一具摩竭提國親行此令弟子如文殊普賢不敢措一詞維摩老漢雖有錦心繡口祇可析線分科指骨云此上人他要與釋迦老子把臂共行梵王贊歎莫及帝釋散華無地獨有敬文長老不入此夥隊騎泥牛入海去也所以道金佛不度爐木佛不度火泥佛不度水復指骨云祇如這箇著在甚麼所在即得指塔云煙霞生背面星月遶檐楹良玉潤微二僧火識得一萬事畢達磨鬍子直得分疏不下九年面壁雲門老漢抖擻肝腸道得箇廿七獨有此兩箇上人不待山僧解制通身委悉舉火苣云大眾看看雙垂兩相二始同時大藏教一時演出且道是甚麼法擿火苣云銕壁銕壁起日禪人火力疾為君舉火要見空華結果我有時寫馬成烏汝卻能反可為叵彩鳳豈可籠牢師子孰能羇鎖因甚麼臨行時一足微跛這些兒略肖雲門是可錄吾宗家譜末後句我卻分明擿火苣云破沙盆從新入火入塔白頭人送少年郎不但堪悲可斷腸說與神僊無秘訣從今祇可自商量起日禪人你嘗追隨我於松間谿上將謂啟予者商昨夜一火鍛成箇黃金彈子不妨拈來舉似諸方打散了雙飛孤燕驚起了獨宿鴛鴦活捉得南山鱉鼻擿骨云總教渠北斗裏深藏無逸禪人火夜色上梧桐打送亡僧鼓蹋著兩頭蛇相逢白面虎不去見閻王須是純陽祖山僧則不然擿火苣云紙鷂子落河雪觀音向火性空靜主火夜雨濛濛秋雲靉靉汝性本空累卻皮袋我有箇安樂法門得之者通身慶快不往琉璃佛國不生彌陀清泰於剎那際證入神通三昧劫火洞然這箇不壞大眾是甚麼擿火苣云甲戌乙亥進可直歲火八月十二日賀者在門弔者在閭我明日生汝昨日死要服延齡藥先燒短白紙進可進可你好似東方朔有口腹之累四上蓬萊我卻要行茶毘法就是銕拐李再來只可借尸於乞丐若謂附贅縣疣是這皮袋且道汝之一靈畢竟安在驀以拄杖打旁僧一下眾中忽荅一語師擿火苣云好好既有上座陪行不勞山僧覆蓋入塔大道無徑大方無隅蟭螟眉裏藏卻三世諸佛蚊虻翼上載著百萬億天王進可進可你既有如是神通如是玅用為甚麼前日被山僧一把火燒得天地玄黃直至今日悄無一言大眾蓋為他一向來認著箇知痛知癢底所以蚊蟲咬革蚤釘都當極則山僧向父母未生前輕輕一劄直是好笑取骨云冤家我與你道破了罷喝一喝云龍師火帝鳥官人皇送六如坤禪師木主入祖堂泥牛入市廛猛虎當頭立同氣連枝萬法歸一指牌云獨有此老漢天上歸不得地下歸不得以拄杖擊祖座三下權放在這裏銀山銕壁中秋雨霽為本際耆宿遷塔九原既可作今古而旦暮如何寒山子忘卻來時路老兄二十年前曾與你譚笑於萬竹林中不期今日破鏡重完圜光復睹別轉乾坤總不離本地風光百艸頭邊見出瓊樓玉樹一豪端裏具有金剛寶庫向這裏得之者其出其處利己利人無可不可向這裏失之者動翻識浪靜遭羇鎖其奈山僧門庭迥異諸方所以尚隱不尚顯貴藏不貴露金師子且教渠斂爪藏威多寶塔還可如故大眾還識此老面孔麼秋老桂華藏不住雨餘香滿山前路忍儀菴主火值旁僧未燼一生來六和完備果脩到無垢世界掩不住衣下明珠身光明兩邊色賽離彼離此無向無背五濁世獨自抽身淨國土恰好有隊山僧為汝借鄰家之火解開布袋坐入三昧擿火苣云秋水連天碧長松發幽籟恒如老宿入塔今朝九月初一黃華一時開畢香風穿透髑髏會得圜通消息銕蛇鑽入眼裏烏龜扒上板壁狗子原有佛性萬法不許歸一且道一歸在那裏擿骨云摩訶般若波羅蜜奕生老僧火出門不動步歸家不煖席面闊七八丈觜長三四尺夜光眼睛楊柳腰銕鑄眉毛銅鑄脊獨坐香爐峰對面無人識當日禮天童參寶壽覲東山所得法門今日不妨和盤托出其在山僧放過即不得擿火苣云銕鎚擠出黃金汁一如尊宿起棺道繇心證法藉人弘六度萬行種智光明應跡聖賢命世高流古蓋有之今未聞也欽惟越中首領浙右白眉一如尊宿大禪師其庶幾乎大眾還識此尊宿麼一向來乳憐赤子提獎嬰兒謙遜如不勝雖輿抬廝役一皆育以春和力學如不及縱名儒才士不敢與之抗席躬自厚而薄責於人自既利而復利於他今則高踞於萬仞峰頭追蹤莫及龍蟠大海天然高尚鳳不棲梧宛爾凌霄笑釋迦老樓上安樓鄙孔夫子屋上架屋山僧雖不能與二古人揚眉吐氣要在臨行之際討箇的確符驗金棺裏展足直裰上搖鈴這裏總用不著舉拂子云釋迦如彌勒如眾生如世界如一如無二如乾峰云舉一不得舉二放過一著落在第二舉一既不能放過即不可且道如何折合斂手云蒼天蒼天蓼華秋水下夏橋不是愁人也腸斷正鵠監院封龕正鵠禪人你嘗樹化山旂打雲門鼓爾密兄處開華山僧這裏結果心如直弦寬弘大度為人猶己立身如堵義之所在揮金若土絲粒錙銖不昧因果你累我不合勸做雲門堂頭我累你延為化山佐輔今日來脫卻項上枷開卻心頭鎖趯破虛空我為汝補起龕愁雲層疊化西東淚灑秋風血樣紅豈是道人溺情見法門牚拄賴英雄去歲致君來長空雪舞梅華開今日送君去銀鉤月照梧桐樹不來不去山水長生銕秤鎚被蟲蛀不受人家齏瓮淹丈夫自有沖天志去去去一箭透三關猛虎當路踞舉火已度生死大魚口已出黑暗無明藪如今獨步玅高臺清歌一曲曹山酒舉火苣云大眾今日樹提上座為正鵠禪人從頂上放大光明照諸佛剎作大佛事從胸臆放大光明照諸天上人間增益福壽足下放光明停酸息苦且道如何是光擿火苣云甲子乙丑入塔囊括三千界眉藏石傘峰吸盡西江水肘上種青松如何白雲裏見出金芙蓉若論這著子佛祖攢眉聖賢罔測總不若化山當家正鵠禪人今日四楞塌地八面威風胡來見胡漢來見漢孤迥迥峭巍巍終日在你諸人腳前後底放光動地拈拄杖云二繇一有一亦莫守舉骨云且道這箇是一是二擿骨云日午觀星斗為何淨僧入塔四壁青山列畫圖白雲影裏一峰孤睛舒眺眼天無際一線征鴻落鑑湖大眾此善人前未皈依今作吾徒去卻面上千斛塵要作人間美丈夫脫去溼重布襖留下赤水玄珠舉骨云祇這些兒如何發付擿下云殿圍深密重重鎖金鴨香銷玉鼎煙子白禪人火子白禪人你飲麥浪兄乳服瑞白兄藥鶴立不群舉止英發而嗜以銕蒺藜充饑熱鎔銅止渴既作赤梢鯉魚肯向齏瓮裏淹殺李長吉二十七身為名累顏淵子未三十鬢多白髮為人厭者縱長齡而生已枯骨為人惜者雖短筭而死有餘香以火苣打圜相云雪裏貍貓拏不住月中桂樹和根拔入塔時有寶泉二亡僧骨同入舉子白骨云此小師曾入大海中尋鍼猛火裏拾芥今日粉骨碎身祇圖酬報箇所親諸大善知識法乳之恩果然倜儻留得一口寶劍山僧收在這裏今日法席將終有道得者山僧雙手相贈總不分外有道得者麼眾無語恁麼則山僧自道去也寒來暑往秋收冬藏乃擿骨復指二僧骨云惟有此兩具骨蕫收不得藏不得寒不能侵暑不能炙入火不動眉毛過水艸鞋不溼釋迦老子分疏不下達磨大師道箇不識大眾收底是藏底是雪華莫作蘆華看始信黃泉是寶泉萬峰禪人火隔越數日不見虛空突出一片一春雪雨陰晴萬峰日面月面受付托而不迻臨大難而不變莫道唐喪居諸今日為君略通一線喝一喝云旱地忽雷舉火苣云晴空閃電日華靈腑二禪人入塔師子不食鵰殘俊鷹不打臥兔臨濟只好掉棒打月雲門徒自東顧西顧說甚麼玄要賓主君臣佐輔擿骨云一對鷺鷥三片翼夜深飛入清江浦尼戒初火癸未歲暮甲申日來梅華映雪葭管飛灰獨有此婆子不受他四序差排一任渠桃符新換爆竹如雷金剛堅固無生國琉璃世界黃金臺人蹤不到迥絕塵埃舉火苣云看看遠山如黛春將至嫁與東風不用媒入塔年窮月盡有一物剩放之則彌六合卷之則盡大地人索命開秘密藏佩毘盧印慧雲法雨那伽大定大眾要到此地位絕似不難以拄杖劃一劃云但得春到來何愁雪不盡五人入塔相將攜手人煙霞異姓相逢共一家看盡落華無與結都來接拍弄琵琶如今絃斷難為理角樓清夜聽悲笳雲門這裏面如鐵冷膽如斗大以拄杖點五骨云縱使此五人若臨濟若曹洞若溈仰若法眼若雲門都作一阬埋卻使天下人眼橫鼻直氣衝寓宙其餘摘葉尋枝之流何足言也舉骨云大眾你道他甚麼過作恁麼語話太平本是將軍定不許將軍見太平六和庄謝菴主入塔黃蒿沒脛紙錢香鼓吹靈輿到寶方驚起松巔雙白鶴和煙飛入水雲鄉指龕云大眾此菴主他擅美四德契合六和既以身為律令復將行作津梁向大寂定中一坐十小劫今日密迻一步更進一層無縫塔中遍參知識雲門山裏親見作家山僧亦不敢妄有所加祇要他做箇灑落丈夫如香象渡河非羊鹿者比即今腦後圜光壁立千仞又何須起模畫樣咦無腔曲子隨心唱不必宮商韻已齊仲雅禪師火以掌毒故髫年閈里會要久把手同行不同走蹉跎白業非如君多少丈夫空白首能於此際唱歸歟艸木瓦礫師子吼惡拳毒掌自能施舞之蹈之渾大有卻是由僧門徑寬任君氣宇衝牛斗舉火苣云仲雅仲雅你道是甚麼擿火炬云拖金楊柳智安禪人入塔時值久旱行舟於陸地千里飛塵埃燈籠夜哮吼沿壁上天台母子投機玉兔懷胎指骨云大眾此僧也到乾爆爆地總不見有洪波浩渺白浪滔天底作略只為一向坐在潔白地上鬼堀裏安身山僧今日教你老鼠入牛角便見到底入骨云前山應有雨雲自洞中來龍門石和尚封龕祖道臨川歎末流誰人獨上遠山樓西谿雪色梅華路兔跡狐蹤上古丘恭惟法兄佛日和尚西築菴木魚擿地放生魚原是釣來古石田今石雨事不崇朝先雲門後龍門要終原始與你同條生君不愧雙珠老蚌不與你同條死我卻愧聯璧荊山香柏峰循規蹈矩鷂兒山攃風攃顛法雨所霑三艸二木同歸甘潤慧日有臨五嶽四瀆總屬含弘上八閩入水求人回兩浙燒山覓虎操入室之戈寧可人負于我挂回車之劍無使我負于心饒你一橛頭硬差排天上天下唯我獨尊須知三滲漏軟套索左旋右轉落吾圈繢金鍼入眼亂卻玄黃朱紫疾雷在耳難分角徵宮商驀舉封條云大眾此是先兄一生用不盡底鼠黏子塞斷天下人咽喉法弟今目也只得看簍打簍相車造車管教你進了出不得關了不許開為甚如此折角鐵牛何處覓鸚鵡峰前月一輪縣真大眾最初句則易末後句卻難肅清寰寓函蓋乾坤千眼大悲覷不見八臂那吒無處尋洞山過水失卻了自家面目大梅臨終錯聽乎鼯鼠之聲大眾要見末後句麼展真云哪迻像入祖燈閣難得不相見夜來月上林東今日始親承一灣水落清渚離師子堀看取落花無住昇忉利天不外菩提寶樹所以沒量大人超方上士石火電光難為顧注一坐十小劫百劫千劫直逗到八萬四千劫總在今時從此一方東方西方縱迻到十方世界外卓拄杖一下云不離當處大眾先兄一生來十餘坐道場雖則儼臨萬指不廢吟風弄月豈肯向鬼堀裏安身死水中浸殺今日密迻一步便見神號鬼哭山僧不得已只得放開一線令諸大眾見我先兄不難左右顧云且道如何見聻喝一喝云皋亭夜月春風煖十里桃華惹夢香乃安位秉苣豁其門戶放出無毛銕鷂決破籓籬難留折角泥牛鷺鷥牽崑崙之象銕蛇入金剛之眼恭惟法兄龍門和尚唯德者有容乃智者攝眾繩繼先賢惜珠惜玉獎提後學攃土攃沙法猶在耳鸚鵡峰華開鳥沸道豈泯乎龍門山雲去月臨拆不散生冤家顯聖室中交臂唯弟唯兄打不開死對頭鷂兒山下連床即師即友一朝管鮑義同骨肉終古參商痛切髮膚天然法系定論難逃當家佛事不邀而至勝熱婆羅門通身是眼火首金剛王隨處光明直得七珍遍地八寶彌空不須尋討枉自他求分明一具黃金骨卻在洪波浩渺中入塔斷拂子華開拄杖赤骨𩪸不動一塵利生事畢即此物離此物留與人間作模則十景神駒渡海南五色祥麟下天北一十餘座道場二十年來狼藉卻道是清涼池大火聚可入不可入總不若今日提持可謂超方越格趙州老胡盧端自挂東壁心珠禪人掩關拗折拄杖高挂缽囊達磨老漢請出門外德山臨濟喚來栽樹到這裏天地澄平萬物雍熙根本智一切智從這裏流出三昧門神通門亦從此中收攝古人得意之後向茆茨石室中長養聖胎名利不干懷聲色不攖慮其出其處無所不可且道憑箇甚麼道理天高群象正海闊百川朝拈封帖云內不放出外不放入寒山拾得來又作麼生蘇嚕蘇嚕亡僧入塔火出木盡風送漁舟到岸灰飛煙滅露出腦後圓光此是他身後底形模卻是爾輩生前底儀狀可惜許唐喪光陰我為汝等盡情道破舉骨云會麼復云莫妄想天真寺存虛老僧火師子巖秋風蕭瑟鳳皇山江天一碧為提持額上之珠偶打失祖翁巴鼻為甚麼群盲摸象或是或非眾手淘金有得有失愚智但在反掌聖凡秪爭一息豪氂有差天地縣隔舉火苣云任他曠劫無明究竟只在今日竹景幽窗到者稀松風古殿無人識以拄杖擊棺三下云今日是你收因結果之時還會麼好向此時轉得身吐得氣八字打開和盤托出不則山僧為汝道破卓拄杖云不識為了塵長老起龕千聖同塗萬靈一轍迷則有生悟不存佛迷悟兩忘紅爐片雪了塵非相水清月白到這裏萬不可坐住上一層進一步脫卻鶻臭布衫翻卻胡猻窠堀才有說話分且道東方阿閦佛乃至北方成就佛等各各有依報莊嚴華臺寶閣畢竟在甚麼處安著擊龕一下云了塵長老你隨我來抴杖而出舉火知幻即離不作方便石中取火麥中打麵離幻即覺亦無漸次見性隔羅眼中著刺所以淡漠高流超方上士游冶于山水之間超然無事說甚麼睹明星悟道達磨西來斷臂安心三頓痛棒吹滅紙燭洞山過水一點浮雲翳太清曉來霧鎖塘南樹又道是八萬四千三昧門陀羅尼門菩提涅槃真如佛性根本智後得智如虎之缺如馬之馵更問父母未生前死了燒了落在何處喝一喝云鳥啼華落趙家村柳陰殘月湖心寺恒然如監院入塔四十八年一夢臨行時虛空迸卻一縫我道死水無龍寒山子認作神僊八洞走卻金章師子藏不住綠毛么鳳我今為汝補卻免使後來津送掩塔戶云恒然監院珍重珍重六通伊姪願菴和尚火古藤一俯麥華秀斷拂靈苗簇清晝共本同根原委來豈為異種萃光後天空眼界下諸方傲骨稜稜碧峰瘦明因殺艸山欲頹六通破院天欲漏任伊千指熱門庭我此山門蒙古垢墨瀋撩狂筆似椽緗縑剡楮龍蛇驟祝余興歎三復言庶艸凡華易開茂狐狼礪爪新其牙日暗鐙昏薄我牖願公斯感將有為灼肺焦腸不能捄誰道公為泉下人生氣如然正襟袖此後拈提向上機疾電奔雷不堪湊霜風一似春風嬌朱紫玄黃滿林鬥舉火苣云大眾正恁麼時如何乃擿下云相捄相捄龍門石和尚木主入顯聖祖堂先兄與山僧三十年憑著些血氣之勇於此室中東壁打到西壁就是散木老人有三頭六臂無處藏影將些家藏之寶盡情狼藉先兄得了許多奇珍異貝遊三楚上八閩回兩浙歷三泖西谿東皋神奇鬼怪東湧西沒總使人不可測識今日葉落歸根坐鎮寰宇肅清海嶽山僧又恐有日難見有耳莫聞不免向大眾再揭露去也遂展真云但願春風齊著力一時收入此中來復捧木主云大眾看看佛祖位中留不住笑入蘆華信水雲亡僧火旭日曈曈春色朧朧梅華破玉見主人翁山僧這裏太殺不情借此東風加以火攻絕教身不迻影足不留蹤潔潔白白廓徹虛空沾他一滴師子乳好看拄杖化為龍因之老僧火出海明珠剖石和壁十二連城價三千大千值留與人間照耀古今日月光明所不能及山僧三十年來總不惜東拋西擲因之老師向岐路中偶然拾得便可出此入彼東涌西沒諸佛國土一時遊畢今又節屆清明雨淋寒食木筆春風別院香海棠夢冷池塘側德宣高公火近海風多利春寒禁落花鳥鳴鄉曲語遊子正還家舉火苣云一條白練江山共色萬里神光天涯咫尺諸佛無縫可出列祖無罅可入豈知僧俗男女世法佛法平等法門一時收畢深深海底行萬仞峰頭立萬壽院諸亡僧焚棺金箋玉管走聲譽於詞壇寶蓋雲幢播佳名於法社陳年骨董不妨提掇舊日家聲正好維新移一步追給孤長者之芳猷允我西遷實前代黃龍之道範況茶毘乃先聖成規三塔係叢林舊式死了燒了不須問踢倒須彌山一座生耶死耶何足言吸盡黃河水斷流山僧與諸公生前無半面之交末後有同心之倡舉火炬云會麼好生識取金剛體所幸來乘般若船入塔穵空尋世界笑憨布袋掘地覓青天惱殺空生丹青寫行樂謾道本來面目鼓吹上優場錯認自己營生所以道有一層去一層出家還須出世進一步退一步利己先在利人天寧莊萬壽院滄桑一變昔幽墟今寶地慶弔同程茲者卵塔重新存沒咸歸福化剎竿初建往來幸有安居前僧後僧原無二姓古佛今佛本是一家含元殿裏位次豈從外得娑羅園中主人要自天成師子吼花紅滿地象王回艸遍郊原入骨云請君為我永振叢林為端實小師火粟畬裏只恁麼去紙衣下解恁麼來飽食香積飯好打愚癡齋無依國解鐵鎖鍊金剛堀舉琉璃杯嚴禪人你但知古路長松卻不管玉殿生苔骨鯁之臣其庶乎跛足阿師何俊哉哀哀白頭人送烏頭子落葉西風覆艸萊入塔端以自持實以律眾一布衲終身不易三條篾畢世無他食則同眾臥則同堂嫉惡如讎敵樂善若醇醪掩芝蘭之幽香甘樗里之退藏山僧今日一任你歸元還寂若趙氏連城之壁以手拊骨襯云送君歸舊府月滿前川碧涇菴主火銕船入海枯木花開白雲冉冉長空色帶水拖泥幾度來一切智觸目而現一切門應手而開涇菴主不行鳥道玄路卻與古德律洽聲諧擿火苣云我今贈你一莖柴道聲尼火雲在嶺頭閒不徹水流澗底太忙生當頭一句明如日多少時人暗裏行山僧法席將終多寶塔現有龍王女變成男子即往南方無垢世界成等正覺遺下箇護身符子山僧不免親手奉送舉火苣云打破萬重關喚醒這猩猩法相淡菴老宿火長年不出戶天下無人識只許老胡知不許老胡值百艸頭上光燁燁鬧市叢中鮮滴滴更說甚麼金棺自舉雙林示寂大丈夫區處得宜又何曾於生死去來患失患得出匣驚人開弓中的直逗到奔馬臨崖推車撞壁向這裏轉過身來更進一層三箇胡孫夜簸錢擲火炬云一把無明當面擲復為木主安位淵智藻德礪行惟粹終古彝倫紀綱品類道無可道名無可名所以位非其位當堂不正坐玉殿苔花翠此是威音王以前缺限釋迦老子求之未遂山僧今日補前人之所未備起風規于將墜日暮宿鳥投林月裏鷺鷥成隊整位云天然尊貴遙為元木恒首座火八字打開和身脫落雙眉乍斂徹底掀翻文殊舒右手於百城之外資福吐心腸於一水之東從前恩怨三更月此後相思一笑空恒上座你歷參名宿裂斷葛藤望起吾宗之將墜有敷末葉之靈葩不意先我著鞭早唱歸歟老僧不惜持一炬火神往於數百里之外縱有喪予之歎長慟之悲總分付與前江巨浪遠岫層雲睦州越嶺同風處不是蘆華是雪華荊門法姪封龕秦望古路道韻沖虛晉代雲門家風迥別獅子子遵賢法聖鳳凰兒逸眾超群門錘拍板禪參九帶三玄錫杖軍持律奉五篇七聚吹無孔笛春花滿谷撫沒絃琴露艸生光火鑪與法界齊寬古鏡同虛空闊大卓拄杖云此是諸佛秘密藏藏不得覆不得豈可與外人窺識獻公真首座火含元殿裏苔生錦帶橋頭花雨金牛斷索凌空鼯鼠一鳴而已春風匝地無遮何曾隔卻越山吳水河南三腳驢雲門赤梢鯉勝熱婆羅親切之句方得揚眉吐氣不知誰委緩行緩行我有一語雨琶山印空老師起龕即其室寂若無人披其帷其人在斯印空大德你欲十小劫而為一坐攝塵點而為一時山僧且未許你在何故聻佛道垂成十劫觀樹就是大通智勝如來也須遷座成道所以普眼之見普賢別峰之見德雲自古以來有此法式以柱杖擊龕云你今日若向這裏坐住神通光明總成窠臼山僧為你密移一步轉功就位去也卓杖一下云琵琶絃上新翻調響徹梅花月上枝入塔殘月蕾霜花書空雁字斜道人本無住插艸且為家一生功行百世丕因那知到末稍頭上收圓結果有印只可打空無言方成不二師子潛蹤羚羊掛角障蔽魔王無處摸索洞山土地莫可追尋寂光有真境非權乘之所知界外有淨塵豈凡夫之所識華藏莊嚴世界毘盧遮那如來逝多林法菩提場近有毘盧遮那莊嚴藏廣大樓閣攝無邊法界海無邊諸佛海無邊菩薩眾會海無邊眾生差別海此乃離垢者之所住處淨覺者之所住處真實無礙者之所住處超世者之所住處爾時彌勒菩薩從別處來彈指作聲令善財入入已還閉擊塔三下乃入道和穆孫火國有大難以身殉之之為忠國有大事以身成之之為功國有大義以身任之之為勇此三不朽者吾宗何獨不然嗚呼道和穆禪人茂年入道壯受囑累吾門亢宗法社英秀適當獅蟲起於濟北戈戟摻於同衣穆禪人撫膺裂眥誓靖其難以子房搏浪之膽繼明教叩闕之風奔走南北如救頭然率能感動天龍賴諸弘護逐其人火其書熄其邪正其謬然事固畢矣而臣之精已消亡矣以視吾宗之中有袖手而觀者有趨避其焰者有閉戶不聞者有坐視而哂者以視禪人之鞠躬盡瘁寧不愧死乎乃若輩不死而禪人乃死乎豈不哀哉至其疾革之際猶喃喃以法社善後為慮益可以愧若輩之心矣老僧哀之至於再三不啻顏氏子之可慟也然見其委順之時報謝怡然較往比今可以無歉老僧復奚言哉執火炬高聲喚云道和道和雖然我欲無言止有一句子不可不與爾重宣以為津送舉火炬云一靈真性不假胞胎時如何擲火炬云鶴翀霄漢和雲白雁入蘆汀帶雪棲守真禪人火壽彌甲子事我十年端恭謹飭不約而虔短袂操作在人之先處眾如水乳律身猶治田以其不忤於物故抱恙也孰不憐既具雲鶴之志故臨岐也灑然闖蓮華國遊性海天老僧之庶事豐約杓柄短長汝固知之茲以秉炬之際為汝狀為汝贊庶幾可傳以風後賢舉火炬云大眾八萬門一句當天萬英座主火雲門扇子𨁝跳露柱燈籠好笑林木池沼皆演法音觀音菩薩大開當門一竅直得萬紫千紅映碧溪頭頭得妙水底銕崑崙火中飛紙鷂入塔遊華嚴之性海借百川而為浴要滅南方魔種卻被婆子窘辱燒卻青龍疏鈔接得龍潭紙燭便爾卸甲拋戈好向孤峰獨宿瑞峰塢裏覆祥雲差勝湘南潭北碧霄洞裏安身孫臏門戶賣卜恒心禪人入塔二由一有一亦莫守葛坡下竹杖雲中哮吼普化搖鈴曹山顛酒跬步不移鳥飛兔走十方無壁落四面亦無門八臂那吒無處下手恒心禪人我道日中不藏影受用施為渾大有一對鴛鴦畫不成秪可藏身北斗自覺修禪人火住毘耶城居維摩室掌擎佛剎毛納大虛即小不思議境界沒量大人難測正是自覺覺他將法界眾生一時圓寂既是實無眾生得滅度者所以不住涅槃四德獨蹈大方光明赫奕三界優場推車撞壁更問箇立命安身惹得丙丁童子發惡燒得石烏龜眼赤潤凡老宿火烏芻瑟摩侍衛尊驀然闖入圓通裏夾岸斜飄楊柳風蒲園亂落桃花雨那伽大定用繁興正是春光遍寰宇磨盤空裏顯神通石頭大小皆能語柱杖從茲拔卻根數珠莫教從頭起舉火炬云者點光明遍剎塵且道是你不是你吳門兩孺人點主佳山開鳳翼不必問牛眠峻德歸幽壙家聲起後賢恭惟吳太夫人并老夫人母儀可則內政堪貽聳南山之大師浚聖水之賢明仁慈春藹人得而親至性天成姑嫜有托門楣茂丹桂之香閥閱列芝蘭之裔隋珠在乘前後俱照寶鏡臨臺高低普應茲者受賢孝子之請要山僧向筆尖上說歸元著落底道理舉筆云看看任從世界滄桑變一點靈明亙古今坦持鎰小師封龕雲山嵯峨古木長蘿定光圓寂彼岩之阿惟坦持鎰公德不自彰行不存跡超超玄著落落襟懷其慧敏其學優其理圓其用周以山門之故鞠躬盡瘁其成與否殊不足介惟不能忘情于祖道垂秋其志在支大廈之將傾障狂瀾之趨下昊天不弔吾其已矣又何言哉雖然如是思大師有言三世諸佛被我一口吞盡更說甚麼度眾生事審如是則鎰公大事畢矣春寒竹屋梅花近閉卻窗兒看月明舉火隻履言旋蔥嶺西如來寂滅雙林曉佛祖雖超生死淪也示眾生業顛倒識得漚花有漏軀丈六金身同腐艸鎰公身是亂峰雲去來蹤跡難尋討今日重參勝熱師山前歷亂啼花鳥舉火炬云這段威光古定光同途異轍歸家好一機關主封龕卜築西溪溪曲裏屋繞琅玕花覆水家風不讓芭蕉菴門庭冷落祥庵主邋遢窮酸只恁過何曾一念吾宗旨近來蹤跡似羚羊絕無一法為倚依閉卻柴門春晝長這回相續主中主胡瞻雲點主寶鏡臨臺著眼看胡來現胡漢來漢一點靈明亙古今翻覆從前無兩樣茲者瞻雲胡居士德以為科黨里共聞大義天成愚智俱瞻忠信可通於遐邇仁愛姻睦於庭帷不欺於人不負於己去後追思無愧於衾無慚於影蓋棺始定夙種有培為吾道之金湯靈苗再植作金田之秀實金枝衍茂宗祧有承貞嫠呈祥門闌可慶山僧今日向錦上鋪花鏤金嵌玉要使人人知有即俗可以明真因華以望得果現居士身行如來事舉筆云留取汗青垂不朽江淹筆上亦生花沈居士請為薦親點主春盡野花濃雲開見遠峰老僧三昧廣動處顯神通舉筆云大眾看看這管城子放大光明照東方十萬八千佛土皆明金色其中顯現無量佛剎見無量佛以無量佛事化無量眾生得無量三昧大眾還見麼點主云一點水墨兩處成龍妙香養虛上座起龕往復本無際動靜歸一源毘盧遮那不動而身臨塵剎大通智勝遷座而立證菩提圓明如照乘