body:
  text: 住雲門顯聖寺門人淨範編山陰嗣法弟子祁淨超較訂佛祖像贊世尊拈華默契披心髓也印空印水授受以取信也星分碁布風雲際也鋀石輾成白玉釧黃金打就象牙環所以聲化也雪堆師子火鍊成泥塑金剛水底眠三老漢是不負於君也傍立迦葉下立達磨我有真經了無一字通古稱尊無所事事有感斯應不動而至松風瑟瑟對談初志乘願利生以行以智若遇雲門失卻本事且請向陶潛籬下看秋花枝枝霜厭蒼苔砌坐樹下二大士侍玉琢麒麟紙糊大蟲秖可在身毒國無佛處逞盡英雄二尊者在左右聲呼聲應彼此朦朧丈夫漢豈隨你轉西為東山僧也依例腦門點地前有溪後有松爾翁即若翁亦二大士侍證向今古鑽龜打瓦睹星説夢晴空可把道無可道騎牛不下教設倫理麟經自寫世哀道喪幽然長夜於乎吾徒與之俱化奚以為辭之乎者也三教圖入舍衛國城祗園無我青眼觀空狂華萬朵目翳既除卻無處躲一鉢多羅明珠甚夥貪餌之魚打成社伙幸際風雲一場懡㦬托鉢像觀音等法界身秋潭月印等衆生緣智悲兼運如生如界一時頓應拯溺救焚不起於定春在華枝物臨乎鏡飫我以甘露之漿誰不稽首而皈命殘夜海天日春風初到華不因憐赤子瓢笠走天涯空凌一月已熾然説赤子可憐飫以禪説一楊柳枝甘露津津三草二木澤誰不均水月弘慈叵測文在其中不作字想無以句通即普門品示普門翁是一是二得弓失弓如月在水未許爾逢不持軍遲不隨一童默而識之庶可以風周身書普門品朱魚賣盡出金沙臘月能開火裏花此後春風竟寥廓簾櫳清瞰月痕斜魚籃月色朦朧倚松而立水聲淙淙松陰瀉碧是獨露身有誰相悉念彼長流奚時寧寂不言而化惟三昧力頓入無生海天一色水月三昧禪人請合佛慈力悲濟含靈三俱無迹月朗波澄其智止水其行繁興非心所擬非筆可形瞻圖思義莫認丹青一念清淨頓入圓乘悲願在躬與汝同塵慈顏妙相豈吾真身離此而求鑽仰無因猶第二月孰幻孰真非眼所見亦非耳聞百草頭上甘雨祥雲幻住南海來自西洋太虛之體應化無方有水皆含是月之光舉衆生類比翼同行我目衆目手足偕彰業海無際與之茫茫智山慧苑與之相羊悲願乃爾積劫津梁彈舌稱名如蓮花香一舉心念寶相琳琅即今何在山高水長倚松而立晴空寥郭翠濤風捲溪雲磅礡童子不來山尖月落收起絲綸囊中無藥一切衆生同歸圓覺因有情根茂慈悲樹同體普門遍法界處生界未空大悲無住醉象狂歇月明清曙野水涵碧遙空無玼如是生心應如是住一坐彌綸森羅在定寂場聲化巨細齊應如類而身猶生之命逆順叵測無擇穢淨意卜情求空華眚病離波問水執柯覓柄是耶非耶以斯為證寶陀大士敻居天外天竺慈尊祝融劫壞寧知我太虛之身納盡塵沙之界大海旋流無所不在展軸諦觀望容肅拜注耳而聽諄諄慈誨我於古觀音如來證此三昧將寄辨於君偉中禪人自珍自愛偉中請十八羅漢飛埃凝露佛清淨智衆生昧之煩惱煎熾幻人機息安有其事生佛互融於世出世遊戲叵測唯高上士有孚終吉凌波而至一貝多羅有言無字調師以馴華飛無住蓮華我心芥孔吾處負此一囊太虛可貯鉢有潛龍為霖斯注乘以大空威而不噬隨顛倒想坐菩提樹如寤時人説夢中事掀然一笑海天清曙達磨大師江水汪洋秋風蕭索君子之行見機而作涉魏遊梁出門便錯五乳峰前異花零落普賢洗象圖不調而馴以時拂拭他方界外有發普賢行者大士所知象王亦識等法界之普賢如所乘而不失彼其現異類之形具如斯廣大神力敢復以螢火之光向虛空而著色先師雲門澄和尚盂生而晚親師未久得喪不驚心雌黃不及口呼谷而應於谷乎何有太虛之量非寬滄海之度如斗或入室而操戈或面呈而背醜或媚彼而反咎以至騰謗書而相忸師聞之殊無可否數十年於茲可謂閲人多矣千日後始知醉我者中山之酒如其法道非我所知炙吾師之餘緒敢沐手書而稽首道蹇於人如處幽夜神廟御宇吾師以駕振起東南不在禹下二輪雙轡宗教兼化假三寸鏃為羿之射英彥奔流指澥為舍應疾施劑法雨瓴瀉究極離筌以借不借次列門戶腐鼠而嚇磷火燎原幽怪叱詫飛章陳壘以乘㽄罅師以無聞漫言無暇於乎吾儕奚辭以謝聿興於越闢大法久荒之徑雲龍風虎始得紹懸絲慧命敲唱合拍以鏡臨鏡不動舌根陶凡鑄聖甄別得宜老僧姓枰執柯取則空印水印月上波心水天交映圓下有孚古今向證智無師而師道法奚傳而傳令赫烜光明淵源相晟步趣武接繩繩裒顁式昭式穆浩歸祖政於戲乎日月出矣爝火奚競嫉忌分岐豈不曰僧中梟獍雲棲蓮大師回曜峰高攀躋莫及戒月慈光水天一色以聲為教用形為則不起滅盡定而智悲事畢禪耶淨耶戴角虎師子翼如何狂慧之徒以螢火之光擬乎天日靈峰受囑津梁之纍聿興末運方網三昧即形聲化假言啓類珠圓隨映玉方雅粹岩岩峻極淵淵川匯臨深罔測望岩自退炙其貽訓撫膺默愧瞪若絶塵造父失轡即之可楷豈其圖繪俯影而嗟感時而悔春後之花我生安貴青獅入窟原野狐媚誰為障川禹無稽會風斯下英蒼生奚罪冀其再興殍骸望歲吾其已矣炷香雪淚鋤驕去吝塵芥榮貴蒙稚可矜諄諄提誨圓慈寂定方網三昧道大叵思聞名心醉以形設教不居尊位末運頽波所為不類望容膜拜繼之以淚哲人已矣珠沉玉碎鋤麈上座請天童密和尚手握靈蛇穿破髑髏起濟北欲墬之風障東南趨下之流玲瓏巖坐嘯乾坤化雨所及葉落知秋七事風馳八紘被澤旱地轟雷血痕加炙望塵目昧峨峨太白偶幸下寮何睹影而自失久之始定梅花月色真寂聞大師玉露明灘月色寒苕源誰復再垂竿大悲閣下春如許夢入梅華露欲乾行蹤一挂羚羊角劫火投薪燒不著苕溪一脈通長安石頭之路果然滑庚寅春仲攜李來童子至今奉菩薩況復曾聆毒鼓音當年飲者今藥發安得金堤鴛水湖千里狂瀾濘清汋道行八閩化敦吳越噓蜃氣而為寶閣瓊樓惜驪珠而顛倒豪傑白馬之夙負不償雲棲之新殃未雪始聞龍池有一顧之私竟遺之於佞人之譜牒於戲乎英哲諱名出類取潔名隨以彰道碑叵滅竊疑乎四十餘年粹鳳毛麟趾之儔苕藍之室稱師林虎穴如何一涇上座不得與國士之捋想或擬博山艤之不授誾公之二師借二子將欲啓末運之雛秋霜之葉授受戲劇慧命夭折祖庭蕪穢紀綱滅裂鋤芟信種燎延緇白嗚呼乎睹幀興嗟援毫涕雪博山聖人瓶窯古佛辨山瑞白雪和尚烹博山茶用辨山水年曆不乖飲者都醉散木一枝化為芝蘭玉樹金針在手巧繡出鴛鴦一對破暗燈姪請二象同軸香幢法師虎無齒龍無鱗獸不敢觸物不敢嬰賣一指頭坐斷古今嚴冷之風以愧夫炎附者之心貝葉窗虛寒蟲助吟潛溪之畔水月為襟名利之徒秪可隔岸興歎三徑草深青霜滿林余得與乎伯仲之列遺語往行惟茲可欽東山爾密澓和尚急性天尊雷公菩薩撩著燒身衝口惡發乃佛乃祖無地安插撾東山鼓高揮大抹二曜炳然野火徒爝一自鑼鳴萬象磅礡琵琶曲調誰成譜試問菩曇長老深公自若自若深姪請廣潤山翁忞和尚余晚年狂逸山翁兄勉之攝衆甚力實規我也因圖像以隨一以自教兒一以戢良規贊曰方面皆正駭雞之犀式衡式儀形於坐馳珠玉是瞻難為瑕玼天界覺浪盛和尚老虎無齒臥龍無鱗威而不嘻妙化如神公誄曰毅剛果純誾私諡曰文大造經綸猶不足盡吾道超倫趙州古佛問世而津豎幟殄邪嚮德來賓維石岩岩泉源新新穢流濫觴電目而暝雎陽捍禦嚼齒穿齗吾為名乎衛道遺身昊天不弔竟爾傳薪吾道東矣有子同塵斯清可濯賢溪之濱賢溪同塵燈公請道契古今法遍天下胸次落落所以光大維金剛幢明珠照夜有知而未識識而不知心竊疑之試問取東村老謝博雅淵貫如漁竭澤探窮奧水源山脈繄禹之功蒼生有宅翰墨波瀾化周蠻貉致雨之龍出林白額孔席不溫作煙波客雲山在望難以棲泊幸辱同倫略書其迹廣廈須支兮奈余惟退殘之黃耇聞變而奔赴兮中心自忸望天塹之蘆雪兮徒然搔首走長干而興歎兮我膺如剖松柏蔥蘢兮蔭吾儕之君后麗閣凌煙兮翳誰之有風馳兮師吼雲澄兮仰斗踏毗盧頂兮是所以越五十三友應機聲教兮若不以口攝生兮曹山之酒無町畦兮維網維紐虎角兮翼銀蹄兮黑狗霜凌兮雙樹無怙兮無誘天不弔兮豺狐躪蹂嗚呼乎吾欲無言哉瓣香兮腸揉殘煙兮哀柳龍門石雨方和尚胸縣寶鏡肘佩神符摵瞎摩醯首羅眼睛擊碎趙州東壁胡盧於乎方今之際莫赤匪狐莫黑匪烏起以振之者豈可得乎風清古路無人到月落雲輕聽鷓鴣響氈拍版橫説豎説拊沒絃琴調高韻別坐斷古今討甚塗轍冰溪上人萬不可忘卻松篁橋上偕師玩月冰溪西堂請義以人合法以天隨一語類通傾膽揚眉既挹其衷復親其儀衾影無愧砥之礪之吸盡西江水寒月上華枝硬似綿團軟如生鐵龍門峰峻望崖自跌哆哆和和以羅英傑出處洞然念茲末劫一倦津梁長空皓雪君豈往乎聽熾然説釣得魚來放卻生龍宮虎穴燦珠明到今剩有西湖月坐對孤山落二更嘉禾挺秀金風剩葉定光搖影擊竹雲裂擲下木魚神機活潑釣魚放生水澄月白化陵八閩道周兩浙獎育兒嬰姁嫗明哲峻其門庭心枯情折佩鏡照妖圖縣白澤辭翰聊爾示廣長舌佛日西沉龍門積雪無梁之津胡為厲涉雲山在望雲山嵲位中符姪請我以默為説所以門風別度盡諸有情一坐十小劫全入涅槃城證此甘露滅至今龍門山桃李花紅白我既援毫無一辭法社處處飛春雪與君交臂別來經紀此日重逢楞伽會裏握手無言相視而已少焉憑怒振衣而起吾道金甌誰為摧毀我法宮垣堅不可圮頽瀾下趨一至如此吾兄神明鑑之晚矣佛有先識自茲而始請君緘口無問簠簋威如猛虎軟似綿團腳尖頭不避佛祖掌握著生殺之權五色糞切誡霜秋拄杖子卓破常住方磚遠門姪勉旃勉旃遠門座元請因我得禮為近事男間世而遇等乎優曇宗説緣偶不啻喃喃親親仁仁前三後三可偕而玩夜月渟瀾相依而聽春鳥秋蟬毋忘先誡庶幾再參丁居士請居士父子侍于像測難描難摹睹影猶疑問津求道楊朱之岐石田薰能復肇興長耳相呼為客兒潤龍門雨啓佛日曦雨過明珠千萬斛臨風著意向人傾是渠之題瞻之禮之庶幾解頤雪竇石琦雲和尚藤溪源委太白興波瀝血書經盡瘁鳴珂即義誼可以振遷就之法況法道聳雪竇峨峨狐腋之裘一掌千羊之皮何足云多無趣老人殺活有刀得之於野翁笑裏鼓翅雞鳴如斯而已僧耶俗耶杏花紅雨鴛湖有滔天之浪何必曰斷橋流水吾師之塔且幸與堂廬密爾免致使野狐之屬穴土穿壙反常越禮有者於茲然爝火而助明寧知乎日月之光已周寰寓嵌石大師月來一天風韻雨過青山一抹道行則鑽之仰之謐然則蘊卻威音王那著威而不猛溫而厲允吾夫子其三泖中柳隄之一筏也君豈邁乎猶新交臂泖水雲門儼然生氣精操匪倦欃槍變異岩頭老大叫一聲果爾驚天動地於戲已矣摩頂松東向共來説西遊傳記古心律師入獅子林儼聞哮吼或瞻遺像若喪吾偶盛世祥麟末運瑤玖玉碎猶方盤珠自走四衣分化維德不朽輪翼福智紀綱賢否受囑靈峰援攜群有折憍慢幢焚邪見藪爍迦羅眼母陀羅手案金剛杵靈符在肘睹彼螢焰為光奚久黃鐘絶響今惟瓦缶鑽仰莫及望容泥首罄南山行讚不及口波離再興奈余衰耇陵秋法社其如妖醜無作法師四依應迹三軌律身龍樹垂蔭金地通津弘辨聲化法王功臣鳴指喧殿七衆誾誾福城東際企仰後塵雙輪斯御嚮德來賓人道攸關請禱猶椿手持葉物得之秋林雖無藻翰可代徽音止啼啼止微哂而吟兒輩勉旃此非黃金釋尊説法五聾集聽圖觀音正反聞世尊若瓴瀉定慧圓明因果殊如何法界猶長夜定裏之身定裏聞夢中般若隨機化比丘有目非不聞目既能聞鼻可詫根門可互法皆圓草木瓦礫摩尼價即彼異生身我身我身諸聖同無罅譬以燈輝類法身千燈一室交相射龍以角聽牛以鼻異國尚有形語者舜若多身映佛光無身之身等空大如以虛空納一毫次公閣筆難為下空不可圖贊愈難老僧無語深深謝大椿壽老宿即師之母也我母慈仁其性天植口無阿語心如絃直善則揄揚過亦難匿惜生猶子愛人以德表裏俱正惡聞邪僻奉戒精篤晚年愈格至於夢寐佛聲嘖嘖所以垂終別無他繹趺坐而逝時當赫日三曰掩龕了無異色生平修進於茲可核辛丑臘八全身窀穸圖形拜贊永為貽則後賢知之業儒奉釋自贊火裏鍊成波底月黃金鑄就玉麒麟千年桃核逢春發結子開花是舊仁忖其菲才僻處窮陬翻然而邁痛此先猷知不可為復泛扁舟益友孔多以類而俅狎玩既不可以風偶臨衆以規下秋名不可以久居處瑕汙以優遊其虎皮也莊重其羊質也俳優篤至性遵福田若有所繇禪道佛法樓上駕樓如出如處如愚如慧莫與之為儔似傲似狂似真似偽水上按毬清者也和者也任者也火中之漚抑亦船子和尚泉大道政黃牛賣盾賣矛庶幾乎東方曼倩之流此余狀此余傳後來塔上之銘無用他求題存瑪瑙寺孤山法師塔院瓶陶領八藤條偷心不死憨大師呼為不怕虎新生犢子玉笥山下石橋邊果見千紅萬紫足蹤幾遍天下囊無半文錢使耽書史若貪叨援毫抽思卻無一字上紙如今老倒郎當甚遠禪人請自言之余不能細染溪藤弄古鼠宗蓮遠教授請風乾羊棗道旁苦李範禪人愛人之所不愛取人之所不取以汝之賢孰不欲明窗置汝過不我摘詈不我去吾不知其所以或有一於此門對層巒碧水月上南屏鐘裏風動幅巾斜小舟聽其所止為則範侍者請布荊棘林開沒縫戶我有通津君絶行路少覺佇機野鴨子過雲興博辨不消一顧是這等露刃之劍脫韜之矛也有箇漢赤身而步元木恆座元請法無秦楚道乃至公金玉定價不約而同沉檀龍麝何必當風獻公獻公汝老矣我龍鍾德何足以作汝翁且與你偷間學少過前川柳緑花紅獻公真座元請振我家猶所貴英碩澤彼季昆美茲器識尊不在位望以副德西河之有師子東山之有三佛余終愧乎老雲門者水溪禪人伐柯取則冰溪融西堂請龍門為宿客數載叩吾道可知我門風尉斗煎茶有同調圖心或有之圖形苦難肖異時拈出向諸方大蟲戴紙帽一機瞬西堂請言隱則矯既出太魯子高之畫龍繪中之繡虎風不冽而雲不生嘯無聲而鱗不舞生無聞死無補獨得之於高山流水非知己者不敢輕吐道和穆侍者請君子知時達人通變迹似漁樵不攻文煥榴華競渡錦隄風蓮葉跳珠柳垂線任伊呼我濟公顛笑舞狂歌適清玩知我者仁甫不知我者可憎可厭何仁甫居士請適端陽日秋雲輕秋月明既無用於世姑藏拙於山城政黃牛之清風匪不欽企亮座主之高蹈實愧吾生或亦處乎季孟之間庶幾坐苔石而聽潺湲之聲夜月湖心玉一片遠山雲靜墨痕新沙隄緑柳黃鸝語水際青萍白鷺春咄清風明月一間人明日扁舟發今宵請像題人去楊花渡佇立版橋西誰道人生難再少試看遊子有歸期休將白髮唱黃雞師將遊江右衆請題煙蓼同舟上富春秋華堪對月華新睦州幸有陳尊宿肯惜關山禮後塵嚴州錢居士請睡不足食不飽兼人尚道飢天明不道曉日中欲逃影枕上聽啼鳥利人寡學識自救且未了如此形神不若住山好道曉維那請策杖走天涯撥草尋知己白額遇大蟲卻是我和你南嶽與天台冤冤相對理踏斷草鞋筋展手云祁季超如斯而已西遁超道人請慧日峰前湖光漠漠金牛呈瑞獅子一角異花堤柳殘霞西落枯木龍吟秋原蕭索六橋煙靜愚菴行樂慧峰禪人請思大鼻孔撩天法相兩耳結頤聞嗅既不異乎尋常是不敢向頰上栽眉繪事後素書記坦持坦持隆禪人請科場捷報我孫山後文腹枵然敢期淵秀取適於林下優遊德慚往行幾多漏逗秉燭整理老而無救畫虎不驚人木雞不堪鬥散步於花間柳邊秋堤水際尚有黃鸝聲奏豫獲捷禪人請面上益三毛何有於英邁鐵鑄觜唇皮毒愈蜂躉三十年坐席未溫十八上卻問中書堂做甚買賣析骨盡無一星子血氣擢髮不足以聲其罪不知有甚長處多載巾瓶勞而不悔理公理公泥團土塊一何足貴買朱砂中秋月倩人圖繪法聚理侍者請膏焚以明麝剖以香處之樗櫟無何有鄉匠石不顧斧斤不傷悠裕樂只元吉黃裳人隨天放淡漠優長容成氏子北牖羲皇無位而怡去名致祥彼萋菲者斷水吹光擊節而歌接輿鳳皇徒有其年無知俗漢到處胡言得以人慢不諳佛律千佛難懺性同薑桂惡如爆炭燎著便燒有甚涯岸謗書成帙閻王有案如斯行止疊言為贊是佛是魔具眼者看自訥法孫請著彩瑱朱三村土地破廟灰罏臺盤酒器泥滓合成有甚名字愚夫祈禳智者委棄筊卜休咎神謀鬼計年已往矣生無二利疲牛不耕老虎瞌睡繩燈繼葉為不了義愚拙無似此余之諡論心與形都不足視禪人誡之以我為試法純上座請箇裏能藏法界圓兩峰雲淨月華天分明覿面難回互無那丹青畫不全玄印侍者請兀坐如癡盲龜待木披衣似僧鬚長似俗茆塞未開藻華枵腹病蹇纍人事煨蘿蔔問亦赴機隨聲鳴谷撫松玩石闖門看竹如斯而已胡為碌碌生無可道丹青一幅谷鳴侍者請長歌憐鳳皇短歌悲銅駝時乎且居易君子志不磨孤山梅花媚香雪映月為清波小舟泛月剪重羅漁父為余歌復歌樂只明湖公無渡河鳳兮鳳兮將奈何為目無光為腹不慧田服圓顱執拗無類齒豁頭童年窮太歲濫獅子座猴蹲鳥喙聲化履操援毫有愧月落山曉所望賢輩坐向湖濱數雁行八翼斜飛説兩對曉山講主請苕水洋洋石傘高張龍門一躍化鹿蒼蒼思盡所業禪講趨蹌竟成圖龍唐喪星霜今也奚如秋盡寒螿撫膺自顧無物以方指源模像請説寸長閣筆而繹幾斷枯腸既不成句託事相羊能蔽我拙卷而復藏指源上座請風搖荷葉雨珠活月照梅花露玉香黃鳥踏枝金點翠鷺鷥傍水雪飛光咦君居東越我近瀟湘季眉上座請語水攝心繞林環水自余而後來賓粹美居是思之期其英偉道在一芥一芥綱紀維世垂法邊幅筥簋玉卮有玷烏足以齒鼠璞名濫朱亂於紫用器卜智懲後知始不為鼎梅寧居苦李作贊中誡付子獲子行樂子獲禪人請以之為講師蛇麻莫辨以之為禪翁車牛逆施濫緇流而僧中之刺多俗氣而玩物成癡山居少寧靜湖寓多坐馳得人詈惹人嗤老不知休逝者如斯閻家老子符牒至大冶禪人為我維持大冶上座請院主請晚參慈明不事事端公少叢林剪彩弄獅子一色瀟湘雲朗秀開動止擬將追後塵紛然亂朱紫請以法乎天一任指瑕玼宇宙既茫然事不止於此適腰者忘帶適足者忘履以道歷諸境如斯而已矣道表禪人請沾涕食芋分明俗漢倒著草鞋實不耐看過獨木橋若荷重擔問著箇事滿身白汗龜縮有餘蛇行不慣圖形上幀墨中添炭請君收起鼠窩蠹飯離微禪人請來住集福桂花芬馥雲兮出岫清和之朔幻迹萍蹤徒然描摸讚毀不驚形骸土木彼虛空身香塗刀割既不我知胡聞而愕捫心而忖夢蕉鑄錯集福寺覺圓監院請惡沉寂而贊禪悅鄙知解而升座談經禪者斥為山外講宗目為濫膺鳧鵠相異金鋀兩懲智非有無水炭相陵為學既駁為道無憑德天暗女總屬可憎水底花枝第二月指目之奚稱或可以呼牛類馬即俗而僧宇宙亦廣矣何所不容樗櫟之才幸勿以樟梓而繩我自逢場作戲湘江水上波映日早霞升存嘉禾萬壽禪院面厚三指觜長尺五自處無益法門無補倔強性成加以愚鹵以我為戒超佛越祖無可安頓且作關主垂嵒之木已灰之火於世漠然望道不果隨風下趨打入社伙靜猶殼蟲動若水母追繹浮生總之是左日勢西沉霞光萬朵日落天空是你是我眉寒骨冷心勞日拙慢山毒海人所不屑既不法古所履覆轍薑桂不化至老愈烈垂西之影秋林之葉遺此陋形納諸箱篋無使智知謂我多喋或詢真偽莊周蝴蝶即中允西堂請石上栽花水中取火古董陳貨麻纏紙裏時宜不合所至坎坷耳目不靈難入社夥水邊林下無可不可我本無形你卻是我何事無言瞪睛而坐真月似月二俱負墮瞻明堂主請自喚猩猩三呼不起雖非木石了無生理不焰之灰污池之水江西湖南芒鞋萬里至老不衰為尋知己覿面相逢如斯而已畢竟是誰大蟲無齒若木禪人請口生白醭耳有鳴鐘膠柱調絃子高畫龍龍不致雨絃韻不融二利既失三軌無從請戒之哉取譬陋容慧業峻德潭水孤峰飛聲走譽啓迪聾矇百川障回末運帡幪燭幽一炬賴有麗公麗公法師請跛鱉登山矇龜值木緣高愈卑前趨後覆休蔭林泉且教藏六寧靜寡尤知足不辱忖無寸長諸方不録老志成灰狂牛不牧在山出山遇物即觸閻家老子上福上福際如知浴請執卷橫杖為余開説聽不用耳語不關舌水乳主賓若無可別君臣父子梅花雪月以萬象口談虛空事心不可擬言不可議碓觜開華鐵捶蟲蛀和尚門庭烏龜上樹向侍者邊覓箇入處天界和尚同軸睿水侍者侍側居今之世局天踏地汝將入山老僧偕去目視雲漢周覽無際龍山我師大梅賢契枕流漱石藤纏麻繫虛空撲落柏子花謝三年之期豈余之計清余上幀結伴同住柏子上座請落空外道著相凡鄙捉摸不住線穿不起雖具袈裟全非緇侶照鏡愛頭摘花空裏無可藥救自忖亦恥長老何心味茲苦李設與之化吾門孔鯉如或異趣跨釜可矣若和融融渭涇同趾百年之後是我是你高間維那請龍蛇之蟄以趨時也尺蠖之屈以求伸也物類之微不移其度法時履信以乘其化我故與隱道啓公維時峻德終其身而不忒不得已徇情領剎席未溫即棄去猶不忍作斷佛種人殘僧數輩諄諄提誨神鼎諲冷落門庭法昌遇一力撾鼓人不我知世不我容獨受之老僧圖形請贊醴泉芝草不必有本青藍水冰固當自愛老僧節隱道之概以自贊春樹花芳秋潭月映隱道之啓我多矣隱道啓長老請
