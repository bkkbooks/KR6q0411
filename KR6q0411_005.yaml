body:
  text: 住雲門顯聖寺門人淨範編山陰嗣法弟子祁淨超較訂普説普説喝一喝云山僧連日來抖擻尿腸費盡氣力總不見有箇出格丈夫向山僧未開口前掀翻法座把山僧打進方丈去一者見得顯聖法社有人二者免致山僧向耳裏灌水眼裏攃沙山僧留箇縫罅與你尚不會挨身而入更説甚麼獅子頷下摘鈴猛虎口中奪食汝既認黃葉為精金山僧不免著水賣米去也以拄杖擊香几三下云此三擊有一擊超威音那畔越象帝之先轉南為北易東為西十方諸佛不敢正眼覷著歷代祖師亡鋒結舌有一擊蝦蟆吞卻香爐峰走入蟭螟蟲眉毛孔裏高聲唱云五臺山上雲蒸飯佛殿階前狗尿天剎竿頭上煎䭔子三箇猢猻夜播錢鐙籠沿壁上天台懷州牛喫禾益州馬腹脹有一擊乾三連坤六斷震仰盂艮覆碗離中虛坎中滿兌上缺巽下斷主山高案山低大盡有三十小盡二十九若向這裏簡點得出潦水盡而寒潭清簡點不出煙光凝而暮山紫諸兄弟此一著子沒量大人到這裏鬥湊不上你諸人今日三明日四半青半黃半生半熟奴奴娘娘有甚交涉所以古人云此事不在語言文字上又云吾宗無語句亦無實法與人父母未生前會取未舉心意識前會取始有少分相應又古德云法性不寬波瀾不廣蓋為命根不斷所以被山僧輕輕拶著便七華八裂手忙腳亂他日如何抵得閻老子鐵棒古人公案雖是破草鞋不如赤腳走到爽快也須穿破始肯丟下若一串穿過自然左右逢原八面受敵兩頭不著中間不居即如今日施主送供請説法要若道有財可施水也難消若道有法可説開眼做夢記得昔日波斯匿王問佛世俗諦中還有聖義諦也無若道是有智不應一若道是無智不應二一義二義其義云何佛言大王汝於龍光佛所曾問斯義我亦無説你亦無聞無説無聞是名一義二義這老漢秖可欺他俗漢當面熱謾據山僧判斷將平天冠袞龍袍與世尊穿戴了將毗盧帽僧伽梨與匿王披頂了正恁麼時喚作世尊又是匿王喚作匿王又是世尊且道如何折合豎拂子云梅華連月和香送玉映清芬進戶來普説大道只在目前要且目前難睹欲識大道體寬不離聲色言語大衆作麼生領略莫得一往向册子上憶持語言裏卜度見山僧升座時鼓兩片皮便道説佛法及乎山僧下座去其中佛殿山門廊廂廚庫又卻蹉過也鴉鳴鵲噪語笑喧譁又不是也正恁麼時見色處眼又不瞎聞聲時耳又不聾且道目前大道在甚麼處昨日吳居士進方丈瓣香作禮云弟子母親産難身故切思欲報親恩須脫生死因入顯聖日則挑水夜則禪思一切所為回向先母山僧道你要報母恩今日母在甚麼處士云不知山僧道你禮拜著士便作禮山僧笑云我兒你會禮拜耶士懡㦬而退今日又設茶請山僧為衆開示亦為度他母親大衆要見吳居士母親麼高聲云行堂的擺茶去良久云大衆會麼今日居士尊親在你茶杯果碟裏現神通十八變身上出水身下出火或見大身滿虛空或見小身如塵微大復見小小復見大入地如水履水如地男子身中入正定女人身中出比丘身中入正定比丘尼身中出色塵中入正定聲塵中出眼處入正定耳處出耳處入正定鼻處出拄杖身中入正定拂子身中出豎拂云山僧拂子吞卻乾坤去也直得四海波騰須彌震動於中人天八部魚龍諸趣驚恐無量嚇得帝釋夫人走向東北歡喜園中手攀員生樹枝高聲道阿呀呀下方世界為甚這等熱鬧山僧道夫人不要慌擲下拂子云放下便安穩普説欲行千里始於初步雲門這裏雖則石路坦夷動著則喪身失命有入水不動波舞蹈不生塵者請出相見僧出禮拜師指云兩堂人總不如此僧僧擬問師云依俙似曲才堪聽又被風吹別調中又僧問獨行千里即不問如何是密移一步師云樊江未舉足時道將一句來進云鶴出銀籠始自奇師云去樊江遠在問如何是心意識師云不躡前蹤更置一問來僧舉拳云這箇是離心意識師云可知道乃云離心意識參絶凡聖路學白鶴出銀籠猴子過山峽是恁麼人隨處拈來可以塞斷咽喉若趙常山向百萬軍中取勝淮陰侯背水陳上建功到這裏一齊抹過縱能運籌於帷幄之中決勝於千里之外堪作甚麼吞得栗棘蓬透得金剛圈袖裏藏殺活劍口中有縱奪機更向此中覓為人句子崖州萬里諸兄弟切弗草草佛法須是箇漢子若是朝三莫四總沒交涉僧問趙州云學人乍入叢林乞師指示州云喫粥了也未僧云喫粥了也州云洗鉢盂去其僧言下大悟雲門拈云且道趙州有指示無指示若道有且道趙州向伊説甚麼若言無此僧為甚麼悟去雲峰悅拈云雲門不識好惡大似為蛇添足雲峰則不然此僧恁麼悟去入地獄如箭射師云趙州向蝎甕裏蹲踞雲門入蛇坑中坐臥雲峰向虎穴裏遊戲蝎不能螫蛇不能毒虎不能措其爪牙果然妙手據山僧判斷趙州也無洗鉢盂話雲門縱有畫蛇之筆向甚處添足還是雲峰入地獄此僧入地獄拍案一下云山僧今日將三大老頂相光明神通妙用拈向諸人面前漆桶不快喝一喝云萬山紫翠煙嵐裏濃淡浮沈畫不成普説連日來東語西話打一返觀八萬四千毛孔根根卓立且道病在何處良久云作賊人心虛復云山僧病處惟我自知諸兄們何不自體貼看莫只南去北來東奔西討學得些些以當平生及乎被山僧輕輕拶著蝦蟆禪也跳兩跳總沒箇絲線脈絡曾記陸亙大夫問南泉云肇法師也大奇解道天地與我同根萬物與我一體泉指庭前牡丹云時人見此一枝華如夢相似審如是則適才鐘鳴鼓響是夢沈檀龍麝是夢膏粱美味是夢見前聽法意下卜度亦是夢你莫見山僧與麼舉便道這樣語句是誰不會山僧還要問你三十三天帝釋夫人烏紗冠頂何處得來山僧為你頌看好支華向夢中看紫翠芳菲色已闌到得惺來華又落前三三與後三三諸兄弟你於古人平實處不妨領得少覺淆訛便吞吐不下如僧問古德如何出得生死答云無生死你出如何是佛即心是佛如何是道平常心是道有些滋味便去咬嚼被他別行一路將黑豆子換卻眼睛就不是也東寺會禪師示衆云佛無住處説甚即心心如工技兒意如和技者如何即佛復云心不是佛智不是道劍去久矣汝方刻舟諸方尊為東寺禪東寺是馬祖兒孫便翻案了也何嘗一往平實將去山僧也有一頌楊柳鶯聲春晝長桃華寂寞暗生香誰家曲調吹離恨客思凄然空斷腸後仰山來參東寺問那裏來山云廣南來寺云聞廣南有鎮海明珠可收得否山云收得寺云珠作麼樣山云黑月即隱白月即顯寺云何不呈似老僧山叉手向前云昨被溈山亦索此珠直得無言可對無理可伸寺云真師子兒善能哮吼山復整威儀進人事寺云才方相見了也山云恁麼相見莫當不得否寺便歸方丈閉卻門後來仰山舉似溈山溈云寂子是何心行仰云也要識得他大衆思忖看古人通身手眼恁麼樣子問他明珠卻恁麼道若是今時便豎指下喝張唇努舌如何及他不費纖豪氣力活活潑潑自繇自在何曾思議造作得來山僧不惜為你一一頌出廣南珠作麼色白月白兮黑月黑十二連城換不來海藏龍宮收不得攃向人前太狼藉牧童牛背無腔笛住住住甚麼南泉陸亙東寺仰山拍案一下云不消山僧一拍百雜粉碎顧左右云你這隊噇酒糟漢又卻如何噓一聲云自出洞來無敵手得饒人處且饒人普説舉拂子云摩尼珠人不識良久云如來藏裏親收得顧左右云漆桶不快諸兄弟你豈不是正因出家好心學道及至挾袱子擔鉢囊上他門戶便見許多淆訛這也是你眼裏無筋骨頭軟脆自家不能成立一往隨人上下不知不覺打入骨董袋裏去築了一肚皮雜毒種子口滑如油自稱禪客不知古人苦口切誡何曾教你留箇元字腳於胸中但教你休去歇去上無攀仰下絶己躬識情枯得盡妄想放得下還有甚麼事來諸兄弟你走諸方參請為箇甚麼事你莫生死不了腳跟下事不薦祖關不透心地不明麼且生死是甚麼東西把將來我為汝了卻若是腳跟下事不著問人又不知腳跟下甚麼線索羇絆著汝更道祖關不透我問你祖師有幾箇關你過去不得殊不知古人隨人顛倒一時酬唱你去不得立地便成隔礙何曾有恁麼事若問心地汝心本自清淨用明作麼良久云雖然如是癡人前不可説夢也須打徹一回始得我且問你喚甚麼作心莫是見覺聞知動用不失昭昭靈靈者是你心麼若此是心因甚慶喜尊者認箇見前能推的被世尊呵為虛妄想相無始至今認賊為子我再問你秖如二祖求達磨安心至覓心了不可得與汝安心竟便悟去為甚麼後來在淫房酒肆人問其故曰我自調心非關汝事若心既安云何欲調則安者何心調者何物若道一心何為有安調二致若説二心有是理乎試定當看果若心即是佛都莫分別如何馬祖又道非心非佛又云不是心不是佛不是物又云智不是道心不是佛即汝自心便有許多安頓不下總之情識用事將意路通處認作心性所以東磕西撞不得痛快今時有一等於心意識路上略通得去便自稱為了事人因果罪福曾無畏懼跨腳出衆置箇問頭定要問到座上老漢不管語脈亂統將來與你分門別戶某是某非懷著許多心行大衆此正所謂生滅心也去道遠矣閻家老子打你鬼骨臀有日在這著子莫説未得的人不可造次就是得了還須保任湧泉景欣禪師云我四十年在裏許尚有走作汝等諸人莫開大口古德云見解人多行解人萬中無一若識漏未盡敢道輪回去在又曰汝但盡卻今時始得成立亦喚作立中功轉功就他去亦喚作就中功親他去所以道親人不得度渠不度親人恁麼譬喻尚不薦取秪管亂動舌頭不見洞山道相續也大難盤山道譬如擲劍揮空空輪無迹劍刃無傷又道時中常在識盡功忘瞥然而起便是傷他你等向人天衆前欺心亂統者試將從上古人真摻實履一自反看禪以何為力以不欺為力又曰若以豪端許言於本末者皆為自欺惟古人見徹處方可謂之不自欺也五祖演和尚在白雲端處掌磨司一日端至語之曰有數禪客自廬山來詰之皆有悟入處教伊説亦説得有來繇舉因緣向伊亦明得去教伊下語亦下得秖是未在你道如何演於是大疑即私自計曰既悟了説亦説得明亦明得如何卻未在遂參究連日忽然有省從前寶惜一時放下厥後嘗語人曰我因茲出一身白汗便明得下載清風雪堂行有頌發揮之曰腦後一椎喪卻全機淨裸裸兮絶承當赤灑灑兮離鉤錐下載清風付與誰大衆知麼凡船自南運貨而北謂之上載自北卸貨而還謂之下載此是夜靜水寒魚不餌滿船空載月明歸之意你看演和尚在衆時豈不是翹楚猶自甘沒下寮一聞舉著便自不安此正所謂不自欺也又道從前寶惜一時放下放得下方名到家則多知多解大不相干故古人心如太虛隨叩而應就等間垂一機發一語初不著意你卻盡平生力量咬嚼他不破其或旗鎗展布各有回互縱使橫拈倒弄事無虛設你既宗旨不明語句不透不曾到古人地位硬著牙關要圖排抑堂頭嘔血有分在你道利害在甚麼處蓋為情識用事我見未空此是你百劫千生受虧底至今猶不知非誠可憐憫我舉則極熟公案與你商量看僧問趙州如何是祖師西來意州云庭前柏樹子僧云和尚莫將境示人州云我不將境示人曰如何是祖師西來意州云庭前柏樹子彼時覺鐵觜到法眼處眼問承聞趙州有柏樹子話是否覺云無眼曰往來皆謂有此語上座何得言無覺曰先師實無此語和尚莫謗先師好大慧拈云若道有此語錯過覺鐵觜若道無此語又錯過法眼若道兩邊俱不涉又錯過趙州直饒總不恁麼別有透脫一路入地獄如箭射畢竟如何舉拂子云還見古人麼喝一喝大衆聽著要識趙州麼如天普蓋似地普擎覺鐵觜坐鎮寰中四方納款且道大慧知柏樹子落處麼春風隔院桃華暖不許遊人浪品題還有六十拄杖三十拄杖打法眼三十拄杖自有一人領去在可知山僧這裏賞罰分明又僧問趙州狗子還有佛性也無州云無妙喜老人恆舉此話令學人參云佛語祖語諸方老宿語千差萬別若透得箇無字一時透過又五祖演云狗子勝貓十萬倍我常室中舉此則因緣問人一味亂下語南泉趙州一等是公案為甚麼五祖卻恁麼道聱訛在甚麼處若是透得斬貓公案我要問你趙州狗子若兩則語一齊穿過無絲豪疑慮我要問你五祖演意在何處作此語話試聽一頌荒院深村景寂寥有門無奈客來敲子歸啼瘦華無主夜靜鐘沈月又高這些關捩子你敢一時抹殺麼若是清楚不來打一反觀豈不慚皇殺人尚敢大呼小叫妄自尊大驚愚駭俗耶大衆此一絡索潛心體究看若向這裏掉臂而行方出得生死三界不能管轄佛也無奈你何灑灑落落作箇大丈夫漢回視山僧所説豈不開眼見鬼以拂子直一直云我為你一筆勾銷普説師升座大衆集定師驀云討甚麼碗即下座復轉身云大衆你既恁麼莫怪山僧潑惡水去也諸禪德你踏步向前莫不是問佛麼莫不是問法麼且問你喚甚麼作佛喚甚麼作法即今佛在那裏法在那裏卻不去自家理會只管倚門傍戶向人口角邊册子上築上許多奇言妙句在肚裏所謂泉眼不通被沙塞了道眼不明知解礙了諸仁者若是此一著子在語言文字上為甚麼世尊説法四十九年又有末後拈華彼時百萬人天無敢措一辭者是他尋嘗秖向語言裏作窠臼知解上去留心所以搆他不著迦葉尊者此時忍俊不禁不覺微笑這也是如空合空似水投水世尊方才道我有正法眼藏涅槃妙心付與迦葉則知四十九年所説直是正法眼之緒餘耳要知諸佛出世遞代相沿不過開發你我本有光明喚作正法眼名為涅槃心雲門垂語云人人盡有光明在看時不見暗昏昏作麼生是諸人光明自代云廚庫山門又云好事不如無圜悟勤云如今人才聞舉著光明便去瞪眼云那裏是廚庫那裏是山門且喜沒交涉所以道識取鉤頭意莫認定盤星此事不在眼上不在境上須是絶知見忘得失淨裸裸赤灑灑各各當人分上究取始得雲門云日裏來往日裏辨人忽然無日月燈光於半夜中未曾到處取一件物還取得麼參同契云當明中有暗勿以暗相睹當暗中有明勿以明相遇若坐斷明暗且道是箇甚麼所以心華發明照十方剎盤山云光非照境境亦非存光境俱忘復是何物你看張拙秀才參石霜有箇入處解道光明寂照遍河沙凡聖含靈共我家下邊兩句又注得好一念不生全體現六根才動被雲遮有者秖認得箇昭昭靈靈底業識他所以道要一念不生方見全體六根才動便不是也下來又道斷除妄想重增病趨向真如亦是邪妙妙看他得底人出語不同斷除是病趣向亦是病所以道取不得舍不得不可得中恁麼得雪竇顯禪師特頌此一則語山僧不妨隨例打鬨頌云自照列孤明為君通一線山僧道益州瓠子建州薑華謝樹無影看時誰不見山僧道麻黃巴豆砒霜毒藥一時撒來見不見倒騎牛兮入佛殿山僧道若不是閉卻天麥門冬檳榔木澤一時闖將進來諸兄弟這些葛藤椿子識得則包羅目前若不會且向此中透過一番五色線斷自然八面玲瓏隨處自在豈不見香嚴在溈山會下問一畣十問十畣百及乎問著父母未生前道將一句來不能加畣披簡舊日所見書籍無有一字可讎然後焚棄所業往南陽忠國師舊址結茅內究一日除瓦礫擊竹有聲凝滯頓然開豁便矢口説箇偈云一擊忘所知更不假修持動容揚古路不墮悄然機此卻不是當年學識來的亦非是知解邊事所以置箇上樹公案卻也奇特道如人上樹口銜一支腳不踏支手不攀支樹下忽有人問西來意不對則違他所問若對他又喪身失命會中有箇虎頭上座領得香嚴意便出來道上樹即不問未上樹請和尚道香嚴呵呵大笑師豎起拂子云山僧今日上樹去也置將一問來代云金香爐下鐵崑崙更聽一頌黑貂裘敝出秦關萬言書上不為難窮到骨頭皮裏出肘懸金印故鄉還諸兄弟一等是箇參禪這些圈繢若不打徹盡是鬼家活計如今一箇箇都道大事了畢我且問你十方總一箇法身為甚麼南閻浮提不曉得北鬱單越事東弗提婆不曉得西瞿耶尼事居下方不識忉利天非非想天事在天上亦不知地獄道事豎拂子云山僧今日將東勝神洲為西牛賀洲轉南贍部洲作北俱盧洲攪作一團混作一塊東西不辨南北不分西來意即東土意恁麼則上樹也是這箇未上樹也是這箇拈華微笑廚庫山門舉著便知光明寂照父母未生符到奉行豈不快哉諸仁者莫道山僧恁麼舉話便去商量公案此則如何那則又如何大衆斷斷乎沒有此則會了那則不會底事昔大慧杲禪師斥盡諸方禪病道一種商量古人公案謂之針線工夫又謂之郎君子弟禪正墮在言語文字之最惡者故痛斥之如商量女子出定話云文殊是七佛之師為甚麼出女子定不得曰文殊與女子無緣罔明是初地菩薩為甚麼出得女子定曰與女子有緣便下語云冤有頭債有主又有商量道文殊不合有心所以出女子定不得罔明無心所以出得便下語云有心用處還成錯無意求時卻宛然又有商量道文殊為甚麼出女子定不得曰杓柄在女子手裏罔明為甚麼出得曰如蟲禦木又曰因風吹火又云爭奈女子何邪解甚者至於作女子入定勢出定勢推一推彈指一下哭蒼天數聲伏惟尚饗拂袖便行之類冷地看來慚皇殺人妙喜頌曰出得出不得是定非真定罔明與文殊喪卻窮性命你看透關人出語自有來由又如大愚芝禪師每舉此問僧莫有對者乃自代云僧投寺裏宿賊打不防家石門禪師特愛此語作偈記之曰出定只消彈指佛法豈用工夫我今要用便用不管罔明文殊真淨和尚見之明日升座曰文殊罔明見處還有優劣也無若言無文殊何故出女子定不得只如今日行者擊動法鼓同到法堂與罔明出女子定是同是別良久云不見道欲識佛性義當觀時節因緣亦有偈曰佛性天真事誰云別有師罔明彈指處女子出禪時不費纖豪力何曾動所思衆生總平等日用自多疑師豎拂子云大衆妙喜大愚石門真淨在山僧拂子頭上放大光明照徹微塵剎土直得山河大地俱時不見雲臺樓閣寶網莊嚴毗盧遮那如來據天光臺文殊師利説十信法門法慧菩薩説十住法門功德林菩薩説十行法門金剛幢菩薩説十回向法門金剛藏菩薩説十地法門普賢菩薩説等覺地行位如來説妙覺果海自受用境界還有善財童子自德雲比丘歷五十三善知識末後於普賢菩薩毛孔中一時頓證佛等剎等神通等相好光明功德等拂一拂喝一喝云此一絡索向甚麼處去也依舊山是山水是水衆生世界一一如然所謂不壞法界性而顯法界理百華落盡啼無盡更向亂紅深處啼復拂一拂喝一喝云此一絡索又向甚麼處去也大衆山僧豈敢恃有超前作略貴圖今人與古人相見將這些老骨董縛作一團放在太上老君爐裏煉作一堆灰分與娑竭羅龍王從色究竟天雨將下來直得盡大地一草一葉一塵一沙無一處不是這些老骨董恁麼坐則見文殊立則見罔明一舉一動大愚石門真淨大慧如影隨形朝莫不離開眼也見合眼也見眉毛眼睫間無處不是拂一拂云狹路桃華風雨後馬蹄何處避殘紅普説老僧徹困也良久云誰人知此意令我憶南泉諸兄弟總無一星子事放下去好山僧不得已隨你顛倒向盤碗裏撒上些藿頭你便道有味卻不識好歹以虛為實殊不知我這裏是木札羹無你綿味處是鐵釘飯無你咬嚼處是塗毒鼓無你聽聞處是鐵壁銅墻無縫罅可入處是栗棘蓬無你插足處是金剛圈無你透過處自你走諸方參得多少禪菽麥不分指鹿為馬似箇猴子相似到處攀緣狂象一般信腳亂走亦似箇羊喫物觸著便安在口裏又似窮措大見食好歹築上一肚點胸點頭道我會禪生大我慢自誤誤人不問青白開口亂道坐繩床底自眼不開不透古人關捩安有為人手段所以臨濟大師道參學之人大須子細如賓主相見便有言論往來或應物見形或全體作用或把機權喜怒或見半身或乘師子或乘象王如有真正學人便喝先拈出一箇膠盆子善知識不辨是境便上他境上作模作樣被學人又喝前人不肯放此是膏肓之病不堪醫治喚作賓看主或是善知識不拈出物秖隨學人問處即奪學人被奪抵死不放此是主看賓或有學人應一箇清淨境出善知識前知識辨得是境把得拋向坑裏學人言大好善知識知識即云咄哉不識好惡學人禮拜此喚作主看主或有學人披枷帶鎖出善知識前知識更與安一重枷鎖學人歡喜彼此不辨此喚作賓看賓大德山僧所舉皆是辨魔揀異知其邪正看他臨濟立出箇賓主彼時善其機者亦不多得況至今日此道寥寥玄音絶唱適才有僧問我賓主人境因之話及若論主看賓如安石圍碁賭墅破符秦百萬直得草木皆兵如公瑾羽扇綸巾焚赤壁檣櫓一時灰飛煙滅若論賓看主如武王陳師牧野紂兵倒戈如沛公直抵函關子嬰銜璧若論主看主則彼此主將善別來機雖則旗槍展布對壘交鋒看去似有輸贏並不損兵折將若論賓看賓則彼此主將非人兩軍步伐不整不審虛實強弱不識進退作止兩下亂殺一場各各覆師辱國此等大概諸人也須共知莫一向瞞盰亂統秖成一場笑具臨濟之後首山中興他更將賓主話特出手眼示衆曰諸上座不得胡喝亂喝尋常向汝道賓即始終賓主即始終主賓無二賓主無二主若有二賓二主即是兩箇瞎漢又曰我若立汝須坐我若坐汝須立坐即共汝坐立即共汝立雖然如是到這裏著眼始得若也眼目定動中間即千里萬里何故如此隔窗見騎馬眨眼便過去也直須仔細不得掠虛好山僧今日試舉幾則話柄貴與首山相見法華舉到琅琊覺處琊問近離甚處曰兩浙曰船來陸來曰船來曰船在甚處曰步下曰不涉程途一句作麼生道舉以坐具摵一摵曰杜撰長老如麻似粟拂袖而出琊問侍者曰此是甚麼人者曰舉上座琊曰莫是舉師叔麼先師教我尋見伊遂下旦過問上座莫是舉師叔麼莫怪適來觸忤舉便喝復問長老何時到汾陽琊曰某時到舉曰我在浙江早聞你名原來見解秖如此何得名譒寰宇琊遂作禮曰某甲罪過大衆你看他作家相見有如是風規有如是進退大慧拈云二大士驀劄相逢主賓互換直下發明臨濟心髓苟非徹證向上巴鼻具出常情正眼未免得失論量或者道舉公前來一一據實秖對琅琊末後不合作佛法道理是杜撰處或者道琅琊被他道箇杜撰心中疑惑即時倒戈卸甲挽留舉公咨決此事謂之坐參一犬吠虛千猱啀實蓋由主法者智眼不明疑誤後人殊不知二大士激揚若日月麗天龍象蹴踏非驢所堪井蛙醯雞又焉知宇宙之寬曠乎又如僧問桐峰云和尚這裏忽遇大蟲作麼生峰便作大蟲吼僧作怕勢峰大笑僧云者老賊峰曰爭奈老僧何雪竇云是則是兩箇老賊只解掩耳偷鈴你看此兩人自起自倒彼此干戈山僧有一頌云山裏大蟲山裏吼借你拳頭築你口大丈夫氣宇如王豈肯參前落後賊賊賊喜的是風怨的是雪又如甘贄行者一日入南泉設齋黃檗為首座行者請施財座曰財法二施等無差別甘曰恁麼道爭消得某甲嚫便將出去須臾復入曰請施財座曰財法二施等無差別甘乃行嚫翠巖真云甘贄行者點兒落節黃檗施財何曾夢見妙喜舉翠巖語云一等是隨邪逐惡這雲居羅漢猶較些子翠巖大慧觀風知變裁抑有方只是但見錐頭利不見鑿頭方黃檗運籌帷幄之中決勝千里之外行者兩度衝鋒一抬一捺黃檗坐觀成敗可謂用盡自己心笑破了他人口又一日入寺設粥仍請南泉念誦泉乃白椎云請大衆為黧奴白牯念摩訶般若波羅蜜甘拂袖便出泉粥罷問典座行者在甚麼處座曰當時便去也泉便打破鍋子兔子懷胎蚌含明月三十棒寄打雪竇六不收看破雲門女媧氏煉石補天秦始皇驅山塞海雖然如是三十年後一回飲水一回噎又如谷泉慈明一見便問白雲橫谷口遊人何處來谷泉卻乃左右顧云夜來何處火燒出古人墳你道我白雲橫谷我還你赤火燒墳慈明到者裏直得無可奈何便裂幅布遮卻面皮呵曰未在更道谷泉乃作虎聲慈明以坐具摵之谷泉接住推置禪床上慈明卻作虎聲谷泉大笑曰我見七十餘員善知識今日始遇作家今時據曲彔木底若不具如是爪牙不知賓主互換要擒縱臨時豈可得也且斷斷乎不是鬥百草底你一語我一句不問主賓無有合殺方知我此法門如龍有翼似虎戴角嬰他不得近他不得如一盆猛火觸著便燒大方闊步起死回生繼佛慧命豈不美哉又如三聖問雪峰透網金鱗以何為食峰云待汝出網來向汝道聖曰一千五百人善知識話頭也不識峰云老僧住持事繁三聖是將門之子用處固有家法雪峰是卜商之後善於方人一箇是海東青慣打天鵝一箇是金翅鳥擘海吞龍雖然作雪峰則易作三聖則難他要從刀鎗林裏過不損一毛百花叢中來不沾一瓣始是作家又如巖頭一日參德山方跨門便問是凡是聖山便喝頭禮拜有人舉似洞山山曰若不是奯公大難承當頭曰洞山老人不識好惡錯下名言我當時一手抬一手捺德山是韞玉之璞石巖頭是剖玉之良工始終俱妙秖不當持一條斷貫索要量無邊身菩薩身才多少長不免被旁人恥笑且道笑箇甚麼笑他是貴介公子打驅儺沿門乞丐大慧拈云猛虎不識阱阱中身死蛟龍不怖劍劍下身亡巖頭雖於虎阱中別有透脫一路向劍刃上有翻身之機若子細檢點將來猶欠悟在山僧極愛大慧此一拈時嘗舉以驗人無有愜老僧意者但大慧拈底固妙中間有箇絲頭不接處直待你五色線斷方才向你道山僧上來一一恁麼批判你若向語言上卜度則山僧有沒量罪過若一往不疑言句則你有沒量罪過所以道識取鉤頭意莫認定盤星有者道但盡今時莫著言語今時若盡更有甚事山僧道你若語句過去不得今時正未盡在蓋為一法不明盡是生死根株又有強作主宰秖要謾過一時所以光陰唐喪虛度一生又不肯潛心體會虛心請益是以言不足聽行不足法取次亂道識者所鄙可發一歎擲拂子下座冬至普説侍者燒香畢師驀云燒香了禮拜了十一月二十八千好萬好便下座顧左右云作麼作麼復升座云乾坤生息衲僧巴鼻四序遷流橫三豎七天得之以清地得之以寧侯王得之而天下平這裏了得見前受用其或未然枝蔓上更添枝蔓有物流動人之常情徒知年往不覺形隨又道子在川上逝者如斯未常往也火傳於薪火傳也不知其盡也所以千聖萬賢間世而出不過提掇我見前這著子只是箇活猴子總沒奈伊何都道我是衲僧奔南走北八字腳立在法座前問箇向上向下縱有些長言短句卻又是經行路裏長連單上穿鑿來底仔細回頭打一想何曾於己分中些須受用得著未梢頭依然打入輪回裏去黃面老子所以設下許多圈繢為你無明不盡説箇菩提生死不了談著涅槃妄想不淨立箇真如見前不薦是鳴佛性這也是撫嬰育孩提矇振瞶底標指若是無明體空説甚菩提生死無住涅槃亦假妄想無性真如無處合覺背塵佛性亦空山僧這裏別轉家風另行溪徑南嶽天台燈籠露柱廚庫山門鐘樓佛殿行來坐去總在裏許要取也取他不得舍也舍他不去如有人欲取虛空盡千萬億恆河沙劫亦取不著更有一人欲舍虛空盡千萬億恆河沙界外亦無有能舍去所以道佛真法身猶若虛空應物見形如水中月豎拂子云此是物作麼生説箇應底道理揮拂子云此是水復打圜相云此是月作麼生説箇如的道理於此會得菩提涅槃無明生死真如佛性妄想塵勞打作一團擲向他方國土直得世界山河含蠢蠕動不一不異無斷無壞非彼非此如天帝網重重交映光光相攝蘇州城中打鼓顯聖寺裏舂米彌勒菩薩呵呵大笑十方諸佛俱共彈指寒山拾得髮垂肩達摩老是箇鬍子置拂子云總在這裏喝一喝下座
